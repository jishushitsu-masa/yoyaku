<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マサちゃんの自習室　予約管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#4F46E5', 'brand-dark': '#4338CA' } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f3f4f6; }
        .calendar-cell { min-height: 80px; transition: all 0.2s; }
        @media (max-width: 640px) { .calendar-cell { min-height: 70px; } }
        .day-off-cell { background-color: #ebebeb !important; border-color: #d1d5db !important; }
        .modal-enter { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-30">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-brand rounded-xl flex items-center justify-center shadow-md shadow-brand/20">
                    <i class="fas fa-calendar-check text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-gray-800 leading-tight">管理画面</h1>
                    <p class="text-[10px] text-gray-400 font-medium uppercase tracking-wider">Reservation Admin</p>
                </div>
            </div>
            <div class="flex space-x-2">
                <button onclick="showStudentList()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-2 rounded-lg text-sm font-bold transition-colors">
                    <i class="fas fa-users mr-1"></i>生徒
                </button>
                <button onclick="location.reload()" class="w-10 h-10 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg flex items-center justify-center transition-colors">
                    <i class="fas fa-sync-alt text-sm"></i>
                </button>
            </div>
        </div>
    </nav>

    <div id="auth-section" class="max-w-md mx-auto mt-12 p-6 bg-white rounded-2xl shadow-xl border border-gray-100 mx-4">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-brand/10 text-brand rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-lock text-2xl"></i>
            </div>
            <h2 class="text-xl font-bold text-gray-800">管理者ログイン</h2>
            <p class="text-sm text-gray-500 mt-1">パスワードを入力してください</p>
        </div>
        <input type="number" id="password" inputmode="numeric" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-xl mb-4 text-center text-2xl tracking-[1em] focus:border-brand focus:ring-0 transition-all outline-none" placeholder="****">
        <button onclick="login()" class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-4 rounded-xl shadow-lg shadow-brand/20 transition-all active:scale-[0.98]">ログイン</button>
    </div>

    <div id="view-calendar" class="hidden max-w-5xl mx-auto mt-6 px-4">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-4 border-b border-gray-50 flex items-center justify-between bg-white">
                <button onclick="prevMonth()" class="p-2 hover:bg-gray-50 rounded-lg text-gray-400"><i class="fas fa-chevron-left"></i></button>
                <h2 id="currentMonth" class="text-lg font-bold text-gray-800">2026年4月</h2>
                <button onclick="nextMonth()" class="p-2 hover:bg-gray-50 rounded-lg text-gray-400"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="grid grid-cols-7 text-center border-b border-gray-50 bg-gray-50/50">
                <div class="py-3 text-[11px] font-bold text-red-400">日</div>
                <div class="py-3 text-[11px] font-bold text-gray-400">月</div>
                <div class="py-3 text-[11px] font-bold text-gray-400">火</div>
                <div class="py-3 text-[11px] font-bold text-gray-400">水</div>
                <div class="py-3 text-[11px] font-bold text-gray-400">木</div>
                <div class="py-3 text-[11px] font-bold text-gray-400">金</div>
                <div class="py-3 text-[11px] font-bold text-blue-400">土</div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7"></div>
        </div>
    </div>

    <div id="view-details" class="hidden max-w-2xl mx-auto mt-6 px-4 pb-20">
        <button onclick="goBackToCalendar()" class="mb-4 flex items-center text-gray-500 font-bold text-sm hover:text-brand transition-colors">
            <i class="fas fa-arrow-left mr-2"></i>カレンダーに戻る
        </button>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6">
            <div class="p-6 bg-brand">
                <div id="selectedDateTitle" class="text-2xl font-bold text-white tracking-tight">4月25日(木)</div>
                <div class="text-brand-dark/30 font-black text-4xl absolute top-4 right-6 pointer-events-none">RESERVE</div>
            </div>
            <div id="reservationList" class="divide-y divide-gray-50"></div>
        </div>
    </div>

    <div id="view-student-list" class="hidden max-w-2xl mx-auto mt-6 px-4">
        <button onclick="goBackToCalendarFromList()" class="mb-4 flex items-center text-gray-500 font-bold text-sm hover:text-brand transition-colors">
            <i class="fas fa-arrow-left mr-2"></i>カレンダーに戻る
        </button>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="p-4 border-b border-gray-50 flex items-center justify-between">
                <h2 class="font-bold text-gray-800 tracking-tight">登録生徒一覧</h2>
                <span id="studentCount" class="text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded-full font-bold">0名</span>
            </div>
            <div id="studentContainer" class="divide-y divide-gray-50"></div>
        </div>
    </div>

    <div id="student-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 hidden">
        <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden modal-enter shadow-2xl">
            <div id="student-detail-content"></div>
            <div class="p-4 bg-gray-50 border-t border-gray-100">
                <button onclick="closeModal()" class="w-full bg-white border border-gray-200 text-gray-600 font-bold py-3 rounded-xl shadow-sm hover:bg-gray-100 transition-all">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCUmZT4HSaGpqmAUYV2zLTtIUwjQVHlbR_1aYNrh1tAQ9LDSi-Rzad17Y-Bt73iCSmGQ/exec";
        let currentDate = new Date();
        let allReservations = [];

        async function login() {
            const pass = document.getElementById('password').value;
            if (pass === "0202") {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('view-calendar').classList.remove('hidden');
                loadAllData();
            } else {
                alert("パスワードが違います");
            }
        }

        async function loadAllData() {
            try {
                const res = await fetch(`${GAS_URL}?action=getAllReservations`);
                allReservations = await res.json();
                renderCalendar();
            } catch (e) {
                alert("データの読み込みに失敗しました");
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const monthTitle = document.getElementById('currentMonth');
            grid.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            monthTitle.innerText = `${year}年${month + 1}月`;
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="calendar-cell border-r border-b border-gray-50 bg-gray-50/20"></div>`;
            }
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}/${month + 1}/${d}`;
                const count = allReservations.filter(r => r.date === dateStr).length;
                const isToday = new Date().toLocaleDateString('ja-JP') === new Date(year, month, d).toLocaleDateString('ja-JP');
                let badge = '';
                if (count > 0) {
                    badge = `<div class="mt-1"><span class="bg-brand text-white text-[9px] font-black px-1.5 py-0.5 rounded-full shadow-sm">${count}名</span></div>`;
                }
                grid.innerHTML += `
                    <div onclick="showDetails('${dateStr}')" class="calendar-cell p-2 border-r border-b border-gray-50 hover:bg-brand/5 cursor-pointer relative ${isToday ? 'bg-brand/5' : 'bg-white'}">
                        <span class="text-xs font-bold ${isToday ? 'text-brand' : 'text-gray-500'}">${d}</span>
                        ${badge}
                    </div>
                `;
            }
        }

        function showDetails(dateStr) {
            const list = allReservations.filter(r => r.date === dateStr);
            document.getElementById('selectedDateTitle').innerText = dateStr;
            const container = document.getElementById('reservationList');
            container.innerHTML = '';
            if (list.length === 0) {
                container.innerHTML = '<div class="p-10 text-center text-gray-400 font-medium">予約はありません</div>';
            } else {
                list.forEach(r => {
                    const experienceLabel = r.experience ? `<span class="ml-2 bg-orange-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm shadow-orange-200">無料体験</span>` : '';
                    const genderBadge = r.gender === '女子' 
                        ? '<span class="bg-pink-100 text-pink-600 px-2 py-0.5 rounded-md text-[10px] font-bold ml-2">女子</span>'
                        : r.gender === '男子'
                        ? '<span class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded-md text-[10px] font-bold ml-2">男子</span>'
                        : '';
                    container.innerHTML += `
                        <div class="p-5 hover:bg-gray-50 transition-colors cursor-pointer group" onclick="showStudentDetail('${r.participantName}')">
                            <div class="flex justify-between items-center">
                                <div>
                                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">${r.location} / ${r.time}</div>
                                    <div class="flex items-center">
                                        <span class="text-lg font-bold text-gray-800 group-hover:text-brand transition-colors">${r.participantName}</span>
                                        ${genderBadge}
                                        ${experienceLabel}
                                    </div>
                                    <div class="text-xs text-gray-500 mt-1 font-medium">保護者: ${r.guardianName} 様</div>
                                </div>
                                <i class="fas fa-chevron-right text-gray-200 group-hover:text-brand group-hover:translate-x-1 transition-all"></i>
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('view-calendar').classList.add('hidden');
            document.getElementById('view-details').classList.remove('hidden');
        }

        function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
        function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }

        async function showStudentList() {
            const container = document.getElementById('studentContainer');
            container.innerHTML = '<div class="p-10 text-center"><div class="inline-block animate-spin h-6 w-6 border-2 border-brand rounded-full border-t-transparent"></div></div>';
            document.getElementById('view-calendar').classList.add('hidden');
            document.getElementById('view-student-list').classList.remove('hidden');
            try {
                const res = await fetch(`${GAS_URL}?action=getStudentList`);
                const students = await res.json();
                document.getElementById('studentCount').innerText = `${students.length}名`;
                container.innerHTML = '';
                students.forEach(s => {
                    container.innerHTML += `
                        <div onclick="showStudentDetail('${s.name}')" class="p-4 flex items-center justify-between hover:bg-gray-50 cursor-pointer">
                            <div class="flex items-center">
                                <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 mr-3">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div>
                                    <div class="font-bold text-gray-800">${s.name}</div>
                                    <div class="text-[10px] text-gray-400 font-bold">${s.school || '学校未登録'}</div>
                                </div>
                            </div>
                            <i class="fas fa-chevron-right text-gray-200"></i>
                        </div>
                    `;
                });
            } catch (e) { container.innerHTML = '<div class="p-10 text-center text-red-500">取得エラー</div>'; }
        }

        async function showStudentDetail(name) {
            const content = document.getElementById('student-detail-content');
            content.innerHTML = '<div class="p-20 text-center"><div class="inline-block animate-spin h-8 w-8 border-4 border-brand rounded-full border-t-transparent"></div></div>';
            document.getElementById('student-modal').classList.remove('hidden');
            try {
                const res = await fetch(`${GAS_URL}?action=getStudentInfo&name=${encodeURIComponent(name)}`);
                const info = await res.json();
                content.innerHTML = `
                    <div class="p-8 bg-brand relative overflow-hidden text-white">
                        <div class="relative z-10">
                            <div class="text-[10px] font-black tracking-widest text-brand-dark/50 uppercase mb-2">Student Profile</div>
                            <h3 class="text-3xl font-bold mb-1">${info.name}</h3>
                            <div class="flex items-center text-brand-dark/60 font-bold text-sm">
                                <span>${info.school || '-'}</span><span class="mx-2">|</span><span>${info.grade || '-'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="p-3 bg-gray-50 rounded-xl border border-gray-100">
                                <div class="text-[10px] text-gray-400 font-bold mb-1 uppercase tracking-wider">保護者様</div>
                                <div class="font-bold text-gray-800 text-sm">${info.guardian || '-'}</div>
                            </div>
                            <div class="p-3 bg-gray-50 rounded-xl border border-gray-100">
                                <div class="text-[10px] text-gray-400 font-bold mb-1 uppercase tracking-wider">電話番号</div>
                                <div class="font-bold text-gray-800 text-sm">${info.tel || '-'}</div>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div class="flex space-x-4">
                                <div class="flex-1 p-3 bg-blue-50/50 rounded-xl border border-blue-100/50">
                                    <div class="text-[10px] text-blue-600 font-bold mb-1 uppercase tracking-wider">得意科目</div>
                                    <div class="font-bold text-gray-800 text-sm">${info.good || '-'}</div>
                                </div>
                                <div class="flex-1 p-3 bg-red-50/50 rounded-xl border border-red-100/50">
                                    <div class="text-[10px] text-red-600 font-bold mb-1 uppercase tracking-wider">苦手科目</div>
                                    <div class="font-bold text-gray-800 text-sm">${info.bad || '-'}</div>
                                </div>
                            </div>
                            <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                                <div class="text-[10px] text-gray-500 font-bold mb-1 uppercase tracking-wider"><i class="fas fa-sticky-note mr-1"></i>備考</div>
                                <div class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">${info.memo || 'なし'}</div>
                            </div>
                        </div>
                    </div>`;
            } catch (e) { content.innerHTML = `<div class="text-center py-10 text-red-500">通信エラーが発生しました。</div>`; }
        }

        function closeModal() { document.getElementById('student-modal').classList.add('hidden'); }
        function goBackToCalendar() { document.getElementById('view-details').classList.add('hidden'); document.getElementById('view-calendar').classList.remove('hidden'); }
        function goBackToCalendarFromList() { document.getElementById('view-student-list').classList.add('hidden'); document.getElementById('view-calendar').classList.remove('hidden'); }
    </script>
</body>
</html>
