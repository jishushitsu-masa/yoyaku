<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マサちゃんの自習室　予約管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#4F46E5', 'brand-dark': '#4338CA' } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f3f4f6; }
        .calendar-cell { min-height: 80px; transition: all 0.2s; }
        @media (max-width: 640px) { .calendar-cell { min-height: 70px; } }
        .day-off-cell { background-color: #ebebeb !important; border-color: #d1d5db !important; }
        .modal-enter { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .score-table th { background-color: #f8fafc; font-size: 0.7rem; color: #64748b; padding: 4px; border-bottom: 2px solid #e2e8f0; }
        .score-table td { font-size: 0.8rem; padding: 6px 4px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .score-total { font-weight: bold; color: #4F46E5; }
    </style>
</head>
<body class="text-gray-800">

    <div class="max-w-3xl mx-auto bg-white min-h-screen relative shadow-lg overflow-hidden pb-10">
        
        <header class="bg-gray-800 text-white p-4 flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-lg font-bold"><i class="fas fa-lock mr-2"></i>自習室　予約管理カレンダー</h1>
            <button id="btn-refresh" onclick="fetchReservations()" class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded hidden"><i class="fas fa-sync-alt mr-1"></i>更新</button>
        </header>

        <div id="view-login" class="p-8 mt-10 max-w-sm mx-auto bg-gray-50 border border-gray-200 rounded-lg shadow-sm">
            <div class="text-center mb-6 text-gray-400"><i class="fas fa-user-shield text-5xl"></i></div>
            <h2 class="text-center font-bold text-gray-700 mb-6">パスワードを入力してください</h2>
            <input type="password" id="admin-password" placeholder="パスワード" class="w-full border border-gray-300 rounded p-3 text-center mb-4 focus:outline-none focus:border-brand">
            <button onclick="checkPassword()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded shadow">ログイン</button>
            <p id="login-error" class="text-red-500 text-sm text-center mt-3 hidden">パスワードが違います</p>
        </div>

        <div id="view-calendar" class="p-4 hidden">
            <div class="flex justify-between items-center mb-4 mt-2">
                <button onclick="changeMonth(-1)" class="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600"><i class="fas fa-chevron-left"></i></button>
                <h2 id="current-month-label" class="text-xl font-bold text-gray-800">----年 --月</h2>
                <button onclick="changeMonth(1)" class="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="grid grid-cols-7 gap-1 mb-1 text-center font-bold text-xs text-gray-500">
                <div class="text-red-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-500">土</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
            
            <div class="mt-8 space-y-3 px-4">
                <button onclick="showStudentList()" class="w-full bg-white border-2 border-brand text-brand hover:bg-brand hover:text-white font-bold py-4 rounded-xl shadow-sm transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-users text-lg"></i>
                    生徒名簿を表示・管理
                </button>
            </div>
            <div id="loading-message" class="text-center py-8 text-gray-500 hidden"><i class="fas fa-spinner fa-spin mr-2 text-brand text-2xl"></i><br>予約データを読み込んでいます...</div>
        </div>

        <div id="view-details" class="p-4 hidden bg-gray-100 min-h-screen">
            <div class="flex items-center mb-4 mt-2">
                <button onclick="goBackToCalendar()" class="bg-white border border-gray-300 text-gray-600 px-4 py-2 rounded shadow-sm hover:bg-gray-50 flex items-center"><i class="fas fa-arrow-left mr-2"></i>戻る</button>
                <h2 id="detail-date-label" class="text-lg font-bold text-gray-800 ml-4">--月--日 の予約</h2>
                <span id="detail-count-badge" class="ml-2 bg-brand text-white text-xs font-bold px-2 py-1 rounded-full">0名</span>
            </div>
            <div id="reservation-list" class="space-y-3"></div>
        </div>

        <div id="view-student-list" class="p-4 hidden bg-gray-100 min-h-screen">
            <div class="flex items-center justify-between mb-4 mt-2">
                <button onclick="goBackToCalendarFromList()" class="bg-white border border-gray-300 text-gray-600 px-4 py-2 rounded shadow-sm hover:bg-gray-50 flex items-center font-bold text-sm"><i class="fas fa-arrow-left mr-2"></i>戻る</button>
                <button onclick="openStudentEditModal()" class="bg-orange-500 text-white px-4 py-2 rounded shadow font-bold text-sm">新規登録</button>
            </div>
            <div id="student-name-list" class="grid grid-cols-1 gap-2"></div>
            <div id="student-list-loading" class="text-center py-20 text-gray-500"><i class="fas fa-spinner fa-spin text-3xl text-brand mb-2"></i><br>名簿を読み込んでいます...</div>
        </div>
    </div>

    <div id="student-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-black bg-opacity-50" onclick="closeModal()"></div>
        <div class="bg-white w-11/12 max-w-lg rounded-xl shadow-2xl z-10 overflow-hidden modal-enter">
            <div class="bg-brand text-white px-5 py-4 flex justify-between items-center">
                <h3 class="font-bold text-lg">生徒カルテ</h3>
                <div class="flex items-center gap-3">
                   <button id="btn-edit-student" class="text-white hover:text-orange-200 text-sm font-bold"><i class="fas fa-edit mr-1"></i>編集</button>
                   <button onclick="closeModal()" class="text-white hover:text-gray-200 text-2xl">&times;</button>
                </div>
            </div>
            <div id="modal-content" class="p-6 space-y-5 max-h-[75vh] overflow-y-auto"></div>
            <div class="bg-gray-50 p-4 border-t border-gray-100 flex justify-between">
                <button id="btn-delete-student" class="bg-red-50 text-red-500 px-4 py-2 rounded font-bold text-sm">削除</button>
                <button onclick="closeModal()" class="bg-gray-500 text-white px-6 py-2 rounded font-bold shadow">閉じる</button>
            </div>
        </div>
    </div>

    <div id="edit-student-modal" class="fixed inset-0 z-[60] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-black bg-opacity-60" onclick="closeEditModal()"></div>
        <div class="bg-white w-11/12 max-w-lg rounded-xl shadow-2xl z-10 overflow-hidden modal-enter">
            <div class="bg-orange-500 text-white px-5 py-4 flex justify-between items-center">
                <h3 class="font-bold">生徒情報の編集</h3>
                <button onclick="closeEditModal()" class="text-2xl">&times;</button>
            </div>
            <form id="student-edit-form" class="p-6 space-y-3 max-h-[60vh] overflow-y-auto text-sm">
                <div>
                    <label class="text-xs text-gray-400 font-bold">氏名 ※必須</label>
                    <input type="text" name="name" required class="w-full border p-2 rounded outline-none focus:border-orange-500">
                </div>
                <div><label class="text-xs text-gray-400 font-bold">ふりがな</label><input type="text" name="furigana" class="w-full border p-2 rounded outline-none focus:border-orange-500"></div>
                <div class="flex gap-2">
                    <div class="w-1/2"><label class="text-xs text-gray-400 font-bold">学校</label><input type="text" name="school" class="w-full border p-2 rounded outline-none focus:border-orange-500"></div>
                    <div class="w-1/2"><label class="text-xs text-gray-400 font-bold">学年</label><input type="text" name="grade" class="w-full border p-2 rounded outline-none focus:border-orange-500"></div>
                </div>
                <div><label class="text-xs text-gray-400 font-bold">性別</label><select name="gender" class="w-full border p-2 rounded outline-none focus:border-orange-500"><option value="">選択</option><option value="男子">男子</option><option value="女子">女子</option></select></div>
                <div class="flex gap-2">
                    <div class="w-1/2"><label class="text-xs text-gray-400 font-bold">得意科目</label><input type="text" name="good" class="w-full border p-2 rounded outline-none focus:border-orange-500"></div>
                    <div class="w-1/2"><label class="text-xs text-gray-400 font-bold">苦手科目</label><input type="text" name="bad" class="w-full border p-2 rounded outline-none focus:border-orange-500"></div>
                </div>
                <div class="flex gap-2">
                    <div class="w-1/2"><label class="text-xs text-gray-400 font-bold">志望校1</label><input type="text" name="target1" class="w-full border p-2 rounded outline-none focus:border-orange-500"></div>
                    <div class="w-1/2"><label class="text-xs text-gray-400 font-bold">志望校2</label><input type="text" name="target2" class="w-full border p-2 rounded outline-none focus:border-orange-500"></div>
                </div>
                <div><label class="text-xs text-gray-400 font-bold">部活動</label><input type="text" name="club" class="w-full border p-2 rounded outline-none focus:border-orange-500"></div>
                <div><label class="text-xs text-gray-400 font-bold">備考・メモ</label><textarea name="memo" class="w-full border p-2 rounded outline-none focus:border-orange-500" rows="3"></textarea></div>
            </form>
            <div class="p-4 border-t bg-gray-50"><button onclick="saveStudent()" class="w-full bg-orange-500 text-white font-bold py-3 rounded shadow">情報を保存する</button></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCUmZT4HSaGpqmAUYV2zLTtIUwjQVHlbR_1aYNrh1tAQ9LDSi-Rzad17Y-Bt73iCSmGQ/exec";
        const ADMIN_PASSWORD = "0202"; 

        function checkPassword() {
            let input = document.getElementById('admin-password').value;
            if (input === ADMIN_PASSWORD) {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-calendar').classList.remove('hidden');
                document.getElementById('btn-refresh').classList.remove('hidden');
                fetchReservations();
            } else { document.getElementById('login-error').classList.remove('hidden'); }
        }

        let allReservations = [];
        let groupedReservations = {}; 
        let currentDate = new Date();

        function fetchReservations() {
            document.getElementById('calendar-grid').innerHTML = '';
            document.getElementById('loading-message').classList.remove('hidden');
            fetch(GAS_URL + "?action=getAllReservations").then(r => r.json()).then(data => {
                allReservations = data;
                groupReservationsByDate();
                renderCalendar();
                document.getElementById('loading-message').classList.add('hidden');
            });
        }

        function groupReservationsByDate() {
            groupedReservations = {};
            allReservations.forEach(res => {
                const clean = res.date.replace(/[０-９：]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
                const match = clean.match(/(\d{4})[-\/年](\d{1,2})[-\/月](\d{1,2})/);
                if (match) {
                    const key = `${match[1]}-${match[2].padStart(2, '0')}-${match[3].padStart(2, '0')}`;
                    if (!groupedReservations[key]) groupedReservations[key] = [];
                    groupedReservations[key].push(res);
                }
            });
        }

        function changeMonth(diff) { currentDate.setMonth(currentDate.getMonth() + diff); renderCalendar(); }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('current-month-label').innerText = `${year}年 ${month + 1}月`;
            const first = new Date(year, month, 1).getDay();
            const last = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const todayStr = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;
            for (let i = 0; i < first; i++) grid.innerHTML += `<div class="bg-gray-50 border border-gray-100 rounded"></div>`;
            for (let day = 1; day <= last; day++) {
                const key = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const items = groupedReservations[key] || [];
                const resCount = items.filter(it => it.status !== "休み").length;
                const isHoliday = items.some(it => it.status === "休み");
                const dow = new Date(year, month, day).getDay();
                let loc = (dow === 1 || dow === 4) ? 'すざか' : (dow === 2 || dow === 5) ? 'おぶせ' : '';
                let cellCls = (key === todayStr) ? 'bg-blue-50 border-blue-300' : 'bg-white border-gray-200';
                if (isHoliday) cellCls += ' day-off-cell pointer-events-none';
                grid.innerHTML += `<div class="border rounded p-1 sm:p-2 calendar-cell flex flex-col items-center cursor-pointer shadow-sm ${cellCls}" onclick="${isHoliday ? '' : `showDetails('${key}', ${year}, ${month+1}, ${day})`}">
                    <span class="text-sm font-bold ${isHoliday ? 'text-gray-400' : 'text-gray-700'}">${day}</span>
                    <span class="text-[10px] mt-0.5 font-bold ${loc === 'すざか' ? 'text-orange-500' : 'text-green-600'} ${isHoliday ? 'hidden' : ''}">${loc}</span>
                    ${resCount > 0 && !isHoliday ? `<div class="mt-1 bg-brand text-white text-[10px] font-bold rounded-full px-1.5 py-0.5">${resCount}名</div>` : ''}
                    ${isHoliday ? `<div class="mt-1 bg-gray-400 text-white text-[10px] font-bold rounded px-1.5 py-0.5">休み</div>` : ''}
                </div>`;
            }
        }

        function showDetails(key, y, m, d) {
            const container = document.getElementById('reservation-list');
            container.innerHTML = '';
            const res = (groupedReservations[key] || []).filter(it => it.status !== "休み");
            document.getElementById('detail-date-label').innerText = `${m}月${d}日 の予約`;
            document.getElementById('detail-count-badge').innerText = `${res.length}名`;
            if (res.length === 0) container.innerHTML = `<div class="text-center py-10 bg-white rounded-lg text-gray-500">予約はありません。</div>`;
            else {
                res.forEach(r => {
                    const exp = r.experience ? `<span class="ml-2 bg-orange-500 text-white text-[10px] px-2 py-0.5 rounded-full">無料体験</span>` : '';
                    container.insertAdjacentHTML('beforeend', `<div class="bg-white border rounded-lg p-3 shadow-sm relative overflow-hidden"><div class="absolute top-0 left-0 w-1.5 h-full bg-brand"></div><div class="flex flex-wrap items-center justify-between"><div class="flex-1"><div class="flex items-baseline gap-2 mb-1"><span class="text-lg font-bold text-blue-600 cursor-pointer underline decoration-dotted underline-offset-4" onclick="showStudentHistory('${r.participantName}')">${r.participantName}</span><span class="text-xs text-gray-500">様</span>${exp}<span class="bg-gray-100 text-gray-600 text-[10px] px-2 py-0.5 rounded font-bold ml-1">${r.plan}</span></div><div class="text-sm text-gray-600"><div>${r.time} / ${r.location}</div><div class="text-xs text-gray-400">保護者: ${r.parentName}</div></div></div><a href="tel:${r.phone}" class="bg-blue-50 text-blue-600 px-3 py-2 rounded text-xs font-bold italic">電話</a></div></div>`);
                });
            }
            document.getElementById('view-calendar').classList.add('hidden');
            document.getElementById('view-details').classList.remove('hidden');
        }

        function showStudentList() {
            document.getElementById('view-calendar').classList.add('hidden');
            document.getElementById('view-student-list').classList.remove('hidden');
            const list = document.getElementById('student-name-list');
            const load = document.getElementById('student-list-loading');
            list.innerHTML = ''; load.classList.remove('hidden');
            fetch(GAS_URL + "?action=getStudentList").then(r => r.json()).then(students => {
                load.classList.add('hidden');
                students.sort((a,b) => (a.furigana || a.name).localeCompare(b.furigana || b.name, 'ja'));
                students.forEach(s => {
                    const row = document.createElement('div');
                    row.className = "bg-white p-4 rounded-lg shadow-sm border border-gray-200 cursor-pointer hover:bg-gray-50 flex items-center justify-between";
                    const genderBadge = s.gender ? `<span class="text-[10px] px-2 py-0.5 rounded ml-2 font-bold ${s.gender.includes('女') ? 'bg-pink-50 text-pink-600' : s.gender.includes('男') ? 'bg-blue-50 text-blue-600' : 'bg-gray-100 text-gray-600'}">${s.gender}</span>` : '';
                    row.innerHTML = `<div class="flex items-center"><span class="font-bold text-gray-800">${s.name}</span><span class="text-xs text-gray-400 ml-2">${s.school} ${s.grade}</span>${genderBadge}</div><i class="fas fa-chevron-right text-gray-300"></i>`;
                    row.onclick = () => showStudentHistory(s.name);
                    list.appendChild(row);
                });
            });
        }

        async function showStudentHistory(name) {
            const modal = document.getElementById('student-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = '<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl text-brand"></i></div>';
            modal.classList.remove('hidden');
            try {
                const res = await fetch(`${GAS_URL}?action=getStudentDetails&name=${encodeURIComponent(name)}`);
                const result = await res.json();
                const info = result.info;
                document.getElementById('btn-edit-student').onclick = () => openStudentEditModal(info);
                document.getElementById('btn-delete-student').onclick = () => deleteStudent(info.name);
                
                // ★テスト結果の並び替えロジック（admin (3).htmlから復元）
                let scores = result.scores;
                if (scores && scores.length > 0) {
                    scores.sort((a, b) => {
                        function getWeight(testName) {
                            let w = 0;
                            if (testName.includes("中3")) w += 3000;
                            else if (testName.includes("中2")) w += 2000;
                            else if (testName.includes("中1")) w += 1000;
                            if (testName.includes("3学期") || testName.includes("後期")) w += 300;
                            else if (testName.includes("2学期")) w += 200;
                            else if (testName.includes("1学期") || testName.includes("前期")) w += 100;
                            if (testName.includes("期末") || testName.includes("学年末")) w += 20;
                            else if (testName.includes("中間")) w += 10;
                            return w;
                        }
                        return getWeight(b.testName) - getWeight(a.testName);
                    });
                }

                let scoreHtml = (scores.length > 0) ? `<div class="overflow-x-auto border rounded-lg"><table class="w-full score-table"><thead><tr><th class="text-left">テスト名</th><th>国</th><th>数</th><th>英</th><th>理</th><th>社</th><th class="score-total">計</th></tr></thead><tbody>${scores.map(s => { const sum = [s.kokugo, s.suugaku, s.eigo, s.rika, s.shakai].reduce((a,b)=>a+(parseInt(b)||0),0); return `<tr><td class="text-left font-bold">${s.testName}</td><td>${s.kokugo}</td><td>${s.suugaku}</td><td>${s.eigo}</td><td>${s.rika}</td><td>${s.shakai}</td><td class="score-total">${sum}</td></tr>`}).join('')}</tbody></table></div>` : '<p class="text-center italic text-gray-400">テスト結果なし</p>';
                
                const genderBadge = info.gender ? `<span class="align-middle text-[10px] px-2 py-0.5 rounded font-bold ${info.gender.includes('女') ? 'bg-pink-50 text-pink-600' : info.gender.includes('男') ? 'bg-blue-50 text-blue-600' : 'bg-gray-100 text-gray-600'}">${info.gender}</span>` : '';

                content.innerHTML = `
                    <div class="space-y-6">
                        <div class="border-b pb-4 border-gray-100">
                            <div class="text-[10px] text-gray-400 font-bold mb-[-4px] pl-0.5">${info.furigana || ''}</div>
                            <div class="flex items-baseline gap-3 mt-1">
                                <div class="text-2xl font-bold text-gray-800">${info.name}</div>
                                <div class="flex items-center gap-2">
                                    <span class="text-sm text-gray-500 font-medium">${info.school} / ${info.grade}</span>
                                    ${genderBadge}
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 gap-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div class="p-3 bg-orange-50 rounded-lg border border-orange-100 flex flex-col justify-center">
                                    <div class="text-[10px] text-orange-600 font-bold mb-1 uppercase tracking-wider"><i class="fas fa-bullseye mr-1"></i>志望校</div>
                                    <div class="font-bold text-gray-800 text-sm">
                                        <div class="flex items-center"><span class="text-[9px] text-white bg-orange-400 rounded-full w-3 h-3 flex items-center justify-center mr-1">1</span>${info.target1 || '未設定'}</div>
                                        ${info.target2 ? `<div class="flex items-center mt-1"><span class="text-[9px] text-white bg-orange-400 rounded-full w-3 h-3 flex items-center justify-center mr-1">2</span>${info.target2}</div>` : ''}
                                    </div>
                                </div>
                                <div class="p-3 bg-green-50 rounded-lg border border-green-100 flex flex-col justify-center">
                                    <div class="text-[10px] text-green-600 font-bold mb-1 uppercase tracking-wider"><i class="fas fa-running mr-1"></i>部活動</div>
                                    <div class="font-bold text-gray-800 text-sm">${info.club || '-'}</div>
                                </div>
                            </div>
                            <div>
                                <div class="text-[10px] text-gray-500 font-bold mb-2 uppercase tracking-wider px-1"><i class="fas fa-chart-line mr-1"></i>過去の定期テスト結果</div>
                                ${scoreHtml}
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="p-3 bg-blue-50 rounded-lg border border-blue-100">
                                    <div class="text-[10px] text-blue-600 font-bold mb-1 uppercase tracking-wider">得意科目</div>
                                    <div class="font-bold text-gray-800 text-sm">${info.good || '-'}</div>
                                </div>
                                <div class="p-3 bg-red-50 rounded-lg border border-red-100">
                                    <div class="text-[10px] text-red-600 font-bold mb-1 uppercase tracking-wider">苦手科目</div>
                                    <div class="font-bold text-gray-800 text-sm">${info.bad || '-'}</div>
                                </div>
                            </div>
                            <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                                <div class="text-[10px] text-gray-500 font-bold mb-1 uppercase tracking-wider"><i class="fas fa-sticky-note mr-1"></i>備考</div>
                                <div class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">${info.memo || 'なし'}</div>
                            </div>
                        </div>
                    </div>`;
            } catch (e) { content.innerHTML = '<div class="text-center py-10 text-red-500">取得失敗</div>'; }
        }

        function openStudentEditModal(s = null) {
            const form = document.getElementById('student-edit-form'); form.reset();
            if (s) {
                form.name.value = s.name; form.name.readOnly = true; form.name.classList.add('bg-gray-100');
                form.furigana.value = s.furigana||''; form.school.value = s.school||''; form.grade.value = s.grade||''; form.gender.value = s.gender||''; form.good.value = s.good||''; form.bad.value = s.bad||'';
                form.target1.value = s.target1||''; form.target2.value = s.target2||''; form.club.value = s.club||''; form.memo.value = s.memo||'';
            } else { form.name.readOnly = false; form.name.classList.remove('bg-gray-100'); }
            document.getElementById('edit-student-modal').classList.remove('hidden');
        }

        async function saveStudent() {
            const form = document.getElementById('student-edit-form'); if (!form.name.value) return alert("名前は必須です");
            const d = { name: form.name.value, furigana: form.furigana.value, school: form.school.value, grade: form.grade.value, gender: form.gender.value, good: form.good.value, bad: form.bad.value, target1: form.target1.value, target2: form.target2.value, club: form.club.value, memo: form.memo.value };
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "updateStudent", studentData: d }) }).then(() => { alert("保存しました"); closeEditModal(); closeModal(); showStudentList(); });
        }

        async function deleteStudent(name) { if (confirm(name + " さんのデータを完全に削除しますか？")) fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "deleteStudent", name }) }).then(() => { alert("削除しました"); closeModal(); showStudentList(); }); }
        function closeEditModal() { document.getElementById('edit-student-modal').classList.add('hidden'); }
        function closeModal() { document.getElementById('student-modal').classList.add('hidden'); }
        function goBackToCalendar() { document.getElementById('view-details').classList.add('hidden'); document.getElementById('view-calendar').classList.remove('hidden'); }
        function goBackToCalendarFromList() { document.getElementById('view-student-list').classList.add('hidden'); document.getElementById('view-calendar').classList.remove('hidden'); }
    </script>
</body>
</html>
