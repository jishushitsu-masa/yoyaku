<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マサちゃんの自習室 予約管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f3f4f6; }
        .bg-yorisoi-orange { background-color: #FF9900; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-yorisoi-orange text-white shadow-md p-4 mb-6">
        <h1 class="text-xl font-bold text-center">予約管理システム</h1>
    </header>

    <div id="loading" class="fixed inset-0 bg-white/80 flex flex-col items-center justify-center z-50">
        <div class="w-12 h-12 border-4 border-orange-200 border-t-orange-500 rounded-full animate-spin mb-4"></div>
        <p class="text-slate-600 font-bold">予約データを読み込んでいます...</p>
    </div>

    <main id="main-content" class="max-w-4xl mx-auto px-4 hidden">
        <div class="bg-white rounded-xl shadow-sm p-6">
            <h2 class="text-lg font-bold mb-4 border-b pb-2">直近の予約・体験申込</h2>
            <div id="reservation-list" class="space-y-4">
                </div>
        </div>
    </main>

    <script>
        // ★ 手順1で発行した「新しいデプロイURL」をここに貼り付けてください
        const GAS_URL = "ここに新しいデプロイURLを貼り付けてください";

        async function loadData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                
                const list = document.getElementById('reservation-list');
                const mainContent = document.getElementById('main-content');
                const loading = document.getElementById('loading');

                if (data.reservations && data.reservations.length > 0) {
                    list.innerHTML = data.reservations.map(row => `
                        <div class="p-4 border rounded-lg bg-slate-50">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-xs font-bold bg-orange-100 text-orange-700 px-2 py-1 rounded">${row[8] || 'プランなし'}</span>
                                <span class="text-xs text-slate-500">${row[3]}</span>
                            </div>
                            <div class="font-bold text-lg">${row[5]} 様</div>
                            <div class="text-sm text-slate-600">${row[2]} / 保護者: ${row[6]}</div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p class="text-center text-slate-400 py-10">データが見つかりませんでした</p>';
                }

                loading.classList.add('hidden');
                mainContent.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert("データの読み込みに失敗しました。GASのURLや権限を確認してください。");
            }
        }

        // 起動時にデータを読み込む
        window.onload = loadData;
    </script>
</body>
</html>
