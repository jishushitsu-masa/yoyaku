<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面 - マサちゃんの自習室</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #ff8c00;
            --bg-gray: #f0f2f5;
            --card-white: #ffffff;
            --text-main: #333;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            padding-bottom: 70px; /* 下部ナビ用 */
        }

        header {
            background: var(--primary-orange);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }

        /* カードスタイル */
        .card {
            background: var(--card-white);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        h3 { margin-top: 0; font-size: 1.1rem; border-left: 4px solid var(--primary-orange); padding-left: 10px; }

        /* テーブル・リスト */
        .data-table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #fafafa; }

        /* 入力フォーム（テスト結果など） */
        .score-input-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .total-badge {
            background: #fff4e6;
            color: var(--primary-orange);
            font-weight: bold;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
            margin-top: 10px;
        }

        /* 下部ナビゲーション */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #ddd;
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            font-size: 0.7rem;
            color: #888;
            cursor: pointer;
            flex: 1;
        }
        .nav-item.active { color: var(--primary-orange); }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 2px; }

        .btn {
            background: var(--primary-orange);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        #loading { text-align: center; padding: 50px; }
    </style>
</head>
<body>

<header>マサちゃんの自習室 管理画面</header>

<div id="loading"><i class="fas fa-spinner fa-spin fa-2x"></i> 読み込み中...</div>

<div id="main-ui" style="display:none;">
    <section id="tab-reserve" class="tab-content active">
        <h3><i class="fas fa-calendar-check"></i> 本日の予約状況</h3>
        <div id="today-summary" class="card">
            </div>
        <div class="data-table-wrapper">
            <table id="reserve-list">
                <thead><tr><th>生徒名</th><th>会場</th><th>時間</th><th>プラン</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <section id="tab-members" class="tab-content">
        <h3><i class="fas fa-user-graduate"></i> 生徒名簿</h3>
        <div id="member-cards"></div>
    </section>

    <section id="tab-test" class="tab-content">
        <h3><i class="fas fa-chart-line"></i> テスト結果入力</h3>
        <div class="card">
            <label>生徒選択</label>
            <select id="test-student-select"></select>
            
            <div class="score-input-grid">
                <div><label>学年</label><select id="test-grade"><option>中1</option><option>中2</option><option>中3</option></select></div>
                <div><label>学期</label><select id="test-term"><option>1学期</option><option>2学期</option><option>3学期</option></select></div>
                <div><label>種類</label><select id="test-type"><option>中間</option><option>期末</option><option>実力</option></select></div>
            </div>

            <div class="score-input-grid">
                <input type="number" id="s-kokugo" placeholder="国語" oninput="calcTotal()">
                <input type="number" id="s-suugaku" placeholder="数学" oninput="calcTotal()">
                <input type="number" id="s-eigo" placeholder="英語" oninput="calcTotal()">
                <input type="number" id="s-rika" placeholder="理科" oninput="calcTotal()">
                <input type="number" id="s-syakai" placeholder="社会" oninput="calcTotal()">
            </div>
            
            <div id="total-display" class="total-badge">合計: 0 点</div>
            <button class="btn" onclick="saveTestScore()" style="margin-top:15px;">結果を保存する</button>
        </div>
    </section>

    <section id="tab-schedule" class="tab-content">
        <h3><i class="fas fa-calendar-alt"></i> スケジュール管理</h3>
        <p style="font-size:0.8rem; color:red;">※修正はスプレッドシートを直接編集してください</p>
        <div id="schedule-view"></div>
    </section>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('reserve')"><i class="fas fa-list"></i>予約</div>
    <div class="nav-item" onclick="switchTab('members')"><i class="fas fa-users"></i>名簿</div>
    <div class="nav-item" onclick="switchTab('test')"><i class="fas fa-pen"></i>テスト</div>
    <div class="nav-item" onclick="switchTab('schedule')"><i class="fas fa-calendar"></i>日程</div>
</nav>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/XXX/exec'; // デプロイ後のURLへ差し替え

    window.onload = loadAdminData;

    async function loadAdminData() {
        try {
            const res = await fetch(`${GAS_URL}?action=getAdminData`);
            const data = await res.json();
            renderUI(data);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        } catch (e) {
            alert("データ読み込みに失敗しました。");
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(`tab-${tabId}`).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function calcTotal() {
        const subjects = ['kokugo', 'suugaku', 'eigo', 'rika', 'syakai'];
        let total = 0;
        subjects.forEach(s => {
            total += Number(document.getElementById(`s-${s}`).value) || 0;
        });
        document.getElementById('total-display').innerText = `合計: ${total} 点`;
    }

    function renderUI(data) {
        // 名簿・テスト用セレクトボックス
        const select = document.getElementById('test-student-select');
        data.members.forEach(m => {
            let opt = document.createElement('option');
            opt.value = m[0]; opt.innerText = m[0];
            select.appendChild(opt);
        });

        // 簡易予約リストの表示
        const resBody = document.querySelector('#reserve-list tbody');
        data.bookings.forEach(b => {
            resBody.innerHTML += `<tr><td>${b.name}</td><td>${b.loc}</td><td>${b.time}</td><td>${b.plan}</td></tr>`;
        });
    }

    async function saveTestScore() {
        // 保存処理 (GASに送信)
        alert("保存しました（デプロイ後に動作します）");
    }
</script>
</body>
</html>
