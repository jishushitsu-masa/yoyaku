<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | 元塾講師マサちゃんの自習室</title>
  <link rel="stylesheet" href="index.css">
  <style>
    /* Navy Blue Theme Overrides */
    :root {
      --primary: #3B82F6; /* Blue */
      --secondary: #1E3A8A; /* Deep Navy */
      --background: #0F172A; /* Very Dark Slate */
      --surface: #1E293B; /* Dark Slate for Cards */
      --text-main: #F8FAFC; /* Off-White */
      --text-muted: #94A3B8; /* Light Gray */
      --border: #334155; /* Slate Border */
      --danger: #EF4444; /* Red for Sunday */
    }

    body {
      background: linear-gradient(135deg, #0F172A, #1E3A8A);
      color: var(--text-main);
      min-height: 100vh;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      color: var(--text-main);
    }

    .container, .container-large {
      padding-top: 2rem;
    }

    /* Form Elements */
    input, select, textarea {
      background: #0F172A;
      color: #F8FAFC;
      border: 1px solid var(--border);
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
    }

    /* Admin specific styles */
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background-color: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .calendar-header {
      background-color: #0F172A;
      font-weight: bold;
      text-align: center;
      padding: 10px;
    }
    .calendar-header.sun { color: var(--danger); }
    .calendar-header.sat { color: var(--primary); }
    .calendar-day {
      background-color: var(--surface);
      min-height: 100px;
      padding: 10px;
      position: relative;
    }
    .calendar-day.other-month { background-color: #0B1120; color: var(--border); }
    .calendar-date { font-weight: bold; margin-bottom: 5px; color: var(--text-muted); }
    
    .event-badge {
      font-size: 0.75rem;
      padding: 4px 6px;
      border-radius: 4px;
      margin-bottom: 4px;
      color: #fff;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .event-obuse { background-color: #4F46E5; } /* Indigo */
    .event-suzaka { background-color: #0EA5E9; } /* Light Blue */
    
    /* Login Screen */
    #loginScreen {
      max-width: 400px;
      margin: 10vh auto;
    }
    #loginScreen .card {
      background: rgba(30, 41, 59, 0.8);
      backdrop-filter: blur(10px);
    }

    /* Tables */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: #0F172A; color: var(--text-muted); font-weight: 600; }
    tr:hover td { background: rgba(255,255,255,0.05); }

    /* Nav Tabs */
    .nav-tabs { display: flex; gap: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .nav-tab { padding: 0.5rem 1rem; cursor: pointer; color: var(--text-muted); font-weight: bold; }
    .nav-tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
    .nav-tab:hover { color: var(--text-main); }

    /* Modal styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      display: flex; justify-content: center; align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--surface); padding: 2rem; border-radius: var(--radius);
      width: 90%; max-width: 650px; max-height: 90vh; overflow-y: auto;
      border: 1px solid var(--border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .modal-close {
      float: right; font-size: 1.5rem; cursor: pointer; border: none; background: none; color: var(--text-muted);
    }
    .modal-close:hover { color: var(--text-main); }
    .student-link {
      color: var(--primary); cursor: pointer; font-weight: bold;
    }
    .student-link:hover { text-decoration: underline; color: #60A5FA; }

    .modal-content h3, .modal-content h4 { color: var(--text-main); }
    #testRecordForm { background: #0F172A !important; border: 1px solid var(--border); }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>
  
  <!-- ログイン画面 -->
  <div id="loginScreen" class="container">
    <div class="card">
      <h2 style="text-align: center; margin-bottom: 1.5rem;">管理者ログイン</h2>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" placeholder="パスワードを入力">
      </div>
      <div id="loginMessage" class="hidden"></div>
      <button id="loginBtn" class="btn btn-primary" style="margin-top: 1rem;">ログイン</button>
    </div>
  </div>

  <!-- 管理ダッシュボード -->
  <div id="dashboard" class="container-large hidden">
    <header style="display: flex; justify-content: space-between; align-items: center; text-align: left;">
      <div>
        <h1 style="margin-bottom: 0;">自習室 管理ダッシュボード</h1>
        <p id="role-badge" style="display:inline-block; background:#eee; padding:2px 8px; border-radius:4px; font-size:0.8rem; margin-top:5px;"></p>
      </div>
      <button class="btn btn-secondary" style="width: auto; padding: 0.5rem 1rem;" onclick="logout()">ログアウト</button>
    </header>

    <div class="nav-tabs">
      <div class="nav-tab active" data-target="tab-calendar">スケジュール</div>
      <div class="nav-tab" data-target="tab-students">生徒一覧</div>
    </div>

    <!-- カレンダータブ -->
    <div id="tab-calendar" class="tab-content card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h2>カレンダー</h2>
        <div>
          <button class="btn btn-secondary" style="width: auto; padding: 0.5rem;" onclick="prevMonth()">&lt; 前月</button>
          <span id="currentMonthYear" style="margin: 0 1rem; font-weight: bold; font-size: 1.2rem;"></span>
          <button class="btn btn-secondary" style="width: auto; padding: 0.5rem;" onclick="nextMonth()">次月 &gt;</button>
        </div>
      </div>
      <div id="calendarLoader" class="hidden" style="text-align:center; padding:1rem;">読み込み中...</div>
      <div class="calendar" id="calendarGrid">
        <div class="calendar-header sun">日</div>
        <div class="calendar-header">月</div>
        <div class="calendar-header">火</div>
        <div class="calendar-header">水</div>
        <div class="calendar-header">木</div>
        <div class="calendar-header">金</div>
        <div class="calendar-header sat">土</div>
        <!-- Days will be generated here -->
      </div>
    </div>

    <!-- 生徒名簿タブ -->
    <div id="tab-students" class="tab-content card hidden">
      <h2>生徒一覧</h2>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>生徒名</th>
              <th>学年</th>
              <th>中学校</th>
              <th>志望校</th>
            </tr>
          </thead>
          <tbody id="studentsTableBody">
            <!-- Data will be loaded here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- モーダル: 参加者一覧 -->
  <div id="participantsModal" class="modal-overlay hidden">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('participantsModal')">×</button>
      <h2 id="modalDateTitle" style="margin-bottom: 1rem;">参加者一覧</h2>
      <ul id="participantsList" style="list-style:none; padding:0;"></ul>
    </div>
  </div>

  <!-- モーダル: 生徒カルテ -->
  <div id="studentModal" class="modal-overlay hidden">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal('studentModal')">×</button>
      <h2 style="margin-bottom: 1rem;">生徒カルテ: <span id="recordStudentName"></span></h2>
      <form id="studentRecordForm">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group"><label>性別</label><select name="性別"><option value="">選択</option><option value="男">男</option><option value="女">女</option><option value="その他">その他</option></select></div>
          <div class="form-group"><label>中学校名</label><input type="text" name="中学校名"></div>
          <div class="form-group"><label>学年</label><input type="text" name="現在の学年"></div>
          <div class="form-group"><label>部活動・習い事</label><input type="text" name="部活動・習い事"></div>
          <div class="form-group"><label>志望校</label><input type="text" name="志望校"></div>
          <div class="form-group"><label>得意科目</label><input type="text" name="得意科目"></div>
          <div class="form-group"><label>苦手科目</label><input type="text" name="苦手科目"></div>
        </div>
        <div id="saveRecordMsg" class="hidden" style="margin-top:1rem;"></div>
        <button type="submit" class="btn btn-primary" id="saveRecordBtn" style="margin-top: 1.5rem;">基本情報を保存する</button>
      </form>

      <div style="margin-top: 2rem; border-top: 2px solid var(--border); padding-top: 1rem;">
        <h3>過去の定期テスト結果</h3>
        <div class="table-responsive" style="margin-bottom:1rem;">
          <table style="font-size:0.9rem;">
            <thead>
              <tr><th>学年</th><th>学期</th><th>種類</th><th>国</th><th>数</th><th>英</th><th>理</th><th>社</th><th>計</th></tr>
            </thead>
            <tbody id="testResultsTableBody">
              <!-- Tests injected here -->
            </tbody>
          </table>
        </div>
        
        <form id="testRecordForm" style="background:#F9FAFB; padding:1rem; border-radius:8px;">
          <h4 style="margin-bottom:0.5rem;">新しい結果を追加</h4>
          <div style="display:flex; gap:0.5rem; margin-bottom:0.5rem;">
            <div class="form-group" style="flex:1;"><label>学年</label><input type="text" name="学年" required></div>
            <div class="form-group" style="flex:1;"><label>学期</label><input type="text" name="学期" required></div>
            <div class="form-group" style="flex:1;"><label>種類</label><input type="text" name="種類" required placeholder="中間等"></div>
          </div>
          <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
            <div class="form-group" style="flex:1;"><label>国語</label><input type="number" name="国語" class="test-score"></div>
            <div class="form-group" style="flex:1;"><label>数学</label><input type="number" name="数学" class="test-score"></div>
            <div class="form-group" style="flex:1;"><label>英語</label><input type="number" name="英語" class="test-score"></div>
            <div class="form-group" style="flex:1;"><label>理科</label><input type="number" name="理科" class="test-score"></div>
            <div class="form-group" style="flex:1;"><label>社会</label><input type="number" name="社会" class="test-score"></div>
          </div>
          <button type="submit" class="btn btn-secondary" id="addTestBtn" style="width:100%;">テスト結果を追加する</button>
        </form>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
  <script>
    let currentDate = new Date();
    let authToken = sessionStorage.getItem('adminToken');
    let adminData = { schedule: [], reservations: [], students: [], tests: [] };
    let currentStudentName = "";

    document.addEventListener('DOMContentLoaded', () => {
      // 常にログイン画面から開始するため、自動ログインを無効化
      // if (authToken) showDashboard();

      document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
          tab.classList.add('active');
          document.getElementById(tab.dataset.target).classList.remove('hidden');
          if (tab.dataset.target === 'tab-students') renderStudents();
        });
      });
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const pwd = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      btn.textContent = '確認中...'; btn.disabled = true;
      const result = await apiFetch('login', { password: pwd });
      if (result.status === 'success') {
        sessionStorage.setItem('adminToken', result.token);
        authToken = result.token;
        showDashboard();
      } else {
        alert(result.message);
        btn.textContent = 'ログイン'; btn.disabled = false;
      }
    });

    function logout() { sessionStorage.removeItem('adminToken'); location.reload(); }

    async function showDashboard() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('role-badge').textContent = (authToken === 'master') ? '権限: マスター (編集可)' : '権限: 閲覧専用';
      if (authToken !== 'master') document.getElementById('saveRecordBtn').style.display = 'none';

      document.getElementById('calendarLoader').classList.remove('hidden');
      const res = await apiFetch('getAdminData');
      document.getElementById('calendarLoader').classList.add('hidden');
      if (res.status === 'success') {
        adminData = res;
        renderCalendar();
      }
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('currentMonthYear').textContent = `${year}年 ${month + 1}月`;
      const grid = document.getElementById('calendarGrid');
      while (grid.children.length > 7) grid.removeChild(grid.lastChild);

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      for (let i = 0; i < firstDay; i++) {
        const div = document.createElement('div');
        div.className = 'calendar-day other-month';
        grid.appendChild(div);
      }

      for (let i = 1; i <= daysInMonth; i++) {
        const div = document.createElement('div');
        div.className = 'calendar-day';
        div.innerHTML = `<div class="calendar-date">${i}</div>`;
        
        const dateStr = `${year}/${('0'+(month+1)).slice(-2)}/${('0'+i).slice(-2)}`;
        
        // 当日のスケジュールを検索
        const todaysSchedules = adminData.schedule.filter(s => {
          if (!s['日付']) return false;
          const sDate = String(s['日付']).split('T')[0].replace(/-/g, '/');
          return sDate === dateStr && s['休み'] !== '休み';
        });

        todaysSchedules.forEach(sch => {
          const area = sch['エリア'];
          // 該当エリア・該当日の予約者を抽出
          const reservations = adminData.reservations.filter(r => {
            if (!r['日付']) return false;
            const rDate = String(r['日付']).split('T')[0].replace(/-/g, '/');
            return rDate === dateStr && r['エリア'] === area && String(r['管理ID'] || '').trim() !== "" && String(r['キャンセル日時'] || '').trim() === "";
          });
          
          const count = reservations.length;
          const badgeClass = area === 'おぶせ' ? 'event-obuse' : 'event-suzaka';
          
          const badge = document.createElement('div');
          badge.className = `event-badge ${badgeClass}`;
          badge.innerHTML = `${area} <span style="background:#fff; color:#333; padding:1px 4px; border-radius:10px; font-weight:bold;">${count}人</span>`;
          
          badge.onclick = () => showParticipants(dateStr, area, reservations);
          div.appendChild(badge);
        });

        grid.appendChild(div);
      }
    }

    function prevMonth() { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); }
    function nextMonth() { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); }

    function showParticipants(dateStr, area, reservations) {
      document.getElementById('modalDateTitle').textContent = `${dateStr} ${area} 参加者 (${reservations.length}人)`;
      const list = document.getElementById('participantsList');
      list.innerHTML = '';
      if (reservations.length === 0) {
        list.innerHTML = '<li>予約はありません</li>';
      } else {
        reservations.forEach(r => {
          const li = document.createElement('li');
          li.style.padding = '10px 0'; li.style.borderBottom = '1px solid #eee';
          li.innerHTML = `<span class="student-link" onclick="openStudentRecord('${r['生徒名']}')">${r['生徒名']}</span> <span style="color:#666; font-size:0.8rem;">(${r['時間']})</span>`;
          list.appendChild(li);
        });
      }
      document.getElementById('participantsModal').classList.remove('hidden');
    }

    function renderStudents() {
      const tbody = document.getElementById('studentsTableBody');
      tbody.innerHTML = '';
      
      const sorted = [...adminData.students].sort((a, b) => {
        const fA = a['ふりがな'] || a['生徒名'] || "";
        const fB = b['ふりがな'] || b['生徒名'] || "";
        return fA.localeCompare(fB, 'ja');
      });

      sorted.forEach(s => {
        if (!s['生徒名']) return;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="student-link" onclick="openStudentRecord('${s['生徒名']}')">${s['生徒名']}</span></td>
          <td>${s['現在の学年'] || ''}</td>
          <td>${s['中学校名'] || ''}</td>
          <td>${s['志望校1'] || s['志望校'] || ''}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function openStudentRecord(studentName) {
      currentStudentName = studentName;
      document.getElementById('recordStudentName').textContent = studentName;
      document.getElementById('participantsModal').classList.add('hidden'); // 他のモーダルを閉じる

      const student = adminData.students.find(s => s['生徒名'] === studentName) || {};
      
      const form = document.getElementById('studentRecordForm');
      form.reset();
      
      // Populate fields
      ['性別', '中学校名', '現在の学年', '部活動・習い事', '志望校', '得意科目', '苦手科目'].forEach(k => {
        const el = form.elements[k];
        if (el) {
          el.value = student[k] || '';
          if (authToken !== 'master') el.disabled = true;
        }
      });

      renderTestResults(studentName);

      const testForm = document.getElementById('testRecordForm');
      testForm.reset();
      if (authToken !== 'master') {
        Array.from(testForm.elements).forEach(el => el.disabled = true);
        document.getElementById('addTestBtn').style.display = 'none';
      }

      document.getElementById('saveRecordMsg').classList.add('hidden');
      document.getElementById('studentModal').classList.remove('hidden');
    }

    function renderTestResults(studentName) {
      const tbody = document.getElementById('testResultsTableBody');
      tbody.innerHTML = '';
      const studentTests = adminData.tests.filter(t => t['生徒名'] === studentName);
      if (studentTests.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;">テスト結果はありません</td></tr>';
        return;
      }
      studentTests.forEach(t => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${t['学年'] || ''}</td><td>${t['学期'] || ''}</td><td>${t['種類'] || ''}</td>
          <td>${t['国語'] || ''}</td><td>${t['数学'] || ''}</td><td>${t['英語'] || ''}</td>
          <td>${t['理科'] || ''}</td><td>${t['社会'] || ''}</td>
          <td style="font-weight:bold; color:var(--primary);">${t['合計点'] || ''}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    document.getElementById('studentRecordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (authToken !== 'master') return;

      const btn = document.getElementById('saveRecordBtn');
      btn.disabled = true; btn.textContent = '保存中...';
      
      const formData = new FormData(e.target);
      const studentData = Object.fromEntries(formData.entries());

      const res = await apiFetch('updateStudent', {
        token: authToken,
        studentName: currentStudentName,
        studentData: studentData
      });

      if (res.status === 'success') {
        const msg = document.getElementById('saveRecordMsg');
        msg.textContent = '保存しました！';
        msg.style.color = 'green';
        msg.classList.remove('hidden');
        
        // Update local cache
        const idx = adminData.students.findIndex(s => s['生徒名'] === currentStudentName);
        if (idx !== -1) {
          adminData.students[idx] = { ...adminData.students[idx], ...studentData };
          if (!document.getElementById('tab-students').classList.contains('hidden')) renderStudents();
        }
      } else {
        alert(res.message || '保存に失敗しました');
      }
      btn.disabled = false; btn.textContent = '基本情報を保存する';
    });

    document.getElementById('testRecordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (authToken !== 'master') return;

      const btn = document.getElementById('addTestBtn');
      btn.disabled = true; btn.textContent = '追加中...';
      
      const formData = new FormData(e.target);
      const testData = Object.fromEntries(formData.entries());
      
      testData['生徒名'] = currentStudentName;
      let total = 0;
      ['国語', '数学', '英語', '理科', '社会'].forEach(subj => {
        if (testData[subj]) total += Number(testData[subj]);
      });
      testData['合計点'] = total;

      const res = await apiFetch('addTestResult', {
        token: authToken,
        testData: testData
      });

      if (res.status === 'success') {
        adminData.tests.push(res.newRowData);
        renderTestResults(currentStudentName);
        document.getElementById('testRecordForm').reset();
      } else {
        alert(res.message || '追加に失敗しました');
      }
      btn.disabled = false; btn.textContent = 'テスト結果を追加する';
    });
  </script>
</body>
</html>
