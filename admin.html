<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マサちゃんの自習室　予約管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#4F46E5', 'brand-dark': '#4338CA' } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f3f4f6; }
        .calendar-cell { min-height: 80px; transition: all 0.2s; }
        @media (max-width: 640px) { .calendar-cell { min-height: 70px; } }
        .day-off-cell { background-color: #ebebeb !important; border-color: #d1d5db !important; }
        .modal-enter { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .score-table th { background-color: #f8fafc; font-size: 0.7rem; color: #64748b; padding: 4px; border-bottom: 2px solid #e2e8f0; }
        .score-table td { font-size: 0.8rem; padding: 6px 4px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .score-total { font-weight: bold; color: #4F46E5; }
    </style>
</head>
<body class="text-gray-800">

    <div class="max-w-3xl mx-auto bg-white min-h-screen relative shadow-lg overflow-hidden pb-10">
        
        <header class="bg-gray-800 text-white p-4 flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-lg font-bold"><i class="fas fa-lock mr-2"></i>自習室　予約管理カレンダー</h1>
            <button id="btn-refresh" onclick="fetchReservations()" class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded hidden"><i class="fas fa-sync-alt mr-1"></i>更新</button>
        </header>

        <div id="view-login" class="p-8 mt-10 max-w-sm mx-auto bg-gray-50 border border-gray-200 rounded-lg shadow-sm">
            <div class="text-center mb-6 text-gray-400"><i class="fas fa-user-shield text-5xl"></i></div>
            <h2 class="text-center font-bold text-gray-700 mb-6">パスワードを入力してください</h2>
            <input type="password" inputmode="numeric" pattern="[0-9]*" id="admin-password" placeholder="パスワード" class="w-full border border-gray-300 rounded p-3 text-center mb-4 focus:outline-none focus:border-brand">
            <button onclick="checkPassword()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 rounded shadow">ログイン</button>
            <p id="login-error" class="text-red-500 text-sm text-center mt-3 hidden">パスワードが違います</p>
        </div>

        <div id="view-calendar" class="p-4 hidden">
            <div class="flex justify-between items-center mb-4 mt-2">
                <button onclick="changeMonth(-1)" class="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600"><i class="fas fa-chevron-left"></i></button>
                <h2 id="current-month-label" class="text-xl font-bold text-gray-800">----年 --月</h2>
                <button onclick="changeMonth(1)" class="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-600"><i class="fas fa-chevron-right"></i></button>
            </div>
            <div class="grid grid-cols-7 gap-1 mb-1 text-center font-bold text-xs text-gray-500">
                <div class="text-red-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-500">土</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
            
            <div class="mt-8 px-4">
                <button onclick="showStudentList()" class="w-full bg-white border-2 border-brand text-brand hover:bg-brand hover:text-white font-bold py-4 rounded-xl shadow-sm transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-users text-lg"></i>
                    生徒一覧（名簿）を表示
                </button>
            </div>

            <div id="loading-message" class="text-center py-8 text-gray-500 hidden"><i class="fas fa-spinner fa-spin mr-2 text-brand text-2xl"></i><br>予約データを読み込んでいます...</div>
        </div>

        <div id="view-details" class="p-4 hidden bg-gray-100 min-h-screen">
            <div class="flex items-center mb-4 mt-2">
                <button onclick="goBackToCalendar()" class="bg-white border border-gray-300 text-gray-600 px-4 py-2 rounded shadow-sm hover:bg-gray-50 flex items-center">
                    <i class="fas fa-arrow-left mr-2"></i>戻る
                </button>
                <h2 id="detail-date-label" class="text-lg font-bold text-gray-800 ml-4">--月--日 の予約</h2>
                <span id="detail-count-badge" class="ml-2 bg-brand text-white text-xs font-bold px-2 py-1 rounded-full">0名</span>
            </div>
            <div id="reservation-list" class="space-y-3"></div>
        </div>

        <div id="view-student-list" class="p-4 hidden bg-gray-100 min-h-screen">
            <div class="flex items-center mb-4 mt-2">
                <button onclick="goBackToCalendarFromList()" class="bg-white border border-gray-300 text-gray-600 px-4 py-2 rounded shadow-sm hover:bg-gray-50 flex items-center font-bold">
                    <i class="fas fa-arrow-left mr-2"></i>カレンダーに戻る
                </button>
                <h2 class="text-lg font-bold text-gray-800 ml-4">生徒一覧</h2>
            </div>
            <div id="student-name-list" class="grid grid-cols-1 gap-2">
                </div>
            <div id="student-list-loading" class="text-center py-20 text-gray-500">
                <i class="fas fa-spinner fa-spin text-3xl text-brand mb-2"></i><br>名簿を読み込んでいます...
            </div>
        </div>
    </div>

    <div id="student-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-black bg-opacity-50" onclick="closeModal()"></div>
        <div class="bg-white w-11/12 max-w-lg rounded-xl shadow-2xl z-10 overflow-hidden modal-enter">
            <div class="bg-brand text-white px-5 py-4 flex justify-between items-center">
                <h3 class="font-bold text-lg"><i class="fas fa-id-card mr-2"></i>生徒カルテ</h3>
                <button onclick="closeModal()" class="text-white hover:text-gray-200 text-2xl">&times;</button>
            </div>
            <div id="modal-content" class="p-6 space-y-5 max-h-[75vh] overflow-y-auto">
                </div>
            <div class="bg-gray-50 p-4 border-t border-gray-100 text-right">
                <button onclick="closeModal()" class="bg-gray-500 text-white px-6 py-2 rounded-lg font-bold shadow">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCUmZT4HSaGpqmAUYV2zLTtIUwjQVHlbR_1aYNrh1tAQ9LDSi-Rzad17Y-Bt73iCSmGQ/exec";
        const ADMIN_PASSWORD = "0202"; 

        function checkPassword() {
            let input = document.getElementById('admin-password').value;
            if (input) {
                input = input.replace(/[０-９]/g, function(s) {
                    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
                }).trim();
            }
            if (input === ADMIN_PASSWORD) {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-calendar').classList.remove('hidden');
                document.getElementById('btn-refresh').classList.remove('hidden');
                fetchReservations();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        let allReservations = [];
        let groupedReservations = {}; 
        let currentDate = new Date();

        function fetchReservations() {
            document.getElementById('calendar-grid').innerHTML = '';
            document.getElementById('loading-message').classList.remove('hidden');
            fetch(GAS_URL + "?action=getAllReservations")
                .then(response => response.json())
                .then(data => {
                    allReservations = data;
                    groupReservationsByDate();
                    renderCalendar();
                    document.getElementById('loading-message').classList.add('hidden');
                });
        }

        function groupReservationsByDate() {
            groupedReservations = {};
            allReservations.forEach(res => {
                let dateKey = null;
                const cleanDate = res.date.replace(/[０-９：]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
                const match = cleanDate.match(/(\d{4})[-\/年](\d{1,2})[-\/月](\d{1,2})/);
                if (match) { dateKey = `${match[1]}-${match[2].padStart(2, '0')}-${match[3].padStart(2, '0')}`; }
                if (dateKey) {
                    if (!groupedReservations[dateKey]) groupedReservations[dateKey] = [];
                    groupedReservations[dateKey].push(res);
                }
            });
        }

        function changeMonth(diff) {
            currentDate.setMonth(currentDate.getMonth() + diff);
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('current-month-label').innerText = `${year}年 ${month + 1}月`;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const todayStr = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div class="bg-gray-50 border border-gray-100 rounded"></div>`;

            for (let day = 1; day <= daysInMonth; day++) {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayItems = groupedReservations[dateKey] || [];
                const isHoliday = dayItems.some(item => item.status === "休み");
                const resCount = dayItems.filter(item => item.status !== "休み").length;
                const dayOfWeek = new Date(year, month, day).getDay();
                let locationText = (dayOfWeek === 1 || dayOfWeek === 4) ? 'すざか' : (dayOfWeek === 2 || dayOfWeek === 5) ? 'おぶせ' : '';
                let cellClass = (dateKey === todayStr) ? 'bg-blue-50 border-blue-300' : 'bg-white border-gray-200';
                let badgeHtml = '';
                if (isHoliday) {
                    cellClass += ' day-off-cell pointer-events-none';
                    badgeHtml = `<div class="mt-1 bg-gray-400 text-white text-[10px] font-bold rounded px-1.5 py-0.5">休み</div>`;
                } else if (resCount > 0) {
                    badgeHtml = `<div class="mt-1 bg-brand text-white text-[10px] font-bold rounded-full px-1.5 py-0.5 shadow-sm">${resCount}名</div>`;
                }
                grid.innerHTML += `
                    <div class="border rounded p-1 sm:p-2 calendar-cell flex flex-col items-center cursor-pointer hover:bg-gray-100 transition shadow-sm ${cellClass}" onclick="${isHoliday ? '' : `showDetails('${dateKey}', ${year}, ${month+1}, ${day})`}">
                        <span class="text-sm font-bold ${isHoliday ? 'text-gray-400' : 'text-gray-700'}">${day}</span>
                        <span class="text-[10px] mt-0.5 font-bold ${locationText === 'すざか' ? 'text-orange-500' : 'text-green-600'} ${isHoliday ? 'hidden' : ''}">${locationText}</span>
                        ${badgeHtml}
                    </div>`;
            }
        }

        function showDetails(dateKey, y, m, d) {
            const listContainer = document.getElementById('reservation-list');
            listContainer.innerHTML = '';
            const reservations = (groupedReservations[dateKey] || []).filter(item => item.status !== "休み");
            document.getElementById('detail-date-label').innerText = `${m}月${d}日 の予約`;
            document.getElementById('detail-count-badge').innerText = `${reservations.length}名`;

            if (reservations.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-10 bg-white rounded-lg border border-gray-200 text-gray-500">この日の予約はありません。</div>`;
            } else {
                reservations.forEach(res => {
                    // ★追加：体験フラグの表示ロジック
                    const experienceBadge = res.experience ? `<span class="ml-2 bg-orange-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow-sm">無料体験</span>` : '';
                    
                    listContainer.insertAdjacentHTML('beforeend', `
                        <div class="bg-white border border-gray-200 rounded-lg p-3 shadow-sm relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1.5 h-full bg-brand"></div>
                            <div class="flex flex-wrap items-center justify-between gap-2">
                                <div class="flex-1 min-w-[200px]">
                                    <div class="flex items-baseline gap-2 mb-1">
                                        <span class="text-lg font-bold text-blue-600 cursor-pointer hover:text-brand-dark underline decoration-dotted underline-offset-4" onclick="showStudentHistory('${res.participantName}')">${res.participantName}</span>
                                        <span class="text-xs text-gray-500">様</span>
                                        ${experienceBadge}
                                        <span class="bg-gray-100 text-gray-600 text-[10px] px-2 py-0.5 rounded font-bold ml-1">${res.plan}</span>
                                    </div>
                                    <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-sm text-gray-600">
                                        <div><i class="far fa-clock text-brand mr-1"></i>${res.time}</div>
                                        <div><i class="fas fa-map-marker-alt text-red-400 mr-1"></i>${res.location}</div>
                                        <div class="col-span-2 text-xs text-gray-400">保護者: ${res.parentName}</div>
                                    </div>
                                </div>
                                <a href="tel:${res.phone}" class="bg-blue-50 text-blue-600 px-3 py-2 rounded-md border border-blue-100 italic font-bold text-xs"><i class="fas fa-phone-alt mr-1"></i>電話</a>
                            </div>
                        </div>`);
                });
            }
            document.getElementById('view-calendar').classList.add('hidden');
            document.getElementById('view-details').classList.remove('hidden');
        }

        function showStudentList() {
            document.getElementById('view-calendar').classList.add('hidden');
            document.getElementById('view-student-list').classList.remove('hidden');
            const listContainer = document.getElementById('student-name-list');
            const loading = document.getElementById('student-list-loading');
            
            listContainer.innerHTML = '';
            loading.classList.remove('hidden');

            fetch(GAS_URL + "?action=getStudentList")
                .then(res => res.json())
                .then(students => {
                    loading.classList.add('hidden');
                    if (students.length === 0) {
                        listContainer.innerHTML = '<p class="text-center py-10 text-gray-400">登録されている生徒はいません。</p>';
                        return;
                    }
                    
                    students.sort((a, b) => {
                        const strA = a.furigana ? a.furigana : a.name;
                        const strB = b.furigana ? b.furigana : b.name;
                        return strA.localeCompare(strB, 'ja');
                    });

                    students.forEach(student => {
                        const row = document.createElement('div');
                        row.className = "bg-white p-4 rounded-lg shadow-sm border border-gray-200 cursor-pointer hover:bg-gray-50 transition active:bg-gray-100 flex items-center justify-between";
                        const furiganaHtml = student.furigana ? `<span class="text-xs text-gray-400 font-normal ml-2">(${student.furigana})</span>` : '';
                        const genderHtml = student.gender ? `<span class="text-[10px] px-2 py-0.5 rounded ml-2 font-bold ${student.gender.includes('女') ? 'bg-pink-50 text-pink-600' : student.gender.includes('男') ? 'bg-blue-50 text-blue-600' : 'bg-gray-100 text-gray-600'}">${student.gender}</span>` : '';
                        row.innerHTML = `<div class="flex items-center"><span class="font-bold text-gray-800">${student.name}</span>${furiganaHtml}${genderHtml}</div><i class="fas fa-chevron-right text-gray-300 text-xs"></i>`;
                        row.onclick = () => showStudentHistory(student.name);
                        listContainer.appendChild(row);
                    });
                })
                .catch(() => {
                    loading.innerHTML = '<p class="text-red-500">読み込みに失敗しました。</p>';
                });
        }

        async function showStudentHistory(name) {
            const modal = document.getElementById('student-modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = `<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-3xl text-brand"></i><br><span class="mt-2 text-gray-500">読み込み中...</span></div>`;
            modal.classList.remove('hidden');

            try {
                const response = await fetch(`${GAS_URL}?action=getStudentDetails&name=${encodeURIComponent(name)}`);
                const result = await response.json();
                if (!result || !result.info) {
                    content.innerHTML = `<div class="text-center py-10 text-red-500"><i class="fas fa-exclamation-triangle text-3xl mb-2"></i><br>「生徒名簿」シートに<br><strong>${name}</strong> さんのデータが<br>見つかりませんでした。</div>`;
                    return;
                }
                const info = result.info;
                const scores = result.scores;
                if (scores && scores.length > 0) {
                    scores.sort((a, b) => {
                        function getWeight(testName) {
                            let w = 0;
                            if (testName.includes("中3")) w += 3000;
                            else if (testName.includes("中2")) w += 2000;
                            else if (testName.includes("中1")) w += 1000;
                            if (testName.includes("3学期") || testName.includes("後期")) w += 300;
                            else if (testName.includes("2学期")) w += 200;
                            else if (testName.includes("1学期") || testName.includes("前期")) w += 100;
                            if (testName.includes("期末") || testName.includes("学年末")) w += 20;
                            else if (testName.includes("中間")) w += 10;
                            return w;
                        }
                        return getWeight(b.testName) - getWeight(a.testName);
                    });
                }
                let scoreHtml = '<p class="text-gray-400 text-center py-4 italic">過去のテスト結果はありません。</p>';
                if (scores && scores.length > 0) {
                    let rows = scores.map(s => {
                        const sum = [s.kokugo, s.suugaku, s.eigo, s.rika, s.shakai].reduce((a, b) => a + (parseInt(b) || 0), 0);
                        return `<tr><td class="font-bold text-left">${s.testName}</td><td>${s.kokugo || '-'}</td><td>${s.suugaku || '-'}</td><td>${s.eigo || '-'}</td><td>${s.rika || '-'}</td><td>${s.shakai || '-'}</td><td class="score-total">${sum || '-'}</td></tr>`;
                    }).join('');
                    scoreHtml = `<div class="overflow-x-auto border border-gray-100 rounded-lg"><table class="w-full score-table"><thead><tr><th class="text-left">テスト名</th><th>国</th><th>数</th><th>英</th><th>理</th><th>社</th><th class="score-total">計</th></tr></thead><tbody>${rows}</tbody></table></div>`;
                }
                const genderBadge = info.gender ? `<span class="align-middle text-[10px] px-2 py-0.5 rounded font-bold ${info.gender.includes('女') ? 'bg-pink-50 text-pink-600' : info.gender.includes('男') ? 'bg-blue-50 text-blue-600' : 'bg-gray-100 text-gray-600'}">${info.gender}</span>` : '';
                content.innerHTML = `
                    <div class="space-y-6">
                        <div class="border-b pb-4 border-gray-100">
                            <div class="text-[10px] text-gray-400 font-bold mb-[-4px] pl-0.5">${info.furigana || ''}</div>
                            <div class="flex items-baseline gap-3 mt-1">
                                <div class="text-2xl font-bold text-gray-800">${name}</div>
                                <div class="flex items-center gap-2">
                                    <span class="text-sm text-gray-500 font-medium">${info.school} / ${info.grade}</span>
                                    ${genderBadge}
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 gap-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div class="p-3 bg-orange-50 rounded-lg border border-orange-100 flex flex-col justify-center">
                                    <div class="text-[10px] text-orange-600 font-bold mb-1 uppercase tracking-wider"><i class="fas fa-bullseye mr-1"></i>志望校</div>
                                    <div class="font-bold text-gray-800 text-sm">
                                        <div class="flex items-center"><span class="text-[9px] text-white bg-orange-400 rounded-full w-3 h-3 flex items-center justify-center mr-1">1</span>${info.target1 || '未設定'}</div>
                                        ${info.target2 ? `<div class="flex items-center mt-1"><span class="text-[9px] text-white bg-orange-400 rounded-full w-3 h-3 flex items-center justify-center mr-1">2</span>${info.target2}</div>` : ''}
                                    </div>
                                </div>
                                <div class="p-3 bg-green-50 rounded-lg border border-green-100 flex flex-col justify-center">
                                    <div class="text-[10px] text-green-600 font-bold mb-1 uppercase tracking-wider"><i class="fas fa-running mr-1"></i>部活動</div>
                                    <div class="font-bold text-gray-800 text-sm">${info.club || '-'}</div>
                                </div>
                            </div>
                            <div>
                                <div class="text-[10px] text-gray-500 font-bold mb-2 uppercase tracking-wider px-1"><i class="fas fa-chart-line mr-1"></i>過去の定期テスト結果</div>
                                ${scoreHtml}
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="p-3 bg-blue-50 rounded-lg border border-blue-100">
                                    <div class="text-[10px] text-blue-600 font-bold mb-1 uppercase tracking-wider">得意科目</div>
                                    <div class="font-bold text-gray-800 text-sm">${info.good || '-'}</div>
                                </div>
                                <div class="p-3 bg-red-50 rounded-lg border border-red-100">
                                    <div class="text-[10px] text-red-600 font-bold mb-1 uppercase tracking-wider">苦手科目</div>
                                    <div class="font-bold text-gray-800 text-sm">${info.bad || '-'}</div>
                                </div>
                            </div>
                            <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                                <div class="text-[10px] text-gray-500 font-bold mb-1 uppercase tracking-wider"><i class="fas fa-sticky-note mr-1"></i>備考</div>
                                <div class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">${info.memo || 'なし'}</div>
                            </div>
                        </div>
                    </div>`;
            } catch (e) { content.innerHTML = `<div class="text-center py-10 text-red-500">通信エラーが発生しました。</div>`; }
        }

        function closeModal() { document.getElementById('student-modal').classList.add('hidden'); }
        function goBackToCalendar() { document.getElementById('view-details').classList.add('hidden'); document.getElementById('view-calendar').classList.remove('hidden'); }
        function goBackToCalendarFromList() { document.getElementById('view-student-list').classList.add('hidden'); document.getElementById('view-calendar').classList.remove('hidden'); }
    </script>
</body>
</html>
