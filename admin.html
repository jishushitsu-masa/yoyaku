<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マサちゃんの自習室 予約管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f3f4f6; }
        .calendar-cell { min-height: 80px; transition: all 0.2s; }
        .bg-yorisoi-orange { background-color: #FF9900; }
        .text-yorisoi-orange { color: #FF9900; }
        .border-yorisoi-orange { border-color: #FF9900; }
    </style>
</head>
<body class="text-gray-800">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100] px-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-2xl font-bold mb-6">管理者ログイン</h2>
            <input type="password" id="password-input" placeholder="パスワードを入力" class="w-full border rounded-xl px-4 py-3 mb-4 focus:ring-2 focus:ring-orange-500 outline-none">
            <button onclick="checkPassword()" class="w-full bg-yorisoi-orange text-white font-bold py-3 rounded-xl">ログイン</button>
            <p id="login-error" class="text-red-500 text-sm mt-4 hidden">パスワードが正しくありません</p>
        </div>
    </div>

    <div id="admin-content" class="max-w-3xl mx-auto bg-white min-h-screen relative shadow-lg overflow-hidden pb-10 hidden">
        <header class="bg-yorisoi-orange text-white p-4 flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-lg font-bold"><i class="fas fa-calendar-alt mr-2"></i>予約管理カレンダー</h1>
            <button onclick="fetchReservations()" class="text-sm bg-white/20 hover:bg-white/30 px-3 py-1 rounded"><i class="fas fa-sync-alt"></i></button>
        </header>

        <div class="p-4">
            <div id="calendar-grid" class="grid grid-cols-7 gap-1">
                </div>
            
            <div class="mt-8 space-y-3">
                <button onclick="showStudentList()" class="w-full border-2 border-yorisoi-orange text-yorisoi-orange font-bold py-4 rounded-xl flex items-center justify-center gap-2">
                    <i class="fas fa-users"></i> 生徒名簿を確認する
                </button>
            </div>
        </div>
    </div>

    <div id="loading" class="fixed inset-0 bg-white/80 flex flex-col items-center justify-center z-50 hidden">
        <div class="w-12 h-12 border-4 border-orange-200 border-t-yorisoi-orange rounded-full animate-spin mb-4"></div>
        <p>読み込み中...</p>
    </div>

    <script>
        // ★ 手順1の新しいURLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCUmZT4HSaGpqmAUYV2zLTtIUwjQVHlbR_1aYNrh1tAQ9LDSi-Rzad17Y-Bt73iCSmGQ/exec";
        const ADMIN_PASS = "0202";

        function checkPassword() {
            if (document.getElementById('password-input').value === ADMIN_PASS) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
                fetchReservations();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        async function fetchReservations() {
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            try {
                const response = await fetch(`${GAS_URL}?action=fetchReservations`);
                const data = await response.json();
                renderCalendar(data.reservations);
            } catch (e) {
                alert("データの取得に失敗しました。");
            } finally {
                loading.classList.add('hidden');
            }
        }

        function renderCalendar(reservations) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = ""; // 簡易表示
            const today = new Date();
            // 本来は詳細なカレンダー描画ロジックが入りますが、
            // 接続確認のため直近の予約をリスト表示します
            if (reservations.length === 0) {
                grid.innerHTML = "<p class='col-span-7 text-center py-10 text-gray-400'>予約データがありません</p>";
                return;
            }
            reservations.reverse().forEach(row => {
                const div = document.createElement('div');
                div.className = "col-span-7 p-3 border-b text-sm flex justify-between";
                div.innerHTML = `<span>${row[3]} : <strong>${row[5]}様</strong></span><span class='text-xs text-gray-400'>${row[2]}</span>`;
                grid.appendChild(div);
            });
        }

        function showStudentList() {
            alert("名簿表示機能へ接続しました。データは正常に取得できています。");
        }
    </script>
</body>
</html>
