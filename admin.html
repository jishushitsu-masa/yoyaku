<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">予約台帳（管理者用）</h1>
        
        <div class="bg-white shadow rounded-lg overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-200">
                    <tr>
                        <th class="p-3 border text-sm">日時</th>
                        <th class="p-3 border text-sm">会場</th>
                        <th class="p-3 border text-sm">日程・時間</th>
                        <th class="p-3 border text-sm">参加者</th>
                        <th class="p-3 border text-sm">電話番号</th>
                        <th class="p-3 border text-sm">プラン</th>
                    </tr>
                </thead>
                <tbody id="reservationTable">
                    <tr>
                        <td colspan="6" class="p-10 text-center text-gray-500">読み込み中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // ★ご自身のGAS URLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCUmZT4HSaGpqmAUYV2zLTtIUwjQVHlbR_1aYNrh1tAQ9LDSi-Rzad17Y-Bt73iCSmGQ/exec";

        async function fetchAll() {
            try {
                const response = await fetch(`${GAS_URL}?action=getAllReservations`);
                const data = await response.json();
                
                const table = document.getElementById('reservationTable');
                table.innerHTML = '';

                if (data.length === 0) {
                    table.innerHTML = '<tr><td colspan="6" class="p-10 text-center">予約はありません</td></tr>';
                    return;
                }

                // タイムスタンプの新しい順に並び替え
                data.reverse();

                data.forEach(res => {
                    const tr = document.createElement('tr');
                    
                    // 「休み」設定の行はグレーアウト
                    if (res.status === "休み") {
                        tr.className = "bg-gray-100 text-gray-400 italic";
                    } else {
                        tr.className = "hover:bg-gray-50";
                    }

                    tr.innerHTML = `
                        <td class="p-3 border text-xs">${res.timestamp}</td>
                        <td class="p-3 border text-sm">${res.location}${res.status === "休み" ? ' <span class="text-red-400 not-italic font-bold text-xs">[休み設定]</span>' : ''}</td>
                        <td class="p-3 border text-sm">${res.date}<br>${res.time}</td>
                        <td class="p-3 border text-sm font-bold">${res.participantName}<br><span class="text-xs font-normal text-gray-500">保護者: ${res.parentName}</span></td>
                        <td class="p-3 border text-sm">${res.phone}</td>
                        <td class="p-3 border text-sm">${res.plan}</td>
                    `;
                    table.appendChild(tr);
                });
            } catch (err) {
                alert("データの取得に失敗しました。");
            }
        }

        fetchAll();
    </script>
</body>
</html>
