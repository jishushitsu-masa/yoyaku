<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マサちゃんの自習室　予約管理画面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#4F46E5', 'brand-dark': '#4338CA' } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f3f4f6; }
        .calendar-cell { min-height: 80px; transition: all 0.2s; }
        @media (max-width: 640px) { .calendar-cell { min-height: 70px; } }
        .day-off-cell { background-color: #ebebeb !important; border-color: #d1d5db !important; }
        .modal-enter { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .score-table th { background-color: #f8fafc; font-size: 0.7rem; color: #64748b; padding: 4px; border-bottom: 2px solid #e2e8f0; }
        .score-table td { font-size: 0.8rem; padding: 6px 4px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .score-total { font-weight: bold; color: #4F46E5; }
    </style>
</head>
<body class="text-gray-800">

    <div class="max-w-3xl mx-auto bg-white min-h-screen relative shadow-lg overflow-hidden pb-10">
        
        <header class="bg-gray-800 text-white p-4 flex justify-between items-center sticky top-0 z-10">
            <h1 class="text-lg font-bold"><i class="fas fa-lock mr-2"></i>自習室　予約管理カレンダー</h1>
            <button id="btn-refresh" onclick="fetchReservations()" class="text-sm bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded hidden"><i class="fas fa-sync-alt mr-1"></i>更新</button>
        </header>

        <div id="view-student-list" class="p-4 hidden bg-gray-100 min-h-screen">
            <div class="flex items-center justify-between mb-4 mt-2">
                <button onclick="goBackToCalendarFromList()" class="bg-white border border-gray-300 text-gray-600 px-4 py-2 rounded shadow-sm hover:bg-gray-50 flex items-center font-bold text-sm">
                    <i class="fas fa-arrow-left mr-2"></i>戻る
                </button>
                <button onclick="openStudentEditModal()" class="bg-orange-500 text-white px-4 py-2 rounded shadow font-bold text-sm">新規登録</button>
            </div>
            <div id="student-name-list" class="grid grid-cols-1 gap-2"></div>
        </div>

        <div id="student-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
            <div class="absolute inset-0 bg-black bg-opacity-50" onclick="closeModal()"></div>
            <div class="bg-white w-11/12 max-w-lg rounded-xl shadow-2xl z-10 overflow-hidden modal-enter">
                <div class="bg-brand text-white px-5 py-4 flex justify-between items-center">
                    <h3 class="font-bold text-lg">生徒カルテ</h3>
                    <div class="flex items-center gap-3">
                        <button id="btn-edit-student" class="text-white hover:text-orange-200 text-sm font-bold"><i class="fas fa-edit"></i> 編集</button>
                        <button onclick="closeModal()" class="text-white text-2xl">&times;</button>
                    </div>
                </div>
                <div id="modal-content" class="p-6 space-y-5 max-h-[75vh] overflow-y-auto"></div>
                <div class="bg-gray-50 p-4 border-t border-gray-100 flex justify-between">
                    <button id="btn-delete-student" class="text-red-500 text-sm font-bold">データを削除</button>
                    <button onclick="closeModal()" class="bg-gray-500 text-white px-6 py-2 rounded font-bold">閉じる</button>
                </div>
            </div>
        </div>

        <div id="edit-student-modal" class="fixed inset-0 z-[60] flex items-center justify-center hidden">
            <div class="absolute inset-0 bg-black bg-opacity-60" onclick="closeEditModal()"></div>
            <div class="bg-white w-11/12 max-w-lg rounded-xl shadow-2xl z-10 overflow-hidden">
                <div class="bg-orange-500 text-white px-5 py-4 flex justify-between items-center">
                    <h3 class="font-bold">生徒情報の編集</h3>
                    <button onclick="closeEditModal()" class="text-2xl">&times;</button>
                </div>
                <form id="student-edit-form" class="p-6 space-y-3 overflow-y-auto max-h-[60vh]">
                    <input type="hidden" name="name"> <div><label class="text-xs text-gray-400">氏名</label><input type="text" id="edit-name-display" disabled class="w-full border p-2 bg-gray-50"></div>
                    <div><label class="text-xs text-gray-400">ふりがな</label><input type="text" name="furigana" class="w-full border p-2"></div>
                    <div><label class="text-xs text-gray-400">学校</label><input type="text" name="school" class="w-full border p-2"></div>
                    <div><label class="text-xs text-gray-400">学年</label><input type="text" name="grade" class="w-full border p-2"></div>
                    <div><label class="text-xs text-gray-400">備考</label><textarea name="memo" class="w-full border p-2"></textarea></div>
                </form>
                <div class="p-4 border-t"><button onclick="saveStudent()" class="w-full bg-orange-500 text-white font-bold py-3 rounded">保存する</button></div>
            </div>
        </div>
    </div>

    <script>
        // JS部分は admin (3).html をベースに、saveStudent, deleteStudent などの処理関数を末尾に追加するだけです。
        // (マサちゃんの環境に合わせて GAS_URL を設定してください)
        
        // ... (既存の fetchReservations, showDetails などの関数) ...

        async function saveStudent() {
            const form = document.getElementById('student-edit-form');
            const studentData = {
                name: form.name.value,
                furigana: form.furigana.value,
                school: form.school.value,
                grade: form.grade.value,
                memo: form.memo.value
                // 他の項目も必要に応じて追加
            };
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "updateStudent", studentData }) });
            const result = await res.json();
            if (result.status === "success") { alert("保存しました"); location.reload(); }
        }
        
        // (以下、削除や編集画面を開くための補助関数を追加)
    </script>
</body>
</html>
