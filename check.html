<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約キャンセル | 元塾講師マサちゃんの自習室</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>予約キャンセル</h1>
      <p>ご予約の取り消しを行います</p>
    </header>

    <div class="card" id="cancelCard">
      <div id="loaderArea" class="hidden"></div>
      <div id="confirmArea">
        <p style="text-align: center; margin-bottom: 2rem;">本当に予約をキャンセルしますか？<br>この操作は取り消せません。</p>
        <button id="cancelBtn" class="btn btn-danger">予約をキャンセルする</button>
      </div>
      <div id="messageArea" class="hidden"></div>
    </div>
  </div>

  <script src="index.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const uuid = getQueryParam('id');
      if (!uuid) {
        document.getElementById('confirmArea').classList.add('hidden');
        showMessage('messageArea', '無効なアクセスです。URLをご確認ください。', true);
        return;
      }

      document.getElementById('cancelBtn').addEventListener('click', async () => {
        document.getElementById('confirmArea').classList.add('hidden');
        showLoader('loaderArea');

        const result = await apiFetch('cancel', { uuid: uuid });

        hideLoader('loaderArea');
        if (result.status === 'success') {
          showMessage('messageArea', '予約のキャンセルが完了しました。');
        } else {
          showMessage('messageArea', result.message || 'キャンセル処理に失敗しました。', true);
        }
      });
    });
  </script>
</body>
</html>
