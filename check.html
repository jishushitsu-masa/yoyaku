<script>
    // ... LIFF初期化等の部分は変更なし ...

    async function fetchUserReservations() {
      try {
        const res = await apiFetch('getUserReservations', { lineUserId: lineUserId });
        document.getElementById('loader').style.display = 'none';
        
        const listEl = document.getElementById('reservationList');
        listEl.innerHTML = '';

        if (res.status === 'success' && res.data && res.data.length > 0) {
          res.data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'res-card';
            // エリアと会場名を分けて表示するように変更
            card.innerHTML = `
              <div class="res-venue">【${item.area}】${item.venue}</div>
              <div class="res-date">${item.date}</div>
              <div class="res-time">${item.time}</div>
              <div class="res-student">参加者: ${item.studentName} さん</div>
              <button class="btn-cancel-mini" onclick="goToCancelPage('${item.cancelId}')">キャンセル</button>
            `;
            listEl.appendChild(card);
          });
        } else {
          listEl.innerHTML = '<div class="no-data"><p>現在、有効な予約はありません。</p></div>';
        }
      } catch (e) {
        document.getElementById('loader').style.display = 'none';
        console.error(e);
      }
    }
</script>
