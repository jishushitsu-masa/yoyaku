<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無料体験申込フォーム | まさちゃんの自習室</title>
<style>
body { font-family: sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 20px auto; padding: 0 15px; }
.container { border: 1px solid #ddd; padding: 20px; border-radius: 8px; background: #f9f9f9; }
h1 { font-size: 1.5rem; text-align: center; color: #2c3e50; }
.form-group { margin-bottom: 15px; }
label { display: block; font-weight: bold; margin-bottom: 5px; }
input[type="text"], input[type="tel"], input[type="email"], select, textarea {
width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
}
button {
width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 1.1rem; cursor: pointer;
}
button:hover { background: #219150; }
#completion-message { display: none; text-align: center; padding: 20px; }
/* 不要な閉じるボタン等は削除済み */
</style>
</head>
<body>

<div class="container" id="form-container">
<h1>無料体験申込</h1>
<form id="trial-form">
<div class="form-group">
<label>保護者様お名前</label>
<input type="text" name="guardian_name" required placeholder="例：山田 太郎">
</div>
<div class="form-group">
<label>お子様（参加者）お名前</label>
<input type="text" name="participant_name" required placeholder="例：山田 花子">
</div>
<div class="form-group">
<label>電話番号</label>
<input type="tel" name="tel" required placeholder="例：09012345678">
</div>
<div class="form-group">
<label>メールアドレス</label>
<input type="email" name="email" required>
</div>
<div class="form-group">
<label>希望会場</label>
<select name="venue" required>
<option value="">選択してください</option>
<option value="須坂会場">須坂会場</option>
<option value="小布施会場">小布施会場</option>
</select>
</div>
<div class="form-group">
<label>希望日時</label>
<input type="text" name="date" required placeholder="例：5月10日 18:00〜">
</div>
<div class="form-group">
<label>備考・ご質問</label>
<textarea name="message" rows="3"></textarea>
</div>
<button type="submit" id="submit-btn">この内容で申し込む</button>
</form>
</div>

<div id="completion-message">
<h2>お申し込みありがとうございます</h2>
<p>内容を確認し、折り返しLINEまたはメールにてご連絡いたします。</p>
</div>

<script>
const form = document.getElementById('trial-form');
const formContainer = document.getElementById('form-container');
const completionMessage = document.getElementById('completion-message');

// 連携先のGAS URLをここに貼り付けてください
const GAS_URL = 'GAS_URL_HERE';

form.addEventListener('submit', function(e) {
e.preventDefault();
const submitBtn = document.getElementById('submit-btn');
submitBtn.innerText = '送信中...';
submitBtn.disabled = true;

const formData = new FormData(form);
const data = new URLSearchParams(formData);

fetch(GAS_URL, {
method: 'POST',
body: data,
mode: 'no-cors' // GASへの送信で一般的な設定
})
.then(() => {
formContainer.style.display = 'none';
completionMessage.style.display = 'block';
})
.catch(error => {
alert('送信に失敗しました。時間をおいて再度お試しください。');
submitBtn.innerText = 'この内容で申し込む';
submitBtn.disabled = false;
});
});
</script>

</body>
</html>
