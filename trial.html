<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料体験申し込み | 元塾講師マサちゃんの自習室</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .whitespace-pre-wrap { white-space: pre-wrap; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-3xl mx-auto py-12 px-6 text-center">
            <h1 class="text-2xl sm:text-4xl font-bold tracking-tight mb-3">元塾講師マサちゃんの自習室</h1>
            <div class="inline-block px-4 py-1 bg-blue-500 rounded-full text-sm font-medium">無料体験申し込み</div>
        </div>
    </header>

    <main class="flex-grow flex items-start justify-center py-12 px-4 sm:px-6">
        <div class="max-w-2xl w-full bg-white p-6 sm:p-10 rounded-2xl shadow-xl border border-slate-200">
            <form id="application-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">会場 <span class="text-red-500">*</span></label>
                    <select id="location" name="location" required class="block w-full rounded-lg border-slate-300 py-3">
                        <option value="" disabled selected>会場を選択してください</option>
                        <option value="おぶせ岩松院 (火・金 19:00～21:00)">おぶせ岩松院 (火・金 19:00～21:00)</option>
                        <option value="すざかbota (月・木 18:00～20:00)">すざかbota (月・木 18:00～20:00)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">体験希望日 <span class="text-red-500">*</span></label>
                    <input type="text" id="date" name="date" required disabled placeholder="先に会場を選択してください" class="block w-full rounded-lg border-slate-300 py-3 px-4">
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">学年 <span class="text-red-500">*</span></label>
                        <select name="grade" required class="block w-full rounded-lg border-slate-300 py-3">
                            <option value="中学1年">中学1年</option><option value="中学2年">中学2年</option><option value="中学3年">中学3年</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">生徒氏名 <span class="text-red-500">*</span></label>
                        <input type="text" name="student_name" required placeholder="長野 太郎" class="block w-full rounded-lg border-slate-300 py-3">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">保護者氏名 <span class="text-red-500">*</span></label>
                    <input type="text" name="parent_name" required placeholder="長野 花子" class="block w-full rounded-lg border-slate-300 py-3">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">電話番号 <span class="text-red-500">*</span></label>
                    <input type="tel" name="phone" required placeholder="09012345678" class="block w-full rounded-lg border-slate-300 py-3">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">メールアドレス <span class="text-red-500">*</span></label>
                    <input type="email" name="email" required placeholder="sample@example.com" class="block w-full rounded-lg border-slate-300 py-3">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">その他備考欄（質問等）</label>
                    <textarea name="remarks" rows="3" placeholder="学習上の悩みや、当日聞きたいことなどあればご自由にご記入ください。" class="block w-full rounded-lg border-slate-300 focus:border-blue-500 focus:ring-blue-500"></textarea>
                </div>
                <div class="pt-6">
                    <button type="submit" id="submit-btn" class="w-full flex justify-center items-center py-4 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition-all active:scale-95">
                        <span id="btn-text">内容を確認して送信する</span>
                        <div id="btn-loader" class="hidden ml-3 loader"></div>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div id="success-modal" class="hidden fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 px-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
                <svg class="h-8 w-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-900 mb-4">お申し込みを承りました！</h3>
            <p id="mail-preview" class="text-slate-600 mb-8 whitespace-pre-wrap text-left bg-slate-50 p-4 rounded-lg border border-slate-200"></p>
            <button onclick="location.reload()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-700 transition-colors">閉じる</button>
        </div>
    </div>

    <script>
        // ★GASのウェブアプリURLを確認してください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxttkZCbZqWOemE2gJEaveXeSLae8s9OD54zkvyPTZdQTSxmpoakdMtRKDjaNEG98JI/exec";

        document.addEventListener('DOMContentLoaded', function() {
            const locationSelect = document.getElementById('location');
            const dateInput = document.getElementById('date');
            const form = document.getElementById('application-form');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            
            // カレンダーの初期化
            let fp = flatpickr(dateInput, { 
                locale: "ja", 
                minDate: "today", 
                dateFormat: "Y年m月d日(D)", 
                disable: [() => true] 
            });

            // 会場選択時のバグ修正版
            locationSelect.addEventListener('change', function() {
                dateInput.removeAttribute('disabled');
                dateInput.placeholder = "日付を選択してください";

                let disableFunc;
                // 「おぶせ」が含まれる場合
                if (this.value.includes('おぶせ')) {
                    disableFunc = (d => d.getDay() !== 2 && d.getDay() !== 5); // 火・金以外を無効
                } else {
                    disableFunc = (d => d.getDay() !== 1 && d.getDay() !== 4); // 月・木以外を無効
                }

                // 古い設定を破棄して作り直すことで確実に反映させる
                fp.destroy();
                fp = flatpickr(dateInput, { 
                    locale: "ja", 
                    minDate: "today", 
                    dateFormat: "Y年m月d日(D)", 
                    disable: [disableFunc] 
                });
                
                fp.clear();
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                submitBtn.disabled = true;
                btnText.textContent = "送信中...";
                btnLoader.classList.remove('hidden');
                
                const fd = new FormData(form);
                const payload = Object.fromEntries(fd.entries());

                try {
                    await fetch(GAS_URL, { 
                        method: 'POST', 
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload) 
                    });
                    
                    document.getElementById('mail-preview').textContent = 
                        `${payload.parent_name} 様\n\nお申し込みありがとうございます。\n\n【控え】\n会場：${payload.location}\n希望日：${payload.date}\n生徒：${payload.student_name} 様\n\n確認メールをお送りしました。`;
                    document.getElementById('success-modal').classList.remove('hidden');
                } catch (err) { 
                    alert("送信エラーが発生しました。"); 
                } finally {
                    submitBtn.disabled = false;
                    btnText.textContent = "内容を確認して送信する";
                    btnLoader.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
