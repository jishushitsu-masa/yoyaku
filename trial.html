<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyDCVMhbQ4N_j8SXy5QCpaIMtDmMpOwfdYInGcTwZofQomfGqui4iI65KPtShW5J1D5gg/exec';
    let allSchedule = [];

    async function apiFetch(action, data = {}) {
      try {
        const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, ...data }) });
        return await response.json();
      } catch (e) { return { status: 'error' }; }
    }

    window.onload = async () => {
      const res = await apiFetch('getSchedule');
      if (res.status === 'success') allSchedule = res.data;
    };

    const header = document.getElementById('accordion-header');
    const content = document.getElementById('accordion-content');
    header.onclick = () => {
      if (document.querySelector('input[name="venue"]:checked')) {
        header.classList.toggle('active');
        content.classList.toggle('open');
      }
    };

    document.getElementsByName('venue').forEach(el => {
      el.onchange = () => {
        const venue = el.value;
        header.classList.remove('active');
        content.classList.remove('open');
        updateScheduleList(venue);
      };
    });

    function updateScheduleList(venue) {
      const list = document.getElementById('schedule-list');
      list.innerHTML = '';
      const today = new Date();
      // 時間を除いた今日の日付（yyyy/MM/dd）
      const todayStr = today.getFullYear() + "/" + ("0"+(today.getMonth()+1)).slice(-2) + "/" + ("0"+today.getDate()).slice(-2);

      // エラー箇所を修正：item['会場'] が存在するかチェックを追加
      const filtered = allSchedule.filter(item => {
        if (!item['会場'] || !item['日付']) return false; 
        return item['会場'].indexOf(venue) !== -1 && !item.isYasumi && item['日付'] >= todayStr;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<p style="padding:1rem; color:var(--text-muted);">現在選択可能な日程がありません</p>';
        return;
      }

      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'schedule-item';
        div.innerHTML = `<span>${item['日付']}</span><span class="status-badge">${item['時間'] || '実施'}</span>`;
        div.onclick = () => {
          document.getElementById('selected-date-text').textContent = `${item['日付']} ${item['時間'] || ''}`;
          document.getElementById('input-date').value = item['日付'];
          document.getElementById('input-time').value = item['時間'] || '';
          header.classList.remove('active');
          content.classList.remove('open');
        };
        list.appendChild(div);
      });
    }

    document.getElementById('trial-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      const res = await apiFetch('trial', data);
      if (res.status === 'success') {
        document.getElementById('form-card').classList.add('hidden');
        document.getElementById('success-card').classList.remove('hidden');
      } else {
        alert('送信に失敗しました');
        btn.disabled = false;
      }
    };
</script>
