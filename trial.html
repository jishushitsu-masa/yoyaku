<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無料体験 申込フォーム | 元塾講師マサちゃんの自習室</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>無料体験 申込フォーム</h1>
      <p>元塾講師マサちゃんの自習室</p>
    </header>

    <div class="card">
      <form id="trialForm">
        <div class="form-group">
          <label for="venue">希望会場</label>
          <select id="venue" required>
            <option value="">選択してください</option>
            <option value="小布施">小布施会場</option>
            <option value="須坂">須坂会場</option>
          </select>
        </div>

        <div class="form-group">
          <label for="studentName">生徒名 (フルネーム)</label>
          <input type="text" id="studentName" required placeholder="例: 山田 太郎">
        </div>
        <div class="form-group">
          <label for="furigana">ふりがな</label>
          <input type="text" id="furigana" required placeholder="例: やまだ たろう">
        </div>

        <div class="form-group">
          <label for="parentName">保護者名 (フルネーム)</label>
          <input type="text" id="parentName" required placeholder="例: 山田 花子">
        </div>

        <div class="form-group">
          <label for="phone">電話番号</label>
          <input type="tel" id="phone" required placeholder="例: 090-1234-5678">
        </div>

        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" required placeholder="例: example@example.com">
        </div>

        <div class="form-group">
          <label for="date">希望日</label>
          <input type="date" id="date" required>
        </div>

        <div id="messageArea" class="hidden"></div>

        <button type="submit" class="btn btn-primary" id="submitBtn">体験を申し込む</button>
      </form>
    </div>
  </div>

  <script src="index.js"></script>
  <script>
    document.getElementById('trialForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = '送信中...';

      const data = {
        venue: document.getElementById('venue').value,
        studentName: document.getElementById('studentName').value,
        furigana: document.getElementById('furigana').value,
        parentName: document.getElementById('parentName').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        date: document.getElementById('date').value.replace(/-/g, '/')
      };

      const result = await apiFetch('trial', data);

      if (result.status === 'success') {
        document.getElementById('trialForm').innerHTML = `
          <div style="text-align: center; padding: 2rem 0;">
            <h2 style="color: var(--secondary); margin-bottom: 1rem;">お申し込み完了</h2>
            <p>ご入力いただいたメールアドレス宛に<br>確認メールを送信しました。</p>
          </div>
        `;
      } else {
        showMessage('messageArea', result.message || '処理に失敗しました。', true);
        submitBtn.disabled = false;
        submitBtn.textContent = '体験を申し込む';
      }
    });
  </script>
</body>
</html>
