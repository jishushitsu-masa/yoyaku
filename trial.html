<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>体験申し込み</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">
    <h1>体験申し込み</h1>
    <form id="trialForm">
      <input type="text" id="studentName" placeholder="生徒名" required>
      <input type="text" id="parentName" placeholder="保護者名" required>
      <input type="tel" id="phone" placeholder="電話番号" required>
      <button type="button" onclick="submitTrial()">申し込む</button>
    </form>
  </div>

  <script src="index.js"></script>
  <script>
    async function submitTrial() {
      const data = {
        action: 'trial',
        studentName: document.getElementById('studentName').value,
        parentName: document.getElementById('parentName').value,
        phone: document.getElementById('phone').value,
        // エリアや会場、日付などは以前の取得ロジックのままJSONにまとめます
        area: '体験エリア', // 実際にはフォームの値を取得
        venue: '体験会場',
        date: '未定',
        time: '未定',
        grade: '未定'
      };

      const res = await apiFetch('trial', data);
      if (res.status === 'success') {
        alert('申し込みが完了しました！');
      }
    }
  </script>
</body>
</html>
