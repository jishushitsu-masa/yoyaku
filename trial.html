<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料体験申し込み | 元塾講師マサちゃんの自習室</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fffaf5; }
        .bg-yorisoi-orange { background-color: #FF9900; }
        .text-yorisoi-orange { color: #FF9900; }
        .border-yorisoi-orange { border-color: #FF9900; }
        .focus-ring-orange:focus { --tw-ring-color: #FF9900; border-color: #FF9900; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #FF9900; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .whitespace-pre-wrap { white-space: pre-wrap; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-yorisoi-orange text-white shadow-lg">
        <div class="max-w-3xl mx-auto py-10 px-6 text-center">
            <h1 class="text-2xl sm:text-3xl font-bold tracking-tight mb-2">元塾講師マサちゃんの自習室</h1>
            <div class="inline-block px-4 py-1 bg-white/20 rounded-full text-sm font-medium">無料体験申し込みフォーム</div>
        </div>
    </header>

    <main class="flex-grow flex items-start justify-center py-10 px-4 sm:px-6">
        <div class="max-w-2xl w-full bg-white p-6 sm:p-10 rounded-2xl shadow-xl border border-orange-100">
            <form id="application-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">会場 <span class="text-red-500">*</span></label>
                    <select id="location" name="location" required class="block w-full rounded-lg border-slate-300 py-3 focus-ring-orange">
                        <option value="" disabled selected>会場を選択してください</option>
                        <option value="小布施会場">小布施会場 (火・金 19:00～21:00)</option>
                        <option value="須坂会場">須坂会場 (月・木 18:00～20:00)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">体験希望日 <span class="text-red-500">*</span></label>
                    <input type="text" id="date" name="date" required disabled placeholder="先に会場を選択してください" class="block w-full rounded-lg border-slate-300 py-3 px-4 focus-ring-orange">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">学年 <span class="text-red-500">*</span></label>
                        <select name="grade" required class="block w-full rounded-lg border-slate-300 py-3 focus-ring-orange">
                            <option value="中学1年">中学1年</option>
                            <option value="中学2年">中学2年</option>
                            <option value="中学3年">中学3年</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">生徒氏名 <span class="text-red-500">*</span></label>
                        <input type="text" name="student_name" required placeholder="例：須坂 太郎" class="block w-full rounded-lg border-slate-300 py-3 focus-ring-orange">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">保護者氏名 <span class="text-red-500">*</span></label>
                    <input type="text" name="parent_name" required placeholder="例：須坂 花子" class="block w-full rounded-lg border-slate-300 py-3 focus-ring-orange">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">電話番号 <span class="text-red-500">*</span></label>
                    <input type="tel" name="phone" required placeholder="09012345678" class="block w-full rounded-lg border-slate-300 py-3 focus-ring-orange">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">メールアドレス <span class="text-red-500">*</span></label>
                    <input type="email" name="email" required placeholder="sample@example.com" class="block w-full rounded-lg border-slate-300 py-3 focus-ring-orange">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">その他備考欄（質問等）</label>
                    <textarea name="remarks" rows="3" placeholder="ご質問などあればご記入ください。" class="block w-full rounded-lg border-slate-300 focus-ring-orange"></textarea>
                </div>

                <div class="pt-6">
                    <button type="submit" id="submit-btn" class="w-full flex justify-center items-center py-4 bg-yorisoi-orange text-white rounded-xl font-bold hover:opacity-90 transition-all active:scale-95 shadow-md">
                        <span id="btn-text">内容を確認して送信する</span>
                        <div id="btn-loader" class="hidden ml-3 loader"></div>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div id="success-modal" class="hidden fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 px-4 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full text-center border-t-8 border-yorisoi-orange">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-orange-100 mb-6">
                <svg class="h-8 w-8 text-yorisoi-orange" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
            </div>
            <h3 class="text-2xl font-bold text-slate-900 mb-4">お申し込みを承りました</h3>
            <p id="mail-preview" class="text-slate-600 mb-8 whitespace-pre-wrap text-left bg-orange-50 p-4 rounded-lg border border-orange-100 text-sm"></p>
            <button onclick="location.reload()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-700 transition-colors">閉じる</button>
        </div>
    </div>

    <script>
        // ★ 手順1で新しく発行したGASのURLに書き換えてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzjWWuwi7fcekeCj4B3EukdStq246Urb0v3NfBIv7jA4voPVcVnNPDnKJE_fL7cWmAh/exec";

        document.addEventListener('DOMContentLoaded', function() {
            const locationSelect = document.getElementById('location');
            const dateInput = document.getElementById('date');
            const form = document.getElementById('application-form');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            
            const fp = flatpickr(dateInput, { locale: "ja", minDate: "today", dateFormat: "Y/m/d", disable: [() => true] });

            locationSelect.addEventListener('change', function() {
                dateInput.removeAttribute('disabled');
                let disableFunc = this.value.includes('小布施') ? (d => d.getDay()!==2 && d.getDay()!==5) : (d => d.getDay()!==1 && d.getDay()!==4);
                fp.set('disable', [disableFunc]);
                fp.clear();
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                submitBtn.disabled = true;
                btnText.textContent = "送信中...";
                btnLoader.classList.remove('hidden');
                
                const formData = new FormData(form);
                const params = new URLSearchParams(formData);

                try {
                    await fetch(GAS_URL, { 
                        method: 'POST', 
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: params.toString() 
                    });
                    
                    document.getElementById('mail-preview').textContent = 
                        `${formData.get('parent_name')} 様\n\nお申し込みありがとうございます。\n\n・会場：${formData.get('location')}\n・希望日：${formData.get('date')}\n・生徒：${formData.get('student_name')} 様\n\nマサちゃんより折り返しご連絡いたします。`;
                    document.getElementById('success-modal').classList.remove('hidden');
                } catch (err) { 
                    alert("送信エラーが発生しました。"); 
                } finally {
                    submitBtn.disabled = false;
                    btnText.textContent = "内容を確認して送信する";
                    btnLoader.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
