<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>無料体験申込 | まさちゃんの自習室</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap');
    :root {
      --primary: #4F46E5;
      --secondary: #10B981;
      --background: #F3F4F6;
      --surface: #FFFFFF;
      --text-main: #1F2937;
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: var(--background); color: var(--text-main); padding: 1rem; }
    .container { max-width: 500px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 1.5rem; }
    header h1 { font-size: 1.5rem; color: var(--primary); }
    .card { background: var(--surface); border-radius: var(--radius); box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 1.5rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
    input, select, textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; }
    input:focus { border-color: var(--primary); }
    
    /* エリア選択ボタン */
    .radio-group { display: flex; gap: 0.5rem; }
    .radio-card { flex: 1; position: relative; }
    .radio-card input { position: absolute; opacity: 0; }
    .radio-card label { display: block; text-align: center; padding: 0.8rem; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: #F9FAFB; transition: all 0.2s; }
    .radio-card input:checked + label { border-color: var(--primary); background: #EEF2FF; color: var(--primary); font-weight: bold; }

    /* アコーディオン */
    .accordion-header { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1rem; background: #F9FAFB; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; }
    .accordion-header.active { border-color: var(--primary); border-radius: 8px 8px 0 0; }
    .accordion-content { display: none; max-height: 250px; overflow-y: auto; border: 2px solid var(--primary); border-top: none; border-radius: 0 0 8px 8px; background: #fff; }
    .accordion-content.open { display: block; }
    .schedule-item { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; }
    .schedule-item:hover { background: #F3F4F6; }
    .status-badge { font-size: 0.75rem; background: #EEF2FF; color: var(--primary); padding: 2px 8px; border-radius: 99px; font-weight: bold; }

    .btn-primary { width: 100%; padding: 1rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; background: var(--primary); color: white; margin-top: 1rem; transition: opacity 0.2s; }
    .btn-primary:disabled { background: #9CA3AF; cursor: not-allowed; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header><h1>無料体験申込</h1></header>
    <div class="card" id="form-card">
      <form id="trial-form">
        <div class="form-group">
          <label>エリアを選択</label>
          <div class="radio-group">
            <div class="radio-card">
              <input type="radio" name="area_select" value="おぶせ" id="area-obuse" required>
              <label for="area-obuse">おぶせ</label>
            </div>
            <div class="radio-card">
              <input type="radio" name="area_select" value="すざか" id="area-suzaka">
              <label for="area-suzaka">すざか</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>体験希望日</label>
          <div class="accordion-header" id="accordion-header">
            <span id="selected-date-text">先にエリアを選択してください</span>
            <span>▼</span>
          </div>
          <div class="accordion-content" id="accordion-content">
            <div id="schedule-list"></div>
          </div>
          <!-- GAS送信用隠しフィールド -->
          <input type="hidden" name="area" id="input-area">
          <input type="hidden" name="venueDetail" id="input-venueDetail">
          <input type="hidden" name="date" id="input-date" required>
          <input type="hidden" name="time" id="input-time">
        </div>

        <div style="display:flex; gap:1rem; margin-bottom:1.2rem;">
          <div style="flex:1;">
            <label>学年</label>
            <select name="grade" required>
              <option value="">選択</option>
              <option value="中1">中1</option>
              <option value="中2">中2</option>
              <option value="中3">中3</option>
            </select>
          </div>
          <div style="flex:2;">
            <label>生徒氏名</label>
            <input type="text" name="studentName" required placeholder="例: 長野 太郎">
          </div>
        </div>

        <div class="form-group"><label>保護者様お名前</label><input type="text" name="parentName" required placeholder="例: 長野 花子"></div>
        <div class="form-group"><label>電話番号</label><input type="tel" name="phone" required placeholder="例: 09012345678"></div>
        <div class="form-group"><label>メールアドレス</label><input type="email" name="email" required placeholder="sample@example.com"></div>
        <div class="form-group"><label>その他備考欄（質問等）</label><textarea name="message" rows="3" placeholder="学習上の悩みや、当日聞きたいことなどあればご自由にご記入ください。"></textarea></div>

        <button type="submit" class="btn btn-primary" id="submit-btn">この内容で申し込む</button>
      </form>
    </div>
    
    <div class="card hidden" id="success-card" style="text-align:center; padding:3rem 1.5rem;">
      <h2 style="color:var(--secondary);">申込完了</h2>
      <p style="margin-top:1rem;">無料体験のお申込みありがとうございます。<br><br>ご登録のメールアドレスへ予約内容をお送りいたしました。<br>当日はどうぞよろしくお願いいたします。</p>
    </div>
  </div>

  <script src="index.js"></script>
  <script>
    let scheduleData = [];
    let lineUserId = "";
    const accordionHeader = document.getElementById('accordion-header');
    const scheduleList = document.getElementById('schedule-list');
    const content = document.getElementById('accordion-content');

    // LIFF init (if available)
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await liff.init({ liffId: "2009652448-yEc3eycW" }); 
        if (liff.isLoggedIn()) {
          const p = await liff.getProfile();
          lineUserId = p.userId;
        }
      } catch (e) { console.log('LIFF init failed', e); }

      // 最初にスケジュールを裏で読み込んでおく
      const res = await apiFetch('getSchedule');
      if (res.status === 'success') {
        scheduleData = res.data;
        const selectedArea = document.querySelector('input[name="area_select"]:checked');
        if (selectedArea) updateScheduleList(selectedArea.value);
      }
    });

    document.getElementsByName('area_select').forEach(el => {
      el.onchange = () => {
        accordionHeader.classList.remove('active');
        content.classList.remove('open');
        document.getElementById('selected-date-text').textContent = "タップして日程を選択してください";
        document.getElementById('input-date').value = "";
        document.getElementById('input-time').value = "";
        document.getElementById('input-venueDetail').value = "";
        document.getElementById('input-area').value = el.value;
        updateScheduleList(el.value);
      };
    });

    accordionHeader.onclick = () => {
      const selectedArea = document.querySelector('input[name="area_select"]:checked');
      if (selectedArea) {
        accordionHeader.classList.toggle('active');
        content.classList.toggle('open');
      } else {
        alert('先にエリアを選択してください');
      }
    };

    function updateScheduleList(selectedArea) {
      scheduleList.innerHTML = '';
      const today = new Date(); today.setHours(0,0,0,0);
      const limit = new Date(); limit.setDate(today.getDate() + 14);

      const filtered = scheduleData.filter(item => {
        const dateStr = String(item['日付']).split('T')[0].replace(/-/g, '/');
        const d = new Date(dateStr);
        return (item['エリア'] === selectedArea) && !isNaN(d) && d >= today && d <= limit;
      });

      if (filtered.length === 0) { 
        scheduleList.innerHTML = '<p style="text-align:center;padding:1rem;">予約可能な日程がありません。</p>'; 
        return; 
      }
      
      filtered.forEach(item => {
        const isOff = item['休み'] === '休み';
        const dateStr = String(item['日付']).split('T')[0].replace(/-/g, '/');
        const d = new Date(dateStr);
        const day = ["日","月","火","水","木","金","土"][d.getDay()];
        const displayDate = `${d.getMonth()+1}/${d.getDate()}(${day})`;
        const submitDate = `${d.getFullYear()}/${('0'+(d.getMonth()+1)).slice(-2)}/${('0'+d.getDate()).slice(-2)}`;
        
        const div = document.createElement('div');
        div.className = `schedule-item ${isOff ? 'disabled' : 'selectable'}`;
        // obuse.html/suzaka.htmlと同じスタイル適用
        div.style.padding = "10px"; div.style.borderBottom = "1px solid #eee";
        div.innerHTML = `<div><b>${displayDate} ${item['時間'] || ''}</b> ${isOff ? '<small style="color:red;">(休み)</small>' : ''}<br><small>場所：${item['会場名']}</small></div>`;
        
        if (!isOff) {
          div.onclick = () => {
            document.getElementById('input-date').value = submitDate;
            document.getElementById('input-venueDetail').value = item['会場名'];
            document.getElementById('input-time').value = item['時間'] || '';
            document.getElementById('selected-date-text').innerHTML = `<b>${displayDate} ${item['時間'] || ''}</b><br><small>場所：${item['会場名']}</small>`;
            content.classList.remove('open'); accordionHeader.classList.remove('active');
          };
        } else {
          div.style.opacity = "0.5"; div.style.cursor = "not-allowed";
        }
        scheduleList.appendChild(div);
      });
    }

    document.getElementById('trial-form').onsubmit = async (e) => {
      e.preventDefault();
      
      if (!document.getElementById('input-date').value) {
        alert("日程を選択してください");
        return;
      }
      
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerText = "送信中...";
      
      const res = await apiFetch('reserve', {
        area: document.getElementById('input-area').value,
        venue: document.getElementById('input-venueDetail').value,
        studentName: document.querySelector('input[name="studentName"]').value,
        parentName: document.querySelector('input[name="parentName"]').value,
        phone: document.querySelector('input[name="phone"]').value,
        email: document.querySelector('input[name="email"]').value,
        grade: document.querySelector('select[name="grade"]').value,
        message: document.querySelector('textarea[name="message"]').value,
        duration: "無料体験",
        date: document.getElementById('input-date').value,
        time: document.getElementById('input-time').value,
        lineUserId: lineUserId,
        applicationType: "体験"
      });
      
      if (res.status === 'success') {
        if (liff.isInClient()) {
          liff.sendMessages([{ type: "text", text: "📅 予約登録" }])
            .then(() => liff.closeWindow())
            .catch(e => {
              console.error(e);
              document.getElementById('form-card').classList.add('hidden');
              document.getElementById('success-card').classList.remove('hidden');
              window.scrollTo(0, 0);
            });
        } else {
          document.getElementById('form-card').classList.add('hidden');
          document.getElementById('success-card').classList.remove('hidden');
          window.scrollTo(0, 0);
        }
      } else { 
        alert(res.message || "予約に失敗しました。"); 
        btn.disabled = false; 
        btn.innerText = "この内容で申し込む"; 
      }
    };
  </script>
</body>
</html>
