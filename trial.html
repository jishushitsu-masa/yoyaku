<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体験申込 - マサちゃんの自習室</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #ff8c00;
            --soft-gray: #f8f9fa;
            --text-dark: #333;
            --border-color: #eee;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--soft-gray);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            color: var(--primary-orange);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 0.9rem;
            color: #666;
        }

        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .note {
            background: #fffcf0;
            border: 1px solid #ffeeba;
            padding: 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        button.submit-btn {
            width: 100%;
            background: var(--primary-orange);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button.submit-btn:hover {
            background: #e67e00;
        }

        button.submit-btn:disabled {
            background: #ccc;
        }

        #loading {
            text-align: center;
            display: none;
            margin-top: 20px;
            color: var(--primary-orange);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2><i class="fas fa-seedling"></i> 無料体験お申し込み</h2>
        <p>自習室の雰囲気をまずは無料で体験してみませんか？</p>
    </div>

    <div class="note">
        ※お申し込み後、担当者より日程調整のご連絡を差し上げます。
    </div>

    <form id="trialForm" onsubmit="submitTrial(event)">
        <label>生徒名</label>
        <input type="text" name="studentName" required placeholder="例：佐藤 太郎" value="">
        
        <label>現在の学年</label>
        <select name="grade" required>
            <option value="">選択してください</option>
            <option value="中1">中学1年生</option>
            <option value="中2">中学2年生</option>
            <option value="中3">中学3年生</option>
        </select>

        <label>保護者名</label>
        <input type="text" name="parentName" required placeholder="例：佐藤 花子" value="">
        
        <label>電話番号</label>
        <input type="tel" name="phone" required placeholder="09012345678" value="">
        
        <label>メールアドレス</label>
        <input type="email" name="email" required placeholder="example@mail.com" value="">

        <label>ご希望の日程やご質問（任意）</label>
        <textarea name="remarks" rows="3" placeholder="例：来週の月曜日19時頃を希望します"></textarea>

        <button type="submit" id="submitBtn" class="submit-btn">体験を申し込む</button>
    </form>

    <div id="loading">
        <i class="fas fa-spinner fa-spin"></i> 送信中...
    </div>
</div>

<script>
    // GASのURL (デプロイ後に差し替え)
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxTBvPsDY2fx3_ZfoOhZ43a1QVZgPSb7KrdcTbfwBahpMS4Bj5ZNhPnDDOZR88ThS5uLA/exec';

    // ページ読み込み時にLocal Storageからデータを補完
    window.onload = () => {
        const form = document.getElementById('trialForm');
        form.studentName.value = localStorage.getItem('studentName') || '';
        form.parentName.value = localStorage.getItem('parentName') || '';
        form.phone.value = localStorage.getItem('phone') || '';
        form.email.value = localStorage.getItem('email') || '';
    };

    async function submitTrial(event) {
        event.preventDefault();
        const form = event.target;
        const btn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');

        btn.disabled = true;
        loading.style.display = 'block';

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // 入力内容をブラウザに保存（次回の予約を楽にするため）
        localStorage.setItem('studentName', data.studentName);
        localStorage.setItem('parentName', data.parentName);
        localStorage.setItem('phone', data.phone);
        localStorage.setItem('email', data.email);

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'trial', ...data })
            });
            const result = await response.json();

            if (result.success) {
                // 完了画面へ（専用の完了画面がない場合は共通の確認画面か、アラート後にリダイレクト）
                alert('お申し込みありがとうございます！内容を確認し、追ってご連絡いたします。');
                window.location.href = 'index.html'; // またはトップページなど
            } else {
                alert('送信に失敗しました。時間をおいて再度お試しください。');
            }
        } catch (e) {
            console.error(e);
            alert('通信エラーが発生しました。');
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
