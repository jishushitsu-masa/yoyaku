<!-- 前半のStyle部分は変更なし -->

<script>
    const GAS_URL = 'GAS_URL_HERE'; 
    let allSchedule = []; // 取得した全スケジュールを保持

    const segmentBtns = document.querySelectorAll('.segment-btn');
    const selectedVenueInput = document.getElementById('selected-venue');
    const dateSelect = document.getElementById('date-select');
    const submitBtn = document.getElementById('submit-btn');

    // 1. ページ読み込み時にスケジュールをサーバーから取得
    window.onload = function() {
        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getSchedule' })
        })
        .then(res => res.json())
        .then(res => {
            if (res.status === 'success') {
                allSchedule = res.data;
            }
        });
    };

    // 2. 会場切り替え時の処理
    segmentBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelector('.segment-btn.active')?.classList.remove('active');
            this.classList.add('active');
            
            const venueName = this.dataset.venue; // "おぶせ" または "すざか"
            selectedVenueInput.value = venueName;
            dateSelect.disabled = false;
            
            updateDateOptions(venueName);
        });
    });

    // 3. 取得したスケジュールデータから選択肢を生成
    function updateDateOptions(venueName) {
        dateSelect.innerHTML = '<option value="">日程を選択してください</option>';
        const today = new Date();
        const limitDate = new Date();
        limitDate.setDate(today.getDate() + 14); // 14日後まで

        // 会場スケジュールシートのデータからフィルタリング
        const filtered = allSchedule.filter(item => {
            const itemDate = new Date(item['日付']);
            // 会場名が含まれているか、休みでないか、14日以内かを確認
            return item['会場'].includes(venueName) && 
                   !item.isYasumi && 
                   itemDate >= today && 
                   itemDate <= limitDate;
        });

        filtered.forEach(item => {
            const option = document.createElement('option');
            // 表示例: "2024/05/14 (火) 19:00〜21:00"
            const displayText = `${item['日付']} ${item['時間'] || ''}`;
            option.value = item['日付'];
            option.dataset.time = item['時間'] || '';
            option.textContent = displayText;
            dateSelect.appendChild(option);
        });
    }

    // 送信時は「日付」と「時間」を分けて送信
    document.getElementById('trial-form').addEventListener('submit', function(e) {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerText = '送信中...';

        const selectedOption = dateSelect.options[dateSelect.selectedIndex];
        const formData = new FormData(this);
        const object = { 
            action: 'trial',
            time: selectedOption.dataset.time // 選択肢から時間を取得
        };
        formData.forEach((value, key) => { object[key] = value; });

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(object),
        })
        .then(res => res.json())
        .then(res => {
            if (res.status === 'success') {
                document.getElementById('form-container').style.display = 'none';
                document.getElementById('completion-message').style.display = 'block';
                window.scrollTo(0, 0);
            }
        })
        .catch(() => {
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('completion-message').style.display = 'block';
        });
    });
</script>
