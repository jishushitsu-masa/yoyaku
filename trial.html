<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料体験申し込み | 元塾講師マサちゃんの自習室</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fffaf5; }
        .bg-yorisoi-orange { background-color: #FF9900; }
        .text-yorisoi-orange { color: #FF9900; }
        .focus-ring-orange:focus { --tw-ring-color: #FF9900; border-color: #FF9900; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #FF9900; border-radius: 50%; width: 20px; height: 20px; animation: spin 2s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="py-8 px-4">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-orange-100">
        <div class="bg-yorisoi-orange p-6 text-white text-center">
            <h1 class="text-2xl font-bold">無料体験お申し込みフォーム</h1>
            <p class="mt-2 text-orange-50">自習室の雰囲気を体験してみませんか？</p>
        </div>

        <form id="trial-form" class="p-8 space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">体験を希望する会場 <span class="text-red-500">※</span></label>
                <select name="venue" id="venue-select" required class="w-full rounded-lg border-gray-300 focus-ring-orange">
                    <option value="">選択してください</option>
                    <option value="おぶせ 岩松院">おぶせ 岩松院（火・金）</option>
                    <option value="すざか bota">すざか bota（月・木）</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">体験希望日 <span class="text-red-500">※</span></label>
                <input type="text" name="date" id="datepicker" readonly required placeholder="会場を選択してください"
                       class="w-full rounded-lg border-gray-300 bg-gray-50 focus-ring-orange">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">生徒氏名 <span class="text-red-500">※</span></label>
                    <input type="text" name="studentName" required placeholder="例：山田 太郎" class="w-full rounded-lg border-gray-300 focus-ring-orange">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">学年 <span class="text-red-500">※</span></label>
                    <select name="grade" required class="w-full rounded-lg border-gray-300 focus-ring-orange">
                        <option value="">選択してください</option>
                        <option value="小4">小学4年生</option>
                        <option value="小5">小学5年生</option>
                        <option value="小6">小学6年生</option>
                        <option value="中1">中学1年生</option>
                        <option value="中2">中学2年生</option>
                        <option value="中3">中学3年生</option>
                        <option value="高1">高校1年生</option>
                        <option value="高2">高校2年生</option>
                        <option value="高3">高校3年生</option>
                        <option value="その他">その他</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">保護者氏名 <span class="text-red-500">※</span></label>
                <input type="text" name="parentName" required placeholder="例：山田 花子" class="w-full rounded-lg border-gray-300 focus-ring-orange">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">電話番号 <span class="text-red-500">※</span></label>
                <input type="tel" name="phone" required placeholder="例：09012345678" class="w-full rounded-lg border-gray-300 focus-ring-orange">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">メールアドレス <span class="text-red-500">※</span></label>
                <input type="email" name="email" required placeholder="例：sample@example.com" class="w-full rounded-lg border-gray-300 focus-ring-orange">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">備考・伝達事項</label>
                <textarea name="message" rows="3" placeholder="現在の学習状況や、特に聞きたいことなどあればご記入ください。" 
                          class="w-full rounded-lg border-gray-300 focus-ring-orange"></textarea>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-yorisoi-orange text-white font-bold py-4 rounded-xl hover:opacity-90 transition-opacity shadow-lg text-lg">
                <span id="btn-text">内容を送信する</span>
                <span id="btn-loader" class="loader ml-2 hidden"></span>
            </button>
        </form>
    </div>

    <div id="success-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="text-yorisoi-orange text-5xl mb-4">
                <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h2 class="text-xl font-bold mb-2">送信が完了しました！</h2>
            <p class="text-gray-600 mb-6">内容を確認し、折り返しご連絡させていただきます。</p>
            <button onclick="location.reload()" class="w-full bg-gray-100 text-gray-800 font-bold py-2 rounded-lg hover:bg-gray-200">閉じる</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycby7_R0E_R1U3-aZ7-Zl-wXp_m6B-h9nF8kLpP6xW9TfD7A0VvR7H1z2a3/exec";

        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('trial-form');
            const venueSelect = document.getElementById('venue-select');
            
            const fp = flatpickr("#datepicker", {
                locale: "ja",
                dateFormat: "Y/m/d(D)",
                minDate: "today",
                disableMobile: "true"
            });

            venueSelect.addEventListener('change', function() {
                const disableFunc = this.value.includes('おぶせ') ? (d => d.getDay()!==2 && d.getDay()!==5) : (d => d.getDay()!==1 && d.getDay()!==4);
                fp.set('disable', [disableFunc]);
                fp.clear();
            });

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                document.getElementById('submit-btn').disabled = true;
                document.getElementById('btn-text').textContent = "送信中...";
                document.getElementById('btn-loader').classList.remove('hidden');
                
                const formData = new FormData(form);
                const queryParams = new URLSearchParams(formData);

                fetch(GAS_URL, {
                    method: "POST",
                    body: queryParams.toString(),
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    mode: "no-cors"
                }).then(() => {
                    document.getElementById('success-modal').classList.remove('hidden');
                }).catch(() => {
                    alert("送信に失敗しました。");
                }).finally(() => {
                    document.getElementById('submit-btn').disabled = false;
                    document.getElementById('btn-text').textContent = "内容を送信する";
                    document.getElementById('btn-loader').classList.add('hidden');
                });
            });
        });
    </script>
</body>
</html>
