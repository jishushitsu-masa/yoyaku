<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無料体験予約</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
<style>
body {
font-family: 'Noto Sans JP', sans-serif;
background-color: #f4f7f6;
color: #333;
padding: 40px 15px;
}
.form-container {
max-width: 600px;
margin: 0 auto;
background-color: #fff;
padding: 30px;
border-radius: 12px;
box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
h2 {
font-weight: 700;
margin-bottom: 30px;
text-align: center;
color: #2c3e50;
}
.form-group label {
font-weight: 700;
font-size: 0.9rem;
margin-bottom: 8px;
}
.form-control {
border-radius: 6px;
padding: 12px;
border: 1px solid #ced4da;
}
.btn-primary {
background-color: #3498db;
border: none;
padding: 12px;
font-weight: 700;
border-radius: 6px;
transition: all 0.3s;
width: 100%;
}
.btn-primary:hover {
background-color: #2980b9;
transform: translateY(-1px);
}
#loading, #successMessage, #errorMessage {
display: none;
margin-top: 20px;
text-align: center;
}
</style>
</head>
<body>

<div class="form-container">
<h2>無料体験予約</h2>
<form id="taikenForm">
<div class="form-group">
<label>保護者様お名前</label>
<input type="text" name="parent_name" class="form-control" placeholder="例：山田 太郎" required>
</div>
<div class="form-group">
<label>お子様お名前</label>
<input type="text" name="child_name" class="form-control" placeholder="例：山田 花子" required>
</div>
<div class="form-group">
<label>電話番号</label>
<input type="tel" name="tel" class="form-control" placeholder="例：09012345678" required>
</div>
<div class="form-group">
<label>メールアドレス</label>
<input type="email" name="email" class="form-control" placeholder="例：example@mail.com" required>
</div>
<div class="form-group">
<label>会場</label>
<select name="venue" class="form-control" required>
<option value="">選択してください</option>
<option value="須坂会場">須坂会場</option>
<option value="小布施会場">小布施会場</option>
</select>
</div>
<div class="form-group">
<label>希望日時</label>
<input type="text" name="preferred_date" class="form-control" placeholder="例：5月10日 17時〜" required>
</div>
<div class="form-group">
<label>備考</label>
<textarea name="remarks" class="form-control" rows="3" placeholder="ご質問などあればご記入ください"></textarea>
</div>
<button type="submit" class="btn btn-primary">この内容で送信する</button>
</form>

<div id="loading">
<div class="spinner-border text-primary" role="status"></div>
<p class="mt-2">送信中です。そのままお待ちください...</p>
</div>

<div id="successMessage" class="alert alert-success">
申し込みが完了しました。確認メールをお送りしましたのでご確認ください。
</div>

<div id="errorMessage" class="alert alert-danger">
エラーが発生しました。お手数ですが再度お試しいただくか、お電話にてご連絡ください。
</div>
</div>

<script>
const scriptUrl = 'YOUR_GAS_WEB_APP_URL'; // GASのURLを入れてください
const form = document.getElementById('taikenForm');
const loading = document.getElementById('loading');
const success = document.getElementById('successMessage');
const errorMsg = document.getElementById('errorMessage');

form.addEventListener('submit', e => {
e.preventDefault();
form.style.display = 'none';
loading.style.display = 'block';

const formData = new FormData(form);

fetch(scriptUrl, { method: 'POST', body: formData })
.then(response => {
loading.style.display = 'none';
success.style.display = 'block';
})
.catch(error => {
loading.style.display = 'none';
errorMsg.style.display = 'block';
console.error('Error!', error.message);
});
});
</script>

</body>
</html>
