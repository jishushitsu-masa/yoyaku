<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約完了</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --navy: #1e3a8a; --bg: #f3f4f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 16px; padding: 30px; text-align: center; border-top: 10px solid var(--navy); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .icon { color: #10b981; font-size: 50px; margin-bottom: 15px; }
        h2 { color: var(--navy); margin-bottom: 25px; font-size: 1.4rem; }
        .info { background: #eff6ff; padding: 20px; border-radius: 12px; text-align: left; margin-bottom: 25px; }
        .item { margin-bottom: 10px; border-bottom: 1px dashed #bfdbfe; padding-bottom: 10px; }
        .item:last-child { border-bottom: none; }
        .label { font-size: 0.8rem; color: #666; font-weight: bold; }
        .value { font-size: 1.1rem; color: #111; display: block; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="card">
        <i class="fas fa-check-circle icon"></i>
        <h2>予約が完了しました</h2>
        <div id="content" class="info">
            <div class="item"><span class="label">会場</span><span class="value" id="loc">読み込み中...</span></div>
            <div class="item"><span class="label">日時</span><span class="value" id="datetime"></span></div>
            <div class="item"><span class="label">参加者名</span><span class="value" id="name"></span></div>
        </div>
        <p style="font-size:0.9rem; color:#666; line-height:1.6;">ご予約ありがとうございます。<br>当日、会場でお待ちしております。</p>
    </div>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxTBvPsDY2fx3_ZfoOhZ43a1QVZgPSb7KrdcTbfwBahpMS4Bj5ZNhPnDDOZR88ThS5uLA/exec';
        window.onload = async () => {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch(`${API_URL}?action=getBooking&id=${id}`);
            const data = await res.json();
            if(data) {
                document.getElementById('loc').innerText = data.location;
                document.getElementById('datetime').innerText = data.date + ' ' + data.time;
                document.getElementById('name').innerText = data.studentName + ' 様';
            }
        };
    </script>
</body>
</html>
