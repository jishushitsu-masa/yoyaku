<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>予約完了 - マサちゃんの自習室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // おぶせ用テーマカラー（清潔感のあるブルー）
        tailwind.config = { theme: { extend: { colors: { brand: '#2563EB', 'brand-dark': '#1E40AF' } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6 text-gray-800">

    <div id="loading" class="text-center">
        <div class="inline-block animate-spin h-8 w-8 border-4 border-brand rounded-full border-t-transparent mb-3"></div>
        <p class="text-gray-500 text-sm font-medium">予約情報を確認中...</p>
    </div>

    <div id="content" class="hidden max-w-sm w-full bg-white rounded-3xl p-8 shadow-xl text-center border border-gray-100">
        
        <div class="w-20 h-20 bg-blue-50 text-brand rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
            <i class="fas fa-check text-3xl"></i>
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-2">予約を承りました</h2>
        <p class="text-gray-500 text-sm mb-8 leading-relaxed">
            内容を記録しました。<br>
            LINE公式アカウントからの<br>通知をご確認ください。
        </p>

        <div class="bg-gray-50 rounded-2xl p-6 text-left mb-8 space-y-4 border border-gray-100">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">参加者名</p>
                <p id="res-name" class="text-gray-800 font-bold text-lg">-- さん</p>
            </div>
            <hr class="border-gray-200">
            <div class="grid grid-cols-1 gap-3">
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">場所</p>
                    <p id="res-location" class="text-gray-700 text-sm font-medium"><i class="fas fa-map-marker-alt text-brand mr-2"></i>--</p>
                </div>
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">日程</p>
                    <p id="res-date" class="text-gray-700 text-sm font-medium"><i class="fas fa-calendar-alt text-brand mr-2"></i>--</p>
                </div>
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">時間</p>
                    <p id="res-time" class="text-gray-700 text-sm font-medium"><i class="fas fa-clock text-brand mr-2"></i>--</p>
                </div>
            </div>
        </div>

        <button onclick="closeLiff()" class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100 transition-all active:scale-95">
            LINEに戻る
        </button>
        
        <p class="mt-4 text-[10px] text-gray-400">※この画面は閉じていただいて構いません。</p>
    </div>

    <script>
        // ★ご自身の最新のGASウェブアプリURLをここに貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCUmZT4HSaGpqmAUYV2zLTtIUwjQVHlbR_1aYNrh1tAQ9LDSi-Rzad17Y-Bt73iCSmGQ/exec";
        const LIFF_ID = "2009652448-yEc3eycW";

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const bookingId = params.get('id');

            if (!bookingId) {
                document.getElementById('loading').innerHTML = '<p class="text-red-500">予約情報が見つかりません</p>';
                return;
            }

            // GASから最新の予約情報を取得 [cite: 3, 4]
            fetch(`${GAS_URL}?action=getBooking&id=${bookingId}`)
                .then(res => res.json())
                .then(data => {
                    if (data) {
                        document.getElementById('res-name').innerText = data.studentName + " さん";
                        document.getElementById('res-location').innerText = data.location;
                        document.getElementById('res-date').innerText = data.date;
                        document.getElementById('res-time').innerText = data.time;
                        
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('content').classList.remove('hidden');
                    } else {
                        throw new Error();
                    }
                })
                .catch(err => {
                    document.getElementById('loading').innerHTML = '<p class="text-red-500 text-sm font-bold">データの読み込みに失敗しました。<br>LINEの通知を確認してください。</p>';
                });
        };

        function closeLiff() {
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (liff.isInClient()) {
                    liff.closeWindow();
                } else {
                    window.history.back();
                }
            });
        }
    </script>
</body>
</html>
