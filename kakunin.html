<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約確認 - マサちゃんの自習室</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #ff8c00;
            --soft-gray: #f8f9fa;
            --text-dark: #333;
            --border-color: #eee;
            --danger-red: #e74c3c;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--soft-gray);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .icon-box {
            font-size: 3rem;
            color: #2ecc71;
            margin-bottom: 20px;
        }

        h2 {
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .info-card {
            background: #fffcf9;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            margin: 25px 0;
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed #ddd;
            padding: 10px 0;
        }

        .info-row:last-child { border-bottom: none; }

        .label { font-weight: bold; color: #666; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .cancel-btn {
            background: none;
            border: 1px solid #ccc;
            color: #999;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .cancel-btn:hover {
            color: var(--danger-red);
            border-color: var(--danger-red);
            background: #fff5f5;
        }

        .back-btn {
            background: var(--primary-orange);
            color: #fff;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: block;
        }

        #loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            justify-content: center; align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <i class="fas fa-spinner fa-spin fa-2x"></i>
</div>

<div class="container">
    <div id="status-icon" class="icon-box"><i class="fas fa-check-circle"></i></div>
    <h2 id="main-title">予約を承りました</h2>
    <p id="sub-msg">ご登録いただいたメールアドレスに確認メールを送信しました。</p>

    <div class="info-card" id="info-card">
        <div class="info-row"><span class="label">予約ID</span><span id="view-id">-</span></div>
        <div class="info-row"><span class="label">会場</span><span id="view-loc">-</span></div>
        <div class="info-row"><span class="label">日時</span><span id="view-datetime">-</span></div>
        <div class="info-row"><span class="label">生徒名</span><span id="view-name">-</span></div>
        <div id="plan-row" class="info-row" style="display:none;"><span class="label">プラン</span><span>1時間のみ利用</span></div>
    </div>

    <div class="btn-group">
        <a href="index.html" class="back-btn">トップページへ戻る</a>
        <button class="cancel-btn" onclick="confirmCancel()">この予約をキャンセルする</button>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxTBvPsDY2fx3_ZfoOhZ43a1QVZgPSb7KrdcTbfwBahpMS4Bj5ZNhPnDDOZR88ThS5uLA/exec'; // 差し替え
    const urlParams = new URLSearchParams(window.location.search);
    const bookingId = urlParams.get('id');

    window.onload = () => {
        if (bookingId) {
            fetchBookingData();
        } else {
            document.body.innerHTML = "予約情報が見つかりません。";
        }
    };

    async function fetchBookingData() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const response = await fetch(`${GAS_URL}?action=getBooking&id=${bookingId}`);
            const data = await response.json();
            
            if (data) {
                document.getElementById('view-id').innerText = data.id;
                document.getElementById('view-loc').innerText = data.location;
                document.getElementById('view-datetime').innerText = `${data.date} ${data.time}`;
                document.getElementById('view-name').innerText = data.studentName;
                if (data.plan === '1時間のみ利用') {
                    document.getElementById('plan-row').style.display = 'flex';
                }
            }
        } catch (e) {
            console.error("Fetch error:", e);
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }

    async function confirmCancel() {
        if (!confirm("本当にキャンセルしてもよろしいですか？")) return;

        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'cancel', id: bookingId })
            });
            const result = await response.json();
            if (result.success) {
                alert("予約をキャンセルしました。");
                window.location.href = 'index.html';
            }
        } catch (e) {
            alert("キャンセル処理に失敗しました。");
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }
</script>

</body>
</html>
