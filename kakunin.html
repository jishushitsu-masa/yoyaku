<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>予約完了 - マサちゃんの自習室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#2563EB' } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">

    <div id="loading" class="text-center">
        <div class="inline-block animate-spin duration-300 w-8 h-8 border-4 border-brand border-t-transparent rounded-full mb-2"></div>
        <p class="text-gray-500 text-sm">予約情報を読み込み中...</p>
    </div>

    <div id="content" class="hidden max-w-sm w-full bg-white rounded-3xl p-8 shadow-xl text-center">
        <div class="w-20 h-20 bg-blue-50 text-brand rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-check text-3xl"></i>
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-2">予約完了</h2>
        <p class="text-gray-500 text-sm mb-8 leading-relaxed">
            予約を受け付けました。<br>
            LINEにも通知をお送りしましたので<br>ご確認ください。
        </p>

        <div class="bg-gray-50 rounded-2xl p-5 text-left mb-8 space-y-3">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">参加者</p>
                <p id="res-name" class="text-gray-800 font-bold"></p>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">日程</p>
                    <p id="res-date" class="text-gray-700 text-sm font-medium"></p>
                </div>
                <div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">時間</p>
                    <p id="res-time" class="text-gray-700 text-sm font-medium"></p>
                </div>
            </div>
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">場所</p>
                <p id="res-location" class="text-gray-700 text-sm font-medium"></p>
            </div>
        </div>

        <button onclick="closeLiff()" class="w-full bg-brand text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-600 transition-all active:scale-95">
            LINEに戻る
        </button>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        // 現在のGASのURLを入れてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxTBvPsDY2fx3_ZfoOhZ43a1QVZgPSb7KrdcTbfwBahpMS4Bj5ZNhPnDDOZR88ThS5uLA/exec";

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const bookingId = params.get('id');

            if (!bookingId) {
                alert("予約情報が見つかりませんでした。");
                return;
            }

            // GASから予約情報を取得
            fetch(`${GAS_URL}?action=getBooking&id=${bookingId}`)
                .then(res => res.json())
                .then(data => {
                    if (data) {
                        document.getElementById('res-name').innerText = data.studentName + " さん";
                        document.getElementById('res-date').innerText = data.date;
                        document.getElementById('res-time').innerText = data.time;
                        document.getElementById('res-location').innerText = data.location;
                        
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById('content').classList.remove('hidden');
                    } else {
                        alert("予約データの取得に失敗しました。");
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("通信エラーが発生しました。");
                });
        };

        function closeLiff() {
            // LIFFで開いている場合はウィンドウを閉じ、そうでなければブラウザの履歴を戻す
            if (typeof liff !== 'undefined') {
                liff.init({ liffId: "2009652448-8WjGp7jc" }).then(() => {
                    liff.closeWindow();
                });
            } else {
                window.history.back();
            }
        }
    </script>
</body>
</html>
