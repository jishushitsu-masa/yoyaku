<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小布施会場 予約フォーム | 元塾講師マサちゃんの自習室</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>小布施会場 予約フォーム</h1>
      <p>元塾講師マサちゃんの自習室</p>
    </header>

    <div class="card">
      <form id="reservationForm">
        <div class="form-group">
          <label for="studentName">生徒名 (フルネーム)</label>
          <input type="text" id="studentName" required placeholder="例: 山田 太郎">
        </div>
        <div class="form-group">
          <label for="furigana">ふりがな</label>
          <input type="text" id="furigana" required placeholder="例: やまだ たろう">
        </div>

        <div class="form-group">
          <label>利用時間</label>
          <div class="radio-group">
            <div class="radio-card">
              <input type="radio" id="durationNormal" name="duration" value="通常" checked>
              <label for="durationNormal">通常利用</label>
            </div>
            <div class="radio-card">
              <input type="radio" id="durationShort" name="duration" value="1時間">
              <label for="durationShort">1時間利用</label>
            </div>
          </div>
        </div>

        <!-- LINE User ID取得用 (実際のLステップ/LIFF等の仕様に合わせて取得処理を実装) -->
        <input type="hidden" id="lineUserId" value="">
        <input type="hidden" id="selectedDate" value="">

        <div class="form-group">
          <label>予約日を選択 (14日先まで)</label>
          <div id="scheduleLoader"></div>
          <div id="scheduleList" class="schedule-list">
            <!-- JavaScriptで自動生成されます -->
          </div>
        </div>

        <div id="messageArea" class="hidden"></div>

        <button type="submit" class="btn btn-primary" id="submitBtn" disabled>予約を確定する</button>
      </form>
    </div>
  </div>

  <script src="index.js"></script>
  <script>
    const VENUE_NAME = '小布施';
    let scheduleData = [];

    document.addEventListener('DOMContentLoaded', async () => {
      showLoader('scheduleLoader');
      
      // LINEのLIFFアプリの場合、ここでLIFF SDKを初期化し userId を取得して #lineUserId にセットする
      // document.getElementById('lineUserId').value = getLineUserIdSomehow();

      const response = await apiFetch(`getSchedule&venue=${encodeURIComponent(VENUE_NAME)}`);
      hideLoader('scheduleLoader');

      if (response.status === 'success') {
        scheduleData = response.data;
        renderSchedule();
      } else {
        showMessage('messageArea', 'スケジュールの取得に失敗しました。', true);
      }
    });

    function renderSchedule() {
      const listEl = document.getElementById('scheduleList');
      listEl.innerHTML = '';
      
      if (scheduleData.length === 0) {
        listEl.innerHTML = '<p>現在予約可能な日程がありません。</p>';
        return;
      }

      const today = new Date();
      today.setHours(0,0,0,0);

      scheduleData.forEach((item, index) => {
        const itemDate = new Date(item['日付']);
        const isToday = itemDate.getTime() === today.getTime();
        const isClosed = item['休み'] === true || item['休み'] === 'TRUE';
        
        // 当日は受付終了（前日23:59までとする仕様）
        const disabled = isToday || isClosed;
        
        const div = document.createElement('div');
        div.className = `schedule-item ${disabled ? 'disabled' : 'selectable'}`;
        div.dataset.index = index;

        let statusText = isClosed ? 'お休み' : (isToday ? '受付終了' : '予約可能');
        let statusClass = isClosed || isToday ? 'status-closed' : 'status-open';

        div.innerHTML = `
          <div>
            <div class="schedule-date">${item['日付']} ${item['時間']}</div>
            <div style="font-size: 0.85rem; color: var(--text-muted);">${item['備考'] || ''}</div>
          </div>
          <div class="schedule-status ${statusClass}">${statusText}</div>
        `;

        if (!disabled) {
          div.addEventListener('click', () => selectDate(index, div));
        }

        listEl.appendChild(div);
      });
    }

    function selectDate(index, element) {
      // 選択状態のリセット
      document.querySelectorAll('.schedule-item').forEach(el => el.classList.remove('selected'));
      // 新しい選択
      element.classList.add('selected');
      document.getElementById('selectedDate').value = scheduleData[index]['日付'];
      document.getElementById('submitBtn').disabled = false;
    }

    document.getElementById('reservationForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const selectedDate = document.getElementById('selectedDate').value;
      if (!selectedDate) {
        alert('予約日を選択してください。');
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = '送信中...';

      const data = {
        venue: VENUE_NAME,
        studentName: document.getElementById('studentName').value,
        furigana: document.getElementById('furigana').value,
        duration: document.querySelector('input[name="duration"]:checked').value,
        date: selectedDate,
        lineUserId: document.getElementById('lineUserId').value
      };

      const result = await apiFetch('reserve', data);

      if (result.status === 'success') {
        document.getElementById('reservationForm').innerHTML = `
          <div style="text-align: center; padding: 2rem 0;">
            <h2 style="color: var(--secondary); margin-bottom: 1rem;">予約が完了しました</h2>
            <p>ご登録ありがとうございます。<br>LINEにご案内をお送りしました。</p>
          </div>
        `;
      } else {
        showMessage('messageArea', result.message || '予約処理に失敗しました。', true);
        submitBtn.disabled = false;
        submitBtn.textContent = '予約を確定する';
      }
    });
  </script>
</body>
</html>
