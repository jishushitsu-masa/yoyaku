<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>小布施会場 予約フォーム</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div class="container">
    <h1>小布施会場 予約フォーム</h1>
    <form id="reservationForm">
      <div class="form-group">
        <label>予約日を選択</label>
        <div id="accordionHeader" class="accordion-header">タップして日程を選択</div>
        <div id="scheduleList" class="accordion-content"></div>
      </div>
      <div class="form-group"><label>生徒名</label><input type="text" id="studentName" required></div>
      <div class="form-group"><label>保護者名</label><input type="text" id="parentName" required></div>
      <div class="form-group"><label>電話番号</label><input type="tel" id="phone" required></div>
      <div class="form-group">
        <label>利用区分</label>
        <div style="display:flex; gap:10px;">
          <input type="radio" id="d2" name="duration" value="2時間利用" checked><label for="d2">2時間利用</label>
          <input type="radio" id="d1" name="duration" value="1時間利用"><label for="d1">1時間利用</label>
        </div>
      </div>
      <input type="hidden" id="selectedDate"><input type="hidden" id="selectedArea">
      <input type="hidden" id="selectedVenue"><input type="hidden" id="selectedTime">
      <button type="submit" id="submitBtn" disabled>予約を確定する</button>
    </form>
  </div>
  <script src="index.js"></script>
  <script>
    const AREA_NAME = 'おぶせ';
    document.getElementById('accordionHeader').onclick = function(){
      document.getElementById('scheduleList').classList.toggle('open');
    };
    
    // データ取得
    async function init() {
      const res = await apiFetch('getSchedule');
      if (res.status === 'success') {
        const list = document.getElementById('scheduleList');
        res.data.filter(i => i['エリア'] === AREA_NAME).forEach(item => {
          const div = document.createElement('div');
          div.innerHTML = item['日付'] + ' ' + item['時間'];
          div.onclick = function(){
            document.getElementById('selectedDate').value = item['日付'];
            document.getElementById('selectedArea').value = item['エリア'];
            document.getElementById('selectedVenue').value = item['会場名'];
            document.getElementById('selectedTime').value = item['時間'];
            document.getElementById('selectedDateText').innerText = item['日付'] + ' ' + item['時間'];
            document.getElementById('submitBtn').disabled = false;
          };
          list.appendChild(div);
        });
      }
    }
    init();
  </script>
</body>
</html>
