<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自習室予約フォーム</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .accordion-content { display: none; }
        .accordion-content.active { display: block; }
        .schedule-item.selected { border-color: #3b82f6; background-color: #eff6ff; }
        .schedule-item.disabled { background-color: #f3f4f6; color: #9ca3af; cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body class="bg-white p-4">

    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-6 text-center">自習室予約フォーム</h1>

        <div class="border rounded-t-lg">
            <button onclick="toggleAccordion('obuse-content')" class="w-full text-left p-4 font-bold bg-gray-50 flex justify-between items-center">
                おぶせ日程（岩松院）
                <span id="obuse-icon">▼</span>
            </button>
            <div id="obuse-content" class="accordion-content p-4 border-t">
                <div id="obuse-list" class="space-y-2">読み込み中...</div>
            </div>
        </div>

        <div class="border rounded-b-lg border-t-0">
            <button onclick="toggleAccordion('suzaka-content')" class="w-full text-left p-4 font-bold bg-gray-50 flex justify-between items-center">
                すざか日程（bota）
                <span id="suzaka-icon">▼</span>
            </button>
            <div id="suzaka-content" class="accordion-content p-4 border-t">
                <div id="suzaka-list" class="space-y-2">読み込み中...</div>
            </div>
        </div>

        <div class="mt-8 space-y-4">
            <div>
                <label class="block text-sm font-bold">参加者名（生徒名）</label>
                <input type="text" id="participantName" class="w-full border p-2 rounded" placeholder="例：山田太郎">
            </div>
            <div>
                <label class="block text-sm font-bold">保護者名</label>
                <input type="text" id="parentName" class="w-full border p-2 rounded" placeholder="例：山田花子">
            </div>
            <div>
                <label class="block text-sm font-bold">電話番号</label>
                <input type="tel" id="phone" class="w-full border p-2 rounded" placeholder="09012345678">
            </div>
            
            <div class="flex items-center space-x-2 py-2">
                <input type="checkbox" id="oneHourPlan" class="h-5 w-5">
                <label for="oneHourPlan" class="text-sm font-bold">1時間のみ利用（500円）</label>
            </div>
        </div>

        <button id="submitBtn" onclick="submitReservation()" class="w-full bg-blue-600 text-white font-bold py-4 px-4 rounded-lg mt-8 shadow-lg hover:bg-blue-700">
            予約を確定する
        </button>
    </div>

    <script>
        // ★ご自身のGAS URLと、このページのLIFF IDを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCUmZT4HSaGpqmAUYV2zLTtIUwjQVHlbR_1aYNrh1tAQ9LDSi-Rzad17Y-Bt73iCSmGQ/exec"; 
        const LIFF_ID = "2009652448-yEc3eycW"; 

        let selectedSchedule = null;
        let lineUserId = "";

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                lineUserId = profile.userId;
                
                // 両方の会場の日程を読み込み
                loadSchedules('obuse', 'obuse-list');
                loadSchedules('suzaka', 'suzaka-list');
            } catch (err) {
                alert("初期化に失敗しました。");
            }
        }

        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById(id.split('-')[0] + '-icon');
            const isActive = content.classList.contains('active');
            
            // すべて閉じる
            document.querySelectorAll('.accordion-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('span[id$="-icon"]').forEach(el => el.innerText = '▼');

            if (!isActive) {
                content.classList.add('active');
                icon.innerText = '▲';
            }
        }

        async function loadSchedules(venue, listId) {
            try {
                const response = await fetch(`${GAS_URL}?action=getSchedules&venue=${venue}`);
                const data = await response.json();
                const list = document.getElementById(listId);
                list.innerHTML = "";

                if (data.length === 0) {
                    list.innerHTML = '<p class="text-sm text-gray-400 text-center">予定なし</p>';
                    return;
                }

                data.forEach(item => {
                    const div = document.createElement('div');
                    if (item.isDisabled) {
                        // お休み（グレーアウト）
                        div.className = "p-3 border rounded disabled";
                        div.innerText = `${item.date} ${item.time} （休み）`;
                    } else {
                        // 通常（クリック可能）
                        div.className = "p-3 border rounded cursor-pointer schedule-item";
                        div.innerText = `${item.date} ${item.time}`;
                        div.onclick = () => {
                            document.querySelectorAll('.schedule-item').forEach(el => el.classList.remove('selected'));
                            div.classList.add('selected');
                            selectedSchedule = item;
                        };
                    }
                    list.appendChild(div);
                });
            } catch (err) {
                document.getElementById(listId).innerText = "取得エラー";
            }
        }

        async function submitReservation() {
            const pName = document.getElementById('participantName').value;
            const paName = document.getElementById('parentName').value;
            const phone = document.getElementById('phone').value;
            const isOneHour = document.getElementById('oneHourPlan').checked;

            if (!selectedSchedule || !pName || !paName || !phone) {
                alert("日程の選択と、お名前・電話番号の入力をお願いします。");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerText = "送信中...";
            btn.disabled = true;

            const planText = isOneHour ? "1時間のみ利用（500円）" : "通常利用（都度払い）";

            const payload = {
                action: "saveReservation",
                data: {
                    scheduleId: selectedSchedule.id,
                    scheduleLocation: selectedSchedule.location,
                    scheduleDate: selectedSchedule.date,
                    scheduleTime: selectedSchedule.time,
                    participantName: pName,
                    parentName: paName,
                    phone: phone,
                    plan: planText,
                    lineUserId: lineUserId,
                    liffId: LIFF_ID
                }
            };

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.status === "success") {
                    alert("予約を完了しました！");
                    liff.closeWindow();
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("送信に失敗しました。");
                btn.innerText = "予約を確定する";
                btn.disabled = false;
            }
        }

        main();
    </script>
</body>
</html>
