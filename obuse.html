<!-- スクリプト部分を中心に更新内容を記載します -->
<script>
    const LIFF_ID = "2009652448-yEc3eycW";
    const AREA_NAME = 'おぶせ'; // エリア列との照合用
    let lineUserId = "";
    let scheduleData = [];

    // スケジュール描画ロジックの更新
    function renderSchedule() {
      const listEl = document.getElementById('scheduleList');
      listEl.innerHTML = '';
      const today = new Date(); today.setHours(0,0,0,0);
      
      const filtered = scheduleData.filter(item => {
        const d = new Date(item['日付'].replace(/-/g, '/'));
        // 「エリア」列が一致し、かつ今日以降、かつ休みでないものを抽出
        return (item['エリア'] === AREA_NAME) && d >= today && item['isYasumi'] !== true;
      });

      if (filtered.length === 0) {
        listEl.innerHTML = '<p style="text-align:center;padding:1rem;">予約可能な日程がありません。</p>';
        return;
      }

      filtered.forEach(item => {
        const d = new Date(item['日付'].replace(/-/g, '/'));
        const day = ["日","月","火","水","木","金","土"][d.getDay()];
        const displayDate = `${item['日付']}(${day})`;
        const div = document.createElement('div');
        div.className = 'schedule-item selectable';
        div.innerHTML = `<div class="schedule-date">${displayDate} ${item['時間'] || ''}<br><span style="font-size:0.8rem;color:#666;">場所：${item['会場名']}</span></div>`;
        
        div.onclick = () => {
          document.getElementById('selectedDate').value = item['日付'];
          document.getElementById('selectedVenue').value = `${AREA_NAME} ${item['会場名']}`; // GAS側で分割するために「エリア 会場名」の形式で送る
          document.getElementById('selectedTime').value = item['時間'] || '';
          document.getElementById('selectedDateText').innerHTML = `<div style="font-weight: bold; font-size: 1.05rem; color: var(--primary);">${displayDate} ${item['時間'] || ''}</div><div style="font-size: 0.85rem; color: #666; margin-top: 2px;">場所：${item['会場名']}</div>`;
          document.getElementById('submitBtn').disabled = false;
          scheduleList.classList.remove('open'); accordionHeader.classList.remove('active');
        };
        listEl.appendChild(div);
      });
    }
    // (以降の送信処理などは共通のため、suzaka.htmlと同様に更新)
</script>
