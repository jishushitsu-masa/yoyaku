<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>おぶせ予約 - マサちゃんの自習室</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #ff8c00;
            --soft-gray: #f8f9fa;
            --text-dark: #333;
            --border-color: #eee;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--soft-gray);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            text-align: center;
            color: var(--primary-orange);
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        /* アコーディオン設定 */
        .accordion-item {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .accordion-header {
            padding: 15px;
            background: #fff;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            transition: background 0.3s;
        }

        .accordion-header:hover { background: #fffcf9; }

        .accordion-content {
            display: none;
            padding: 20px;
            background: #fffcf9;
            border-top: 1px solid var(--border-color);
        }

        /* 状態別スタイル */
        .status-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .available { color: var(--primary-orange); }
        .full { color: #999; }
        .closed { color: #e74c3c; font-weight: normal; }

        /* フォーム部品 */
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; }
        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .checkbox-group {
            background: #fff;
            padding: 10px;
            border: 1px dashed var(--primary-orange);
            border-radius: 6px;
            margin-bottom: 20px;
        }

        button.submit-btn {
            width: 100%;
            background: var(--primary-orange);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button.submit-btn:disabled { background: #ccc; }

        #loading { text-align: center; display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fas fa-edit"></i> おぶせ予約フォーム</h2>
    
    <div id="schedule-list">
        <p style="text-align:center;">スケジュールを読み込み中...</p>
    </div>

    <div id="loading">
        <i class="fas fa-spinner fa-spin"></i> 送信中...
    </div>
</div>

<script>
    // GASのURL (デプロイ後に差し替え)
    const GAS_URL = 'https://script.google.com/macros/s/XXX/exec';

    // 初期読み込み
    window.onload = () => {
        fetchSchedule();
    };

    async function fetchSchedule() {
        try {
            const response = await fetch(`${GAS_URL}?action=getSchedules&location=おぶせ`);
            const schedules = await response.json();
            renderSchedule(schedules);
        } catch (e) {
            document.getElementById('schedule-list').innerHTML = "読み込みに失敗しました。";
        }
    }

    function renderSchedule(schedules) {
        const list = document.getElementById('schedule-list');
        list.innerHTML = '';

        schedules.forEach(item => {
            const div = document.createElement('div');
            div.className = 'accordion-item';
            
            let headerContent = `<span>${item.date} (${item.time})</span>`;
            let statusText = '';
            let isDisabled = false;

            if (item.status === 'closed') {
                statusText = '<span class="status-badge closed">当日締切(要問合せ)</span>';
                isDisabled = true;
            } else if (item.status === 'full') {
                statusText = '<span class="status-badge full">満席</span>';
                isDisabled = true;
            } else {
                statusText = '<span class="status-badge available">予約可</span>';
            }

            div.innerHTML = `
                <div class="accordion-header" onclick="toggleAccordion(this, ${isDisabled})">
                    ${headerContent} ${statusText}
                </div>
                <div class="accordion-content">
                    <form onsubmit="submitForm(event, this)">
                        <input type="hidden" name="date" value="${item.fullDate}">
                        <input type="hidden" name="time" value="${item.time}">
                        <input type="hidden" name="location" value="おぶせ">
                        
                        <label>生徒名</label>
                        <input type="text" name="studentName" required placeholder="例：佐藤 太郎" value="${localStorage.getItem('studentName') || ''}">
                        
                        <label>保護者名</label>
                        <input type="text" name="parentName" required placeholder="例：佐藤 花子" value="${localStorage.getItem('parentName') || ''}">
                        
                        <label>電話番号</label>
                        <input type="tel" name="phone" required placeholder="09012345678" value="${localStorage.getItem('phone') || ''}">
                        
                        <label>メールアドレス</label>
                        <input type="email" name="email" required placeholder="example@mail.com" value="${localStorage.getItem('email') || ''}">

                        <div class="checkbox-group">
                            <label style="cursor:pointer; display:flex; align-items:center;">
                                <input type="checkbox" name="plan" value="1hour" style="width:auto; margin-right:10px; margin-bottom:0;"> 
                                1時間のみ利用（500円）
                            </label>
                        </div>

                        <button type="submit" class="submit-btn">予約を確定する</button>
                    </form>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function toggleAccordion(header, isDisabled) {
        if (isDisabled) return;
        const content = header.nextElementSibling;
        const allContents = document.querySelectorAll('.accordion-content');
        
        allContents.forEach(c => {
            if (c !== content) c.style.display = 'none';
        });

        content.style.display = content.style.display === 'block' ? 'none' : 'block';
    }

    async function submitForm(event, form) {
        event.preventDefault();
        const btn = form.querySelector('.submit-btn');
        btn.disabled = true;
        document.getElementById('loading').style.display = 'block';

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        // ローカルストレージに保存
        localStorage.setItem('studentName', data.studentName);
        localStorage.setItem('parentName', data.parentName);
        localStorage.setItem('phone', data.phone);
        localStorage.setItem('email', data.email);

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'booking', ...data })
            });
            const result = await response.json();
            if (result.success) {
                window.location.href = `kakunin.html?id=${result.bookingId}`;
            }
        } catch (e) {
            alert('送信に失敗しました。');
            btn.disabled = false;
            document.getElementById('loading').style.display = 'none';
        }
    }
</script>

</body>
</html>
