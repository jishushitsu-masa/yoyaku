<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おぶせ自習室 予約</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div class="container">
    <h1>おぶせ自習室 予約</h1>
    <div id="scheduleList"></div>
  </div>

  <script src="index.js"></script>
  <script>
    const LIFF_ID = "2009652448-8WjGp7jc";
    window.onload = async () => {
      await liff.init({ liffId: LIFF_ID });
      const res = await apiFetch('getSchedule', {});
      if (res.status === 'success') {
        renderSchedule(res.data);
      }
    };

    function renderSchedule(data) {
      const listEl = document.getElementById('scheduleList');
      // ここで、データの中から「おぶせ」のデータだけを抽出
      const obuseData = data.filter(item => item['エリア'] === 'おぶせ');
      
      obuseData.forEach(item => {
        const div = document.createElement('div');
        div.className = 'res-card';
        // 項目名で直接指定！これなら列がズレても安心です
        div.innerHTML = `
          <div class="res-date">${item['日付']}</div>
          <div class="res-time">${item['時間']}</div>
          <div class="res-venue">${item['会場名']}</div>
          <button onclick="reserve('${item['日付']}','${item['時間']}','${item['会場名']}')">予約する</button>
        `;
        listEl.appendChild(div);
      });
    }

    // 予約実行関数は別途調整が必要な場合があります
  </script>
</body>
</html>
