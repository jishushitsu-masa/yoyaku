<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おぶせ自習室 予約</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>おぶせ自習室 予約</h1>
    </header>
    <div id="scheduleList"></div>
  </div>

  <script src="index.js"></script>
  <script>
    const LIFF_ID = "2009652448-8WjGp7jc";
    window.onload = async () => {
      await liff.init({ liffId: LIFF_ID });
      const res = await apiFetch('getSchedule', {});
      if (res.status === 'success') {
        renderSchedule(res.data);
      }
    };

    function renderSchedule(data) {
      const listEl = document.getElementById('scheduleList');
      listEl.innerHTML = ''; // 一度クリア

      // スプレッドシートの1行目(項目名)と完全に一致させる必要があります
      // エリア、会場名、日付、時間 という名前でシートを作成してください
      const obuseData = data.filter(item => item['エリア'] && item['エリア'].trim() === 'おぶせ');
      
      obuseData.forEach(item => {
        const div = document.createElement('div');
        div.className = 'res-card';
        div.innerHTML = `
          <div class="res-date">${item['日付'] || '日付未定'}</div>
          <div class="res-time">${item['時間'] || '時間未定'}</div>
          <div class="res-venue">${item['会場名'] || '会場未定'}</div>
          <button onclick="reserve('${item['日付']}','${item['時間']}','${item['会場名']}')">予約する</button>
        `;
        listEl.appendChild(div);
      });
    }
  </script>
</body>
</html>
