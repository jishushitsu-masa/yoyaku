<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小布施会場 予約フォーム</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>小布施会場 予約フォーム</h1>
      <p>元塾講師マサちゃんの自習室</p>
    </header>
    <div class="card">
      <form id="reservationForm">
        <div class="form-group">
          <label>予約日を選択</label>
          <div id="accordionHeader" class="accordion-header">
            <div id="selectedDateText" style="line-height: 1.4; flex: 1;">
              タップして日程を選択してください
            </div>
            <span class="arrow">▼</span>
          </div>
          <div id="scheduleLoader"></div>
          <div id="scheduleList" class="schedule-list accordion-content"></div>
        </div>
        <div class="form-group"><label>生徒名</label><input type="text" id="studentName" required></div>
        <div class="form-group"><label>保護者名</label><input type="text" id="parentName" required></div>
        <div class="form-group"><label>電話番号</label><input type="tel" id="phone" required></div>
        <div class="form-group">
          <label>利用区分</label>
          <div class="radio-group">
            <div class="radio-card"><input type="radio" id="d2" name="duration" value="2時間利用" checked><label for="d2">2時間利用</label></div>
            <div class="radio-card"><input type="radio" id="d1" name="duration" value="1時間利用"><label for="d1">1時間利用</label></div>
          </div>
        </div>
        <input type="hidden" id="selectedDate"><input type="hidden" id="selectedVenue"><input type="hidden" id="selectedTime">
        <button type="submit" class="btn btn-primary" id="submitBtn" disabled>予約を確定する</button>
      </form>
    </div>
  </div>
  <script src="index.js"></script>
  <script>
    const LIFF_ID = "2009652448-yEc3eycW";
    const SEARCH_KEYWORD = 'おぶせ';
    let lineUserId = "";
    let scheduleData = [];

    const accordionHeader = document.getElementById('accordionHeader');
    const scheduleList = document.getElementById('scheduleList');
    accordionHeader.onclick = () => { scheduleList.classList.toggle('open'); accordionHeader.classList.toggle('active'); };

    document.addEventListener('DOMContentLoaded', async () => {
      loadSavedUserInfo();
      liff.init({ liffId: LIFF_ID }).then(() => {
        if (liff.isLoggedIn()) { liff.getProfile().then(p => { lineUserId = p.userId; }); }
        else { liff.login(); }
      });
      showLoader('scheduleLoader');
      const res = await apiFetch('getSchedule', { venue: '' });
      hideLoader('scheduleLoader');
      if (res.status === 'success') { scheduleData = res.data; renderSchedule(); }
    });

    function saveUserInfo() {
      const info = { s: document.getElementById('studentName').value, p: document.getElementById('parentName').value, t: document.getElementById('phone').value };
      localStorage.setItem('user_info', JSON.stringify(info));
    }
    function loadSavedUserInfo() {
      const saved = localStorage.getItem('user_info');
      if (saved) {
        const info = JSON.parse(saved);
        document.getElementById('studentName').value = info.s || '';
        document.getElementById('parentName').value = info.p || '';
        document.getElementById('phone').value = info.t || '';
      }
    }

    function renderSchedule() {
      const listEl = document.getElementById('scheduleList');
      listEl.innerHTML = '';
      const today = new Date(); today.setHours(0,0,0,0);
      const limit = new Date(); limit.setDate(today.getDate() + 14);
      const filtered = scheduleData.filter(item => {
        const d = new Date(item['日付'].replace(/-/g, '/'));
        return (item['会場名'] || '').startsWith(SEARCH_KEYWORD) && d >= today && d <= limit && item['休み'] !== true;
      });
      if (filtered.length === 0) { listEl.innerHTML = '<p style="text-align:center;padding:1rem;">予約可能な日程がありません。</p>'; return; }
      filtered.forEach(item => {
        const d = new Date(item['日付'].replace(/-/g, '/'));
        const day = ["日","月","火","水","木","金","土"][d.getDay()];
        const display = `${item['日付']}(${day}) ${item['時間'] || ''}`;
        const div = document.createElement('div');
        div.className = 'schedule-item selectable';
        div.innerHTML = `<div class="schedule-date">${display}<br><span style="font-size:0.8rem;color:#666;">${item['会場名']}</span></div>`;
        div.onclick = () => {
          document.getElementById('selectedDate').value = item['日付'];
          document.getElementById('selectedVenue').value = item['会場名'];
          document.getElementById('selectedTime').value = item['時間'] || '';
          
          document.getElementById('selectedDateText').innerHTML = `
            <div style="font-weight: bold; font-size: 1.05rem; color: var(--primary);">${display}</div>
            <div style="font-size: 0.85rem; color: #666; margin-top: 2px;">場所：${item['会場名']}</div>
          `;
          
          document.getElementById('submitBtn').disabled = false;
          scheduleList.classList.remove('open'); accordionHeader.classList.remove('active');
        };
        listEl.appendChild(div);
      });
    }

    document.getElementById('reservationForm').onsubmit = async (e) => {
      e.preventDefault();
      saveUserInfo();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.innerText = "送信中...";

      const res = await apiFetch('reserve', {
        venue: document.getElementById('selectedVenue').value,
        studentName: document.getElementById('studentName').value,
        parentName: document.getElementById('parentName').value,
        phone: document.getElementById('phone').value,
        duration: document.querySelector('input[name="duration"]:checked').value,
        date: document.getElementById('selectedDate').value,
        time: document.getElementById('selectedTime').value,
        lineUserId: lineUserId
      });

      if (res.status === 'success') {
        document.body.innerHTML = '<div class="container" style="text-align:center;padding-top:100px;"><h2>予約が完了しました</h2><p>LINE通知をご確認ください。</p></div>';
      } else {
        // 同姓同名の重複エラー等をアラートで表示
        alert(res.message || "予約に失敗しました。内容をご確認ください。");
        btn.disabled = false; 
        btn.innerText = "予約を確定する";
      }
    };
  </script>
</body>
</html>
