<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約完了 - マサちゃんの自習室</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-navy: #1e3a8a; --light-blue: #eff6ff; --text-gray: #4b5563; }
        body { font-family: sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; text-align: center; border-top: 8px solid var(--primary-navy); }
        .success-icon { color: #10b981; font-size: 50px; margin-bottom: 15px; }
        h2 { color: var(--primary-navy); margin-bottom: 25px; font-size: 1.4rem; }
        .info-box { background: var(--light-blue); padding: 20px; border-radius: 12px; text-align: left; margin-bottom: 25px; }
        .info-item { margin-bottom: 12px; display: flex; flex-direction: column; }
        .label { font-size: 0.85rem; color: var(--text-gray); font-weight: bold; }
        .value { font-size: 1.1rem; color: #111827; margin-top: 2px; }
        .msg { font-size: 0.9rem; color: var(--text-gray); line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <i class="fas fa-check-circle success-icon"></i>
        <h2>予約が完了しました</h2>
        
        <div id="loading">情報を取得中...</div>
        <div id="content" style="display:none;">
            <div class="info-box">
                <div class="info-item">
                    <span class="label">会場</span>
                    <span class="value" id="res-location">おぶせ岩松院</span>
                </div>
                <div class="info-item">
                    <span class="label">日時</span>
                    <span class="value" id="res-time"></span>
                </div>
                <div class="info-item">
                    <span class="label">お名前</span>
                    <span class="value" id="res-name"></span>
                </div>
            </div>
            <p class="msg">
                ご予約ありがとうございます。<br>
                当日、会場でお待ちしております。
            </p>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxTBvPsDY2fx3_ZfoOhZ43a1QVZgPSb7KrdcTbfwBahpMS4Bj5ZNhPnDDOZR88ThS5uLA/exec';

        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const bookingId = params.get('id');
            if (!bookingId) return;

            try {
                const res = await fetch(`${API_URL}?action=getBooking&id=${bookingId}`);
                const data = await res.json();
                
                if (data) {
                    // 会場名が「おぶせ」なら「おぶせ岩松院」に補完
                    document.getElementById('res-location').innerText = data.location.includes('おぶせ') ? 'おぶせ岩松院' : data.location;
                    document.getElementById('res-time').innerText = `${data.date} ${data.time}`;
                    document.getElementById('res-name').innerText = data.studentName + " 様";
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('content').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('loading').innerText = "情報の取得に失敗しました。";
            }
        };
    </script>
</body>
</html>
