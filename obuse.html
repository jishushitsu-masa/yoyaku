<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小布施会場 予約フォーム</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>小布施会場 予約フォーム</h1>
      <p>元塾講師マサちゃんの自習室</p>
    </header>
    <div class="card">
      <form id="reservationForm">
        <div class="form-group">
          <label>予約日を選択</label>
          <div id="accordionHeader" class="accordion-header"><span id="selectedDateText">日程を選択してください</span></div>
          <div id="scheduleList" class="schedule-list accordion-content"></div>
        </div>
        <div class="form-group"><label>生徒名</label><input type="text" id="studentName" required></div>
        <div class="form-group"><label>保護者名</label><input type="text" id="parentName" required></div>
        <div class="form-group"><label>電話番号</label><input type="tel" id="phone" required></div>
        <div class="form-group">
          <label>利用区分</label>
          <div class="radio-group">
            <div class="radio-card"><input type="radio" name="duration" value="2時間利用" id="d2" checked><label for="d2">2時間</label></div>
            <div class="radio-card"><input type="radio" name="duration" value="1時間利用" id="d1"><label for="d1">1時間</label></div>
          </div>
        </div>
        <input type="hidden" id="selectedDate"><input type="hidden" id="selectedVenue"><input type="hidden" id="selectedTime">
        <button type="submit" class="btn btn-primary" id="submitBtn" disabled>予約を確定する</button>
      </form>
    </div>
  </div>
  <script src="index.js"></script>
  <script>
    let lineUserId = "";
    // ここにLIFF IDを入れてください
    const LIFF_ID = "2009652448-yEc3eycW";

    liff.init({ liffId: LIFF_ID }).then(() => {
      if (liff.isLoggedIn()) {
        liff.getProfile().then(p => { lineUserId = p.userId; });
      } else { liff.login(); }
    });

    // 既存のrenderSchedule/API呼び出し処理を継続使用
    // ※index.jsが読み込まれている前提です

    document.getElementById('reservationForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerText = "送信中...";
      
      const result = await apiFetch('reserve', {
        venue: document.getElementById('selectedVenue').value,
        studentName: document.getElementById('studentName').value,
        parentName: document.getElementById('parentName').value,
        phone: document.getElementById('phone').value,
        duration: document.querySelector('input[name="duration"]:checked').value,
        date: document.getElementById('selectedDate').value,
        time: document.getElementById('selectedTime').value,
        lineUserId: lineUserId
      });
      if (result.status === 'success') {
        document.body.innerHTML = '<div style="padding:100px 20px;text-align:center;"><h2>予約が完了しました</h2><p>LINEに確認メッセージを送信しました。<br>この画面を閉じてください。</p></div>';
      }
    };
  </script>
</body>
</html>
