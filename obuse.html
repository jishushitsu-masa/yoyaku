<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小布施会場 予約フォーム | 元塾講師マサちゃんの自習室</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>小布施会場 予約フォーム</h1>
      <p>元塾講師マサちゃんの自習室</p>
    </header>

    <div class="card">
      <form id="reservationForm">
        <div class="form-group">
          <label>予約日を選択</label>
          <div id="accordionHeader" class="accordion-header">
            <span id="selectedDateText">タップして日程を選択してください</span>
            <span class="arrow">▼</span>
          </div>
          <div id="scheduleLoader"></div>
          <div id="scheduleList" class="schedule-list accordion-content">
            </div>
        </div>

        <div class="form-group">
          <label for="studentName">生徒名</label>
          <input type="text" id="studentName" required placeholder="例: 山田 太郎">
        </div>
        <div class="form-group">
          <label for="parentName">保護者名</label>
          <input type="text" id="parentName" required placeholder="例: 山田 花子">
        </div>
        <div class="form-group">
          <label for="phone">電話番号</label>
          <input type="tel" id="phone" required placeholder="例: 09012345678">
        </div>

        <div class="form-group">
          <label>利用時間</label>
          <div class="radio-group">
            <div class="radio-card">
              <input type="radio" id="durationNormal" name="duration" value="2時間" checked>
              <label for="durationNormal">2時間利用</label>
            </div>
            <div class="radio-card">
              <input type="radio" id="durationShort" name="duration" value="1時間">
              <label for="durationShort">1時間利用</label>
            </div>
          </div>
        </div>

        <input type="hidden" id="selectedDate" value="">
        <div id="messageArea" class="hidden"></div>
        <button type="submit" class="btn btn-primary" id="submitBtn" disabled>予約を確定する</button>
      </form>
    </div>
  </div>

  <script src="index.js"></script>
  <script>
    const VENUE_NAME = 'おぶせ 岩松院';
    let scheduleData = [];

    const accordionHeader = document.getElementById('accordionHeader');
    const scheduleList = document.getElementById('scheduleList');

    accordionHeader.addEventListener('click', () => {
      scheduleList.classList.toggle('open');
      accordionHeader.classList.toggle('active');
    });

    document.addEventListener('DOMContentLoaded', async () => {
      // 保存されている入力情報を読み込む
      loadSavedUserInfo();

      showLoader('scheduleLoader');
      const response = await apiFetch('getSchedule', { venue: VENUE_NAME });
      hideLoader('scheduleLoader');

      if (response.status === 'success') {
        scheduleData = response.data;
        renderSchedule();
      } else {
        showMessage('messageArea', 'スケジュールの取得に失敗しました。', true);
      }
    });

    // 入力情報を保存する関数
    function saveUserInfo() {
      const userInfo = {
        studentName: document.getElementById('studentName').value,
        parentName: document.getElementById('parentName').value,
        phone: document.getElementById('phone').value
      };
      localStorage.setItem('jishushitsu_user_info', JSON.stringify(userInfo));
    }

    // 保存された入力情報を読み込む関数
    function loadSavedUserInfo() {
      const saved = localStorage.getItem('jishushitsu_user_info');
      if (saved) {
        const userInfo = JSON.parse(saved);
        document.getElementById('studentName').value = userInfo.studentName || '';
        document.getElementById('parentName').value = userInfo.parentName || '';
        document.getElementById('phone').value = userInfo.phone || '';
      }
    }

    function renderSchedule() {
      const listEl = document.getElementById('scheduleList');
      listEl.innerHTML = '';

      if (!scheduleData || scheduleData.length === 0) {
        listEl.innerHTML = '<p style="text-align:center; padding:1rem;">予約可能な日程がありません。</p>';
        return;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const limitDate = new Date();
      limitDate.setDate(today.getDate() + 14);
      limitDate.setHours(23, 59, 59, 999);

      const filteredData = scheduleData.filter(item => {
        const itemDate = new Date(item['日付']);
        return itemDate >= today && itemDate <= limitDate;
      });

      if (filteredData.length === 0) {
        listEl.innerHTML = '<p style="text-align:center; padding:1rem;">14日以内に予約可能な日程がありません。</p>';
        return;
      }

      const dayOfWeekStr = ["日", "月", "火", "水", "木", "金", "土"];

      filteredData.forEach((item, index) => {
        const dateObj = new Date(item['日付']);
        const dayOfWeek = dayOfWeekStr[dateObj.getDay()];
        const displayDate = `${item['日付']}(${dayOfWeek}) ${item['時間'] || ''}`;

        const div = document.createElement('div');
        div.className = 'schedule-item selectable';
        div.innerHTML = `
          <div class="schedule-date">
            ${displayDate}<br>
            <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: normal;">${item['会場名'] || VENUE_NAME}</span>
          </div>
        `;
        
        div.onclick = () => {
          document.getElementById('selectedDate').value = item['日付'];
          document.getElementById('selectedDateText').innerText = displayDate;
          document.getElementById('selectedDateText').style.color = 'var(--primary)';
          document.getElementById('submitBtn').disabled = false;
          scheduleList.classList.remove('open');
          accordionHeader.classList.remove('active');
        };
        listEl.appendChild(div);
      });
    }

    document.getElementById('reservationForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '送信中...';
      
      // 予約実行時に入力情報を保存
      saveUserInfo();

      const result = await apiFetch('reserve', {
        venue: VENUE_NAME,
        studentName: document.getElementById('studentName').value,
        parentName: document.getElementById('parentName').value,
        phone: document.getElementById('phone').value,
        duration: document.querySelector('input[name="duration"]:checked').value,
        date: document.getElementById('selectedDate').value
      });

      if (result.status === 'success') {
        document.getElementById('reservationForm').innerHTML = `
          <div style="text-align: center; padding: 2rem 0;">
            <h2 style="color: var(--secondary);">予約が完了しました</h2>
            <p>ご登録ありがとうございます。<br>公式LINEより詳細をお送りします。</p>
          </div>
        `;
      } else {
        showMessage('messageArea', '予約に失敗しました。', true);
        btn.disabled = false;
        btn.textContent = '予約を確定する';
      }
    };
  </script>
</body>
</html>
