<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約画面 - おぶせ 春の自習室</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-blue: #2563eb; --primary-orange: #ff8c00; --bg-gray: #f8f9fa; }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; background-color: var(--bg-gray); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: var(--primary-blue); font-size: 1.4rem; margin-bottom: 30px; text-align: left; }
        
        .field-label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.95rem; }
        .required-badge { background: #2563eb; color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
        
        /* アコーディオン */
        .select-box { border: 1px solid #ced4da; padding: 14px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; background: #fff; }
        .options-container { display: none; border: 1px solid #ced4da; border-top: none; border-radius: 0 0 8px 8px; max-height: 300px; overflow-y: auto; background: #fff; margin-bottom: 25px; margin-top: -8px; }
        .option-item { padding: 15px; border-bottom: 1px solid #f1f1f1; cursor: pointer; display: flex; justify-content: space-between; }
        .option-item.disabled { color: #adb5bd; cursor: not-allowed; background: #fdfdfd; }

        /* フォーム */
        .form-group { margin-bottom: 20px; }
        input[type="text"], input[type="tel"] { width: 100%; padding: 14px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .checkbox-card { background: #fff; border: 1px solid #ced4da; padding: 16px; border-radius: 10px; margin-bottom: 30px; display: flex; align-items: center; cursor: pointer; }
        .checkbox-card input { width: 20px; height: 20px; margin-right: 12px; }

        .submit-btn { width: 100%; background: var(--primary-blue); color: #fff; border: none; padding: 18px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .submit-btn:disabled { background: #ccc; }
        
        .status-txt { font-size: 0.85rem; font-weight: bold; }
        .available { color: var(--primary-orange); }
    </style>
</head>
<body>

<div class="container">
    <h2>おぶせ 春の自習室</h2>
    
    <form id="resForm" onsubmit="handleFormSubmit(event)">
        <div class="form-group">
            <label class="field-label">日程を選択<span class="required-badge">必須</span></label>
            <div class="select-box" onclick="toggleDropdown()">
                <span id="selected-text">読み込み中...</span>
                <i class="fas fa-chevron-down" id="arrow-icon"></i>
            </div>
            <div class="options-container" id="dropdown-menu"></div>
        </div>

        <input type="hidden" name="date" id="val-date" required>
        <input type="hidden" name="time" id="val-time">
        <input type="hidden" name="location" value="おぶせ">

        <div class="form-group">
            <label class="field-label">参加者名<span class="required-badge">必須</span></label>
            <input type="text" name="studentName" id="field-student" required placeholder="例：佐藤 太郎">
        </div>

        <div class="form-group">
            <label class="field-label">保護者名<span class="required-badge">必須</span></label>
            <input type="text" name="parentName" id="field-parent" required placeholder="例：佐藤 花子">
        </div>

        <div class="form-group">
            <label class="field-label">電話番号<span class="required-badge">必須</span></label>
            <input type="tel" name="phone" id="field-phone" required placeholder="例：09012345678">
        </div>

        <div class="checkbox-card" onclick="toggleCheck()">
            <input type="checkbox" id="plan-1h" name="plan" value="1hour">
            <span>1時間のみ利用する</span>
        </div>

        <button type="submit" id="submit-button" class="submit-btn">予約を確定する</button>
    </form>
</div>

<script>
    // ★★★ここにマサちゃんさんの「最新の」GASのURLを貼り付けてください★★★
    const API_URL = 'https://script.google.com/macros/s/AKfycbxTBvPsDY2fx3_ZfoOhZ43a1QVZgPSb7KrdcTbfwBahpMS4Bj5ZNhPnDDOZR88ThS5uLA/exec';

    window.onload = function() {
        document.getElementById('field-student').value = localStorage.getItem('studentName') || '';
        document.getElementById('field-parent').value = localStorage.getItem('parentName') || '';
        document.getElementById('field-phone').value = localStorage.getItem('phone') || '';
        loadSchedules();
    };

    async function loadSchedules() {
        const selectedText = document.getElementById('selected-text');
        selectedText.innerText = "日程を読み込み中...";
        
        try {
            // キャッシュ回避のためにランダムな数字を付与
            const res = await fetch(`${API_URL}?action=getSchedules&location=おぶせ&t=${Date.now()}`);
            if (!res.ok) throw new Error('Network response was not ok');
            
            const data = await res.json();
            const menu = document.getElementById('dropdown-menu');
            menu.innerHTML = '';

            if (data.length === 0) {
                selectedText.innerText = "選択可能な日程がありません";
                return;
            }

            data.forEach(item => {
                const row = document.createElement('div');
                row.className = 'option-item' + (item.status !== 'available' ? ' disabled' : '');
                let statusHtml = item.status === 'available' ? '<span class="status-txt available">予約可</span>' : '不可';
                row.innerHTML = `<span>${item.date} (${item.time})</span> ${statusHtml}`;
                
                if(item.status === 'available') {
                    row.onclick = () => {
                        document.getElementById('selected-text').innerText = `${item.date} (${item.time})`;
                        document.getElementById('val-date').value = item.fullDate;
                        document.getElementById('val-time').value = item.time;
                        toggleDropdown();
                    };
                }
                menu.appendChild(row);
            });
            selectedText.innerText = "タップして日程を表示";
        } catch (err) {
            console.error(err);
            selectedText.innerText = "日程の読み込みに失敗しました";
            alert("GASとの通信に失敗しました。URLが正しいか、またはGASのデプロイ設定が「全員」になっているか確認してください。");
        }
    }

    function toggleDropdown() {
        const menu = document.getElementById('dropdown-menu');
        const isOpen = menu.style.display === 'block';
        menu.style.display = isOpen ? 'none' : 'block';
    }

    function toggleCheck() {
        const chk = document.getElementById('plan-1h');
        chk.checked = !chk.checked;
    }

    async function handleFormSubmit(e) {
        e.preventDefault();
        if(!document.getElementById('val-date').value) { alert('日程を選択してください'); return; }
        const btn = document.getElementById('submit-button');
        btn.disabled = true;
        btn.innerText = "送信中...";

        const formData = new FormData(e.target);
        const postData = Object.fromEntries(formData.entries());

        localStorage.setItem('studentName', postData.studentName);
        localStorage.setItem('parentName', postData.parentName);
        localStorage.setItem('phone', postData.phone);

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'booking', ...postData })
            });
            const result = await res.json();
            if(result.success) {
                window.location.href = 'kakunin.html?id=' + result.bookingId;
            } else {
                alert('予約に失敗しました');
                btn.disabled = false;
            }
        } catch (err) {
            alert('通信エラーが発生しました');
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
