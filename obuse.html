<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自習室予約（おぶせ）</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-bold mb-4">自習室予約（おぶせ）</h1>

        <div id="loading">読み込み中...</div>

        <div id="mainForm" class="hidden">
            <p class="mb-2 font-bold">1. 日程を選択してください</p>
            <div id="scheduleList" class="space-y-2 mb-6">
                </div>

            <div class="space-y-4">
                <p class="font-bold">2. 情報を入力してください</p>
                <div>
                    <label class="block text-sm">参加者名</label>
                    <input type="text" id="participantName" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm">保護者名</label>
                    <input type="text" id="parentName" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm">電話番号</label>
                    <input type="tel" id="phone" class="w-full border p-2 rounded" placeholder="09012345678">
                </div>
                <div>
                    <label class="block text-sm">プラン</label>
                    <select id="plan" class="w-full border p-2 rounded">
                        <option value="1時間 500円（都度払い）">1時間 500円（都度払い）</option>
                    </select>
                </div>
            </div>

            <button id="submitBtn" onclick="submitReservation()" class="w-full bg-blue-500 text-white font-bold py-3 px-4 rounded mt-6">
                予約を確定する
            </button>
        </div>
    </div>

    <script>
        // ★ご自身のURLとIDに書き換えてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCUmZT4HSaGpqmAUYV2zLTtIUwjQVHlbR_1aYNrh1tAQ9LDSi-Rzad17Y-Bt73iCSmGQ/exec"; 
        const LIFF_ID = "2009652448-yEc3eycW"; 

        let selectedSchedule = null;
        let lineUserId = "";

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                const profile = await liff.getProfile();
                lineUserId = profile.userId;
                fetchSchedules();
            } catch (err) {
                alert("エラーが発生しました。");
            }
        }

        async function fetchSchedules() {
            try {
                const response = await fetch(`${GAS_URL}?action=getSchedules&venue=obuse`);
                const data = await response.json();
                
                const list = document.getElementById('scheduleList');
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('mainForm').classList.remove('hidden');

                data.forEach(item => {
                    const div = document.createElement('div');
                    
                    if (item.isDisabled) {
                        // お休みの場合（グレー表示・クリック不可）
                        div.className = "p-3 border rounded bg-gray-100 text-gray-400";
                        div.innerText = `${item.date} ${item.time} （休み）`;
                    } else {
                        // 通常の場合
                        div.className = "p-3 border rounded cursor-pointer hover:bg-gray-50 schedule-item";
                        div.innerText = `${item.date} ${item.time}`;
                        div.onclick = () => {
                            document.querySelectorAll('.schedule-item').forEach(el => el.classList.remove('bg-blue-100', 'border-blue-500'));
                            div.classList.add('bg-blue-100', 'border-blue-500');
                            selectedSchedule = item;
                        };
                    }
                    list.appendChild(div);
                });
            } catch (err) {
                alert("日程の取得に失敗しました。");
            }
        }

        async function submitReservation() {
            const pName = document.getElementById('participantName').value;
            const paName = document.getElementById('parentName').value;
            const phone = document.getElementById('phone').value;
            const plan = document.getElementById('plan').value;

            if (!selectedSchedule || !pName || !paName || !phone) {
                alert("未入力の項目があります。");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerText = "送信中...";
            btn.disabled = true;

            const payload = {
                action: "saveReservation",
                data: {
                    scheduleId: selectedSchedule.id,
                    scheduleLocation: selectedSchedule.location,
                    scheduleDate: selectedSchedule.date,
                    scheduleTime: selectedSchedule.time,
                    participantName: pName,
                    parentName: paName,
                    phone: phone,
                    plan: plan,
                    lineUserId: lineUserId,
                    liffId: LIFF_ID
                }
            };

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.status === "success") {
                    alert("予約が完了しました。");
                    liff.closeWindow();
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("送信エラーが発生しました。");
                btn.innerText = "予約を確定する";
                btn.disabled = false;
            }
        }

        main();
    </script>
</body>
</html>
