<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小布施会場 予約フォーム</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>小布施会場 予約フォーム</h1>
      <p>元塾講師マサちゃんの自習室</p>
    </header>
    <div class="card">
      <form id="reservationForm">
        <div class="form-group">
          <label>予約日を選択</label>
          <div id="accordionHeader" class="accordion-header">
            <div id="selectedDateText" style="line-height: 1.4; flex: 1;">タップして日程を選択してください</div>
            <span class="arrow">▼</span>
          </div>
          <div id="scheduleList" class="schedule-list accordion-content"></div>
        </div>
        
        <div class="form-group"><label>生徒名</label><input type="text" id="studentName" required></div>
        <div class="form-group"><label>保護者名</label><input type="text" id="parentName" required></div>
        <div class="form-group"><label>電話番号</label><input type="tel" id="phone" required></div>
        
        <div class="form-group">
          <label>利用区分</label>
          <div class="radio-group" style="display:flex; gap:10px;">
            <div class="radio-card"><input type="radio" id="d2" name="duration" value="2時間利用" checked><label for="d2">2時間利用</label></div>
            <div class="radio-card"><input type="radio" id="d1" name="duration" value="1時間利用"><label for="d1">1時間利用</label></div>
          </div>
        </div>

        <input type="hidden" id="selectedDate">
        <input type="hidden" id="selectedArea"value="おぶせ">
        <input type="hidden" id="selectedVenue">
        <input type="hidden" id="selectedTime">
        
        <button type="submit" class="btn btn-primary" id="submitBtn" disabled>予約を確定する</button>
      </form>
    </div>
  </div>
  <script src="index.js"></script>
<script>
    const LIFF_ID = "2009652448-yEc3eycW";
    const AREA_NAME = 'おぶせ';
    let lineUserId = "";
    let scheduleData = [];

    // 1. LIFFとデータの初期化処理
    async function initApp() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const p = await liff.getProfile();
          lineUserId = p.userId;
        } else {
          liff.login();
        }
        // ここで初めてデータを取得し、表示を確定させる
        const res = await apiFetch('getSchedule');
        if (res.status === 'success') {
          scheduleData = res.data;
          renderSchedule();
        }
      } catch (err) {
        console.error("Initialization failed", err);
      }
    }

  // 画面を開いた時にローカルストレージから値をセット
  window.addEventListener('load', () => {
    if(localStorage.getItem('studentName')) document.getElementById('studentName').value = localStorage.getItem('studentName');
    if(localStorage.getItem('parentName')) document.getElementById('parentName').value = localStorage.getItem('parentName');
    if(localStorage.getItem('phone')) document.getElementById('phone').value = localStorage.getItem('phone');
  });
  
    // 2. アコーディオン開閉＋ローディング処理
    document.getElementById('accordionHeader').onclick = async () => {
        const list = document.getElementById('scheduleList');
        const header = document.getElementById('accordionHeader');
        const text = document.getElementById('selectedDateText');

        if (!list.classList.contains('open')) {
            // 開く時の処理
            if (scheduleData.length === 0) {
                const originalText = text.innerHTML;
                text.innerHTML = '読み込み中...';
                // データが空なら再取得を試みる
                const res = await apiFetch('getSchedule');
                if (res.status === 'success') {
                    scheduleData = res.data;
                    renderSchedule();
                }
                text.innerHTML = originalText;
            }
            list.classList.add('open');
            header.classList.add('active');
        } else {
            // 閉じる時の処理
            list.classList.remove('open');
            header.classList.remove('active');
        }
    };

    // 3. アプリ起動
    initApp();

    function renderSchedule() {
      const list = document.getElementById('scheduleList');
      list.innerHTML = '';
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const limitDate = new Date(today); limitDate.setDate(today.getDate() + 14);
      
      // 曜日用の配列
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      
      const filtered = scheduleData.filter(item => {
        const itemDate = new Date(item['日付']);
        return item['エリア'] === AREA_NAME && itemDate >= today && itemDate <= limitDate;
      });

      filtered.forEach(item => {
        const isOff = item['休み'] === '休み';
        const d = new Date(item['日付']);
        
        // 曜日を取得して「(曜)」の形式にする
        const dayStr = days[d.getDay()];
        const displayDate = `${d.getMonth()+1}/${d.getDate()}(${dayStr})`;
        
        const div = document.createElement('div');
        div.className = `schedule-item ${isOff ? 'disabled' : 'selectable'}`;
        div.style.padding = "10px"; div.style.borderBottom = "1px solid #eee";
        div.innerHTML = `<div><b>${displayDate} ${item['時間']}</b> ${isOff ? '<small style="color:red;">(休み)</small>' : ''}<br><small>場所：${item['会場名']}</small></div>`;
        
        if (!isOff) {
          div.onclick = () => {
            document.getElementById('selectedDate').value = item['日付'];
            document.getElementById('selectedTime').value = item['時間'];
            document.getElementById('selectedVenue').value = item['会場名'];
            document.getElementById('selectedDateText').innerHTML = `<b>${displayDate} ${item['時間']}</b><br><small>場所：${item['会場名']}</small>`;
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('scheduleList').classList.remove('open');
            document.getElementById('accordionHeader').classList.remove('active');
          };
        } else {
          div.style.opacity = "0.5"; div.style.cursor = "not-allowed";
        }
        list.appendChild(div);
      });
    }    
    
    document.getElementById('reservationForm').onsubmit = async (e) => {
      e.preventDefault();
      // 【ここに追加】送信時に保存
    localStorage.setItem('studentName', document.getElementById('studentName').value);
    localStorage.setItem('parentName', document.getElementById('parentName').value);
    localStorage.setItem('phone', document.getElementById('phone').value);
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.innerText = "送信中...";
      const res = await apiFetch('reserve', {
        area: document.getElementById('selectedArea').value,
        venue: document.getElementById('selectedVenue').value,
        studentName: document.getElementById('studentName').value,
        parentName: document.getElementById('parentName').value,
        phone: document.getElementById('phone').value,
        duration: document.querySelector('input[name="duration"]:checked').value,
        date: document.getElementById('selectedDate').value,
        time: document.getElementById('selectedTime').value,
        lineUserId: lineUserId
      });
      if (res.status === 'success') document.body.innerHTML = '<div class="container" style="text-align:center;padding-top:100px;"><h2>予約が完了しました</h2></div>';
      else { alert(res.message); btn.disabled = false; btn.innerText = "予約を確定する"; }
    };
  </script>
