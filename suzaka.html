<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>予約画面 - すざか 春の自習室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // すざか用は少し青みのある色（インディゴ）でデザインしています
        tailwind.config = { theme: { extend: { colors: { brand: '#4F46E5', 'brand-dark': '#4338CA' } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f3f4f6; }
        .required-badge { background-color: #4F46E5; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: bold;}
    </style>
</head>
<body class="text-gray-800">

    <div class="max-w-md mx-auto bg-white min-h-screen relative shadow-lg overflow-hidden pb-24">
        
        <header class="border-b border-gray-200 p-4 flex justify-between items-center bg-white sticky top-0 z-10">
            <h1 class="text-lg font-bold">すざか 春の自習室</h1>
            <button onclick="closeApp()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
        </header>

        <!-- 画面１：入力画面 -->
        <div id="view-input" class="p-4 space-y-6 block">
            <section>
                <h2 class="font-bold text-gray-700 mb-3">日程を選択</h2>
                <div class="space-y-3" id="schedule-list">
                    <!-- ここに日程が表示されます -->
                </div>
                <p id="error-schedule" class="text-red-500 text-sm mt-1 hidden">日程を選択してください。</p>
            </section>

            <hr class="border-gray-100">

            <section class="space-y-5">
                <div>
                    <div class="flex items-center mb-2"><label class="font-bold text-gray-700 text-sm">参加者名</label><span class="required-badge">必須</span></div>
                    <div class="flex space-x-2">
                        <input type="text" id="participant-last" placeholder="姓" class="w-1/2 border border-gray-300 rounded p-2 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
                        <input type="text" id="participant-first" placeholder="名" class="w-1/2 border border-gray-300 rounded p-2 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
                    </div>
                    <p id="error-participant" class="text-red-500 text-sm mt-1 hidden">参加者名を入力してください。</p>
                </div>
                <div>
                    <div class="flex items-center mb-2"><label class="font-bold text-gray-700 text-sm">保護者名</label><span class="required-badge">必須</span></div>
                    <div class="flex space-x-2">
                        <input type="text" id="parent-last" placeholder="姓" class="w-1/2 border border-gray-300 rounded p-2 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
                        <input type="text" id="parent-first" placeholder="名" class="w-1/2 border border-gray-300 rounded p-2 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
                    </div>
                    <p id="error-parent" class="text-red-500 text-sm mt-1 hidden">保護者名を入力してください。</p>
                </div>
                <div>
                    <div class="flex items-center mb-2"><label class="font-bold text-gray-700 text-sm">電話番号</label><span class="required-badge">必須</span></div>
                    <input type="tel" id="phone" placeholder="数字のみ（ハイフン不要）" class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand">
                    <p id="error-phone" class="text-red-500 text-sm mt-1 hidden">正しい電話番号を入力してください。</p>
                </div>
                <div class="pt-2">
                    <label class="flex items-center space-x-3 cursor-pointer p-3 bg-gray-50 border border-gray-200 rounded-lg">
                        <input type="checkbox" id="one-hour-only" class="w-5 h-5 text-brand rounded focus:ring-brand border-gray-300 accent-brand">
                        <span class="text-gray-700 font-medium">1時間のみ利用する</span>
                    </label>
                </div>
            </section>

            <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 p-4">
                <button onclick="goToConfirm()" class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-3 px-4 rounded-lg shadow transition duration-200">予約を確認する</button>
            </div>
        </div>

        <!-- 画面２：確認画面 -->
        <div id="view-confirm" class="p-4 hidden pb-24">
            <h2 class="text-xl font-bold text-center text-gray-800 mb-6 mt-4">予約内容の確認</h2>
            <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 space-y-4">
                <div>
                    <p class="text-sm text-gray-500 mb-1">選択した日程</p>
                    <p class="text-gray-800 text-sm mb-1"><i class="fas fa-map-marker-alt text-brand mr-1"></i><span id="confirm-location" class="font-bold">--</span></p>
                    <p class="font-bold text-gray-800" id="confirm-date">--</p>
                    <p class="text-gray-800 font-medium" id="confirm-time">--</p>
                </div>
                <hr class="border-gray-200">
                <div><p class="text-sm text-gray-500 mb-1">参加者名</p><p class="font-bold text-gray-800" id="confirm-participant">--</p></div>
                <hr class="border-gray-200">
                <div><p class="text-sm text-gray-500 mb-1">保護者名</p><p class="font-bold text-gray-800" id="confirm-parent">--</p></div>
                <hr class="border-gray-200">
                <div><p class="text-sm text-gray-500 mb-1">電話番号</p><p class="font-bold text-gray-800" id="confirm-phone">--</p></div>
                <hr class="border-gray-200">
                <div><p class="text-sm text-gray-500 mb-1">利用プラン</p><p class="font-bold text-gray-800" id="confirm-plan">通常（2時間）</p></div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 p-4 flex space-x-3">
                <button id="btn-back" onclick="goBackToInput()" class="w-1/3 bg-white border border-gray-300 text-gray-600 font-bold py-3 px-2 rounded-lg hover:bg-gray-50 transition duration-200">修正する</button>
                <button id="btn-submit" onclick="submitReservation()" class="w-2/3 bg-brand hover:bg-brand-dark text-white font-bold py-3 px-4 rounded-lg shadow transition duration-200 flex justify-center items-center">予約を確定する</button>
            </div>
        </div>

        <!-- 画面３：完了画面 -->
        <div id="view-success" class="p-8 hidden flex flex-col items-center justify-center min-h-[70vh]">
            <div class="w-20 h-20 bg-brand text-white rounded-full flex items-center justify-center mb-6 shadow-lg"><i class="fas fa-check text-4xl"></i></div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">予約が完了しました</h2>
            <p class="text-gray-600 text-center mb-8">ご予約ありがとうございます。<br>※LINEにメッセージが届きます。</p>
            <button onclick="closeApp()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-lg transition duration-200">画面を閉じる</button>
        </div>

        <!-- 画面４：キャンセル確認画面 -->
        <div id="view-cancel" class="p-8 hidden flex flex-col items-center justify-center min-h-[70vh]">
            <div class="w-20 h-20 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-6 shadow-lg"><i class="fas fa-exclamation-triangle text-4xl"></i></div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">予約をキャンセルしますか？</h2>
            <p class="text-gray-600 text-center mb-8">この操作は取り消せません。</p>
            <div class="w-full flex space-x-3">
                <button onclick="closeApp()" class="w-1/2 bg-gray-200 text-gray-800 font-bold py-3 rounded-lg">やめる</button>
                <button id="btn-cancel-submit" onclick="submitCancel()" class="w-1/2 bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-lg shadow transition duration-200">キャンセルする</button>
            </div>
        </div>

        <!-- 画面５：キャンセル完了画面 -->
        <div id="view-cancel-success" class="p-8 hidden flex flex-col items-center justify-center min-h-[70vh]">
            <div class="w-20 h-20 bg-gray-200 text-gray-600 rounded-full flex items-center justify-center mb-6 shadow-lg"><i class="fas fa-trash-alt text-4xl"></i></div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">キャンセル完了</h2>
            <p class="text-gray-600 text-center mb-8">予約のキャンセルを受け付けました。</p>
            <button onclick="closeApp()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-lg transition duration-200">画面を閉じる</button>
        </div>
    </div>

    <script>
        // ★新しくLINE Developersで作った「すざか用」のLIFF IDを貼り付けてください
        const LIFF_ID = "ここに新しいLIFF IDを貼り付ける";
        
        // データベース（GAS）は共通なのでそのまま使います
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCUmZT4HSaGpqmAUYV2zLTtIUwjQVHlbR_1aYNrh1tAQ9LDSi-Rzad17Y-Bt73iCSmGQ/exec";

        let schedules = [];
        let lineUserId = "";
        let cancelReservationId = "";

        window.onload = function() {
            if (LIFF_ID && LIFF_ID !== "ここに新しいLIFF IDを貼り付ける") {
                liff.init({ liffId: LIFF_ID })
                    .then(() => {
                        if (liff.isLoggedIn()) {
                            lineUserId = liff.getContext().userId;
                        } else {
                            liff.login();
                        }
                        routePage();
                    })
                    .catch((err) => {
                        routePage();
                    });
            } else {
                routePage();
            }
        };

        function routePage() {
            const urlParams = new URLSearchParams(window.location.search);
            const action = urlParams.get('action');
            const cancelId = urlParams.get('id');

            if (action === 'cancel' && cancelId) {
                cancelReservationId = cancelId;
                document.getElementById('view-input').classList.add('hidden');
                document.getElementById('view-cancel').classList.remove('hidden');
            } else {
                const listContainer = document.getElementById('schedule-list');
                listContainer.innerHTML = '<div class="text-center py-8 text-gray-500"><i class="fas fa-spinner fa-spin mr-2 text-brand text-2xl"></i><br><span class="text-sm mt-2 inline-block">日程を読み込んでいます...</span></div>';
                loadSchedulesFromGAS(listContainer);
            }
        }

        function loadSchedulesFromGAS(listContainer) {
            fetch(GAS_URL + "?action=getSchedules")
                .then(response => {
                    if (!response.ok) throw new Error('Network error');
                    return response.json();
                })
                .then(data => {
                    schedules = data;
                    renderSchedules(listContainer);
                })
                .catch(error => {
                    listContainer.innerHTML = '<div class="text-center py-4 text-red-500 font-bold border border-red-200 bg-red-50 rounded-lg">通信エラーが発生しました。<br>時間をおいて開き直してください。</div>';
                });
        }

        function renderSchedules(listContainer) {
            listContainer.innerHTML = ''; 
            
            // ★進化ポイント：場所に「すざか」と書かれている日程だけを表示する
            const suzakaSchedules = schedules.filter(s => s.location.includes('すざか'));

            if (suzakaSchedules.length === 0) {
                listContainer.innerHTML = '<div class="text-center py-4 text-gray-500 border border-gray-200 rounded-lg">現在、予約できる日程はありません。</div>';
                return;
            }
            suzakaSchedules.forEach(schedule => {
                const cardHtml = `
                    <label class="block border border-gray-200 rounded-lg p-4 cursor-pointer hover:bg-gray-50 transition flex items-start space-x-3 schedule-card" onclick="selectCard(this)">
                        <div class="pt-1">
                            <input type="radio" name="schedule_id" value="${schedule.id}" class="w-5 h-5 text-brand focus:ring-brand border-gray-300 accent-brand">
                        </div>
                        <div class="flex-1">
                            <div class="flex text-sm text-gray-500 mb-1">
                                <span class="w-12 font-bold">場所</span><span class="text-gray-600"><i class="fas fa-map-marker-alt text-brand mr-1"></i>${schedule.location}</span>
                            </div>
                            <div class="flex text-sm text-gray-500 mb-1">
                                <span class="w-12 font-bold">日程</span><span>${schedule.date}</span>
                            </div>
                            <div class="flex text-sm text-gray-500">
                                <span class="w-12 font-bold">時間</span><span class="font-medium text-gray-800">${schedule.time}</span>
                            </div>
                        </div>
                    </label>
                `;
                listContainer.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        function selectCard(labelElement) {
            document.querySelectorAll('.schedule-card').forEach(el => {
                el.classList.remove('border-brand', 'bg-indigo-50');
                el.classList.add('border-gray-200');
            });
            labelElement.classList.remove('border-gray-200');
            labelElement.classList.add('border-brand', 'bg-indigo-50');
        }

        function goToConfirm() {
            const selectedSchedule = document.querySelector('input[name="schedule_id"]:checked');
            const pLast = document.getElementById('participant-last').value.trim();
            const pFirst = document.getElementById('participant-first').value.trim();
            const parLast = document.getElementById('parent-last').value.trim();
            const parFirst = document.getElementById('parent-first').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const isOneHour = document.getElementById('one-hour-only').checked;

            let hasError = false;

            if (!selectedSchedule) {
                document.getElementById('error-schedule').classList.remove('hidden'); hasError = true;
            } else { document.getElementById('error-schedule').classList.add('hidden'); }

            if (pLast === "" || pFirst === "") {
                document.getElementById('error-participant').classList.remove('hidden'); hasError = true;
            } else { document.getElementById('error-participant').classList.add('hidden'); }

            if (parLast === "" || parFirst === "") {
                document.getElementById('error-parent').classList.remove('hidden'); hasError = true;
            } else { document.getElementById('error-parent').classList.add('hidden'); }

            if (phone === "" || !/^[0-9]+$/.test(phone)) {
                document.getElementById('error-phone').classList.remove('hidden'); hasError = true;
            } else { document.getElementById('error-phone').classList.add('hidden'); }

            if (hasError) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }
            
            const scheduleData = schedules.find(s => s.id === selectedSchedule.value);

            document.getElementById('confirm-location').innerText = scheduleData.location;
            document.getElementById('confirm-date').innerText = scheduleData.date;
            document.getElementById('confirm-time').innerText = scheduleData.time;
            document.getElementById('confirm-participant').innerText = `${pLast} ${pFirst}`;
            document.getElementById('confirm-parent').innerText = `${parLast} ${parFirst}`;
            document.getElementById('confirm-phone').innerText = phone;
            document.getElementById('confirm-plan').innerText = isOneHour ? "1時間のみ利用" : "通常（2時間）";

            if (isOneHour) {
                document.getElementById('confirm-plan').classList.add('text-brand'); 
            } else {
                document.getElementById('confirm-plan').classList.remove('text-brand');
            }

            document.getElementById('view-input').classList.add('hidden');
            document.getElementById('view-confirm').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function goBackToInput() {
            document.getElementById('view-confirm').classList.add('hidden');
            document.getElementById('view-input').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function submitReservation() {
            const selectedSchedule = document.querySelector('input[name="schedule_id"]:checked');
            const scheduleData = schedules.find(s => s.id === selectedSchedule.value);
            const isOneHour = document.getElementById('one-hour-only').checked;

            const pLast = document.getElementById('participant-last').value.trim();
            const pFirst = document.getElementById('participant-first').value.trim();
            const parLast = document.getElementById('parent-last').value.trim();
            const parFirst = document.getElementById('parent-first').value.trim();
            const phone = document.getElementById('phone').value.trim();

            const reservationData = {
                scheduleId: scheduleData.id,
                scheduleDate: scheduleData.date,
                scheduleTime: scheduleData.time,
                scheduleLocation: scheduleData.location,
                participantName: `${pLast} ${pFirst}`,
                parentName: `${parLast} ${parFirst}`,
                phone: phone,
                plan: isOneHour ? "1時間のみ" : "通常（2時間）",
                lineUserId: lineUserId
            };

            const btnSubmit = document.getElementById('btn-submit');
            const btnBack = document.getElementById('btn-back');
            btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>送信中...';
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-70');
            btnBack.disabled = true;

            const requestBody = {
                action: 'saveReservation',
                data: reservationData
            };

            fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(requestBody)
            })
            .then(response => response.json())
            .then(result => {
                if(result.status === "success") {
                    document.getElementById('view-confirm').classList.add('hidden');
                    document.getElementById('view-success').classList.remove('hidden');
                    window.scrollTo(0, 0);
                } else {
                    throw new Error(result.message || '保存に失敗しました');
                }
            })
            .catch(error => {
                alert("送信エラー: " + error.message);
                btnSubmit.innerHTML = "予約を確定する";
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-70');
                btnBack.disabled = false;
            });
        }

        function submitCancel() {
            const btn = document.getElementById('btn-cancel-submit');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>処理中...';
            btn.disabled = true;

            const requestBody = {
                action: 'cancelReservation',
                cancelId: cancelReservationId
            };

            fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(requestBody)
            })
            .then(response => response.json())
            .then(result => {
                if(result.status === "success") {
                    document.getElementById('view-cancel').classList.add('hidden');
                    document.getElementById('view-cancel-success').classList.remove('hidden');
                    window.scrollTo(0, 0);
                } else {
                    throw new Error(result.message || '処理に失敗しました');
                }
            })
            .catch(error => {
                alert("エラーが発生しました: " + error.message);
                btn.innerHTML = "キャンセルする";
                btn.disabled = false;
            });
        }

        function closeApp() {
            if (typeof liff !== 'undefined' && liff.isInClient()) { 
                liff.closeWindow(); 
            } else { 
                alert("画面右上の「×」ボタンを押して閉じてください。"); 
            }
        }
    </script>
</body>
</html>
