<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>予約画面 - すざか 春の自習室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // すざか用は少し大人っぽいインディゴ（濃い青紫色）でデザインしています
        tailwind.config = { theme: { extend: { colors: { brand: '#4F46E5', 'brand-dark': '#4338CA' } } } }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f3f4f6; }
        .required-badge { background-color: #4F46E5; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: bold;}
        .accordion-content { transition: max-height 0.3s ease-out; overflow: hidden; max-height: 0; }
        .accordion-open .accordion-content { max-height: 2000px; transition: max-height 0.5s ease-in; }
        .accordion-chevron { transition: transform 0.3s; }
        .accordion-open .accordion-chevron { transform: rotate(180deg); }
        /* 休み（無効）のスタイル */
        .schedule-disabled { opacity: 0.5; background-color: #f9fafb; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body class="text-gray-800">

    <div class="max-w-md mx-auto bg-white min-h-screen relative shadow-lg overflow-hidden pb-24">
        
        <header class="border-b border-gray-200 p-4 flex justify-between items-center bg-white sticky top-0 z-10">
            <h1 class="text-lg font-bold text-brand">すざか 春の自習室</h1>
        </header>

        <div id="view-input" class="p-4 space-y-6 block">
            <section>
                <div class="flex items-center mb-3"><h2 class="font-bold text-gray-700">日程を選択</h2><span class="required-badge">必須</span></div>
                
                <div id="accordion-container" class="border border-gray-300 rounded-lg overflow-hidden bg-white">
                    <button onclick="toggleAccordion()" class="w-full flex items-center justify-between p-4 hover:bg-gray-50 transition-colors text-left">
                        <span id="selected-schedule-label" class="text-gray-500 font-bold text-sm">タップして日程を表示</span>
                        <i class="fas fa-chevron-down accordion-chevron text-gray-400"></i>
                    </button>
                    <div class="accordion-content bg-gray-50">
                        <div class="p-3 space-y-3" id="schedule-list">
                            <div class="text-center py-4 text-gray-400 text-sm">読み込み中...</div>
                        </div>
                    </div>
                </div>
            </section>

            <hr class="border-gray-100">

            <section class="space-y-5">
                <div>
                    <div class="flex items-center mb-2"><label class="font-bold text-gray-700 text-sm">参加者名</label><span class="required-badge">必須</span></div>
                    <div class="flex space-x-2">
                        <input type="text" id="participant-last" placeholder="姓" class="w-1/2 border border-gray-300 rounded p-2 focus:outline-none focus:border-brand">
                        <input type="text" id="participant-first" placeholder="名" class="w-1/2 border border-gray-300 rounded p-2 focus:outline-none focus:border-brand">
                    </div>
                </div>
                <div>
                    <div class="flex items-center mb-2"><label class="font-bold text-gray-700 text-sm">保護者名</label><span class="required-badge">必須</span></div>
                    <div class="flex space-x-2">
                        <input type="text" id="parent-last" placeholder="姓" class="w-1/2 border border-gray-300 rounded p-2 focus:outline-none focus:border-brand">
                        <input type="text" id="parent-first" placeholder="名" class="w-1/2 border border-gray-300 rounded p-2 focus:outline-none focus:border-brand">
                    </div>
                </div>
                <div>
                    <div class="flex items-center mb-2"><label class="font-bold text-gray-700 text-sm">電話番号</label><span class="required-badge">必須</span></div>
                    <input type="tel" id="phone" placeholder="数字のみ（ハイフン不要）" class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:border-brand">
                </div>
                <div class="pt-2">
                    <label class="flex items-center space-x-3 cursor-pointer p-3 bg-gray-50 border border-gray-200 rounded-lg">
                        <input type="checkbox" id="one-hour-only" class="w-5 h-5 text-brand rounded accent-brand">
                        <span class="text-gray-700 font-medium">1時間のみ利用する</span>
                    </label>
                </div>
            </section>

            <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 p-4">
                <button onclick="goToConfirm()" class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-3 px-4 rounded-lg shadow">予約を確認する</button>
            </div>
        </div>

        <div id="view-confirm" class="p-4 hidden pb-24">
            <h2 class="text-xl font-bold text-center text-gray-800 mb-6 mt-4">予約内容の確認</h2>
            <div class="bg-gray-50 rounded-lg p-4 border border-gray-200 space-y-4">
                <div>
                    <p class="text-sm text-gray-500 mb-1">選択した日程</p>
                    <p class="text-gray-800 text-sm mb-1 text-gray-600"><i class="fas fa-map-marker-alt text-brand mr-1"></i><span id="confirm-location">--</span></p>
                    <p class="font-bold text-gray-800" id="confirm-date">--</p>
                    <p class="text-gray-800" id="confirm-time">--</p>
                </div>
                <hr class="border-gray-200">
                <div><p class="text-sm text-gray-500 mb-1">参加者名</p><p class="font-bold text-gray-800" id="confirm-participant">--</p></div>
                <div><p class="text-sm text-gray-500 mb-1">保護者名</p><p class="font-bold text-gray-800" id="confirm-parent">--</p></div>
                <div><p class="text-sm text-gray-500 mb-1">電話番号</p><p class="font-bold text-gray-800" id="confirm-phone">--</p></div>
                <div><p class="text-sm text-gray-500 mb-1">利用プラン</p><p class="font-bold text-gray-800" id="confirm-plan">通常利用</p></div>
            </div>
            <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-200 p-4 flex space-x-3">
                <button onclick="goBackToInput()" class="w-1/3 bg-white border border-gray-300 text-gray-600 font-bold py-3 rounded-lg">修正</button>
                <button id="btn-submit" onclick="submitReservation()" class="w-2/3 bg-brand text-white font-bold py-3 rounded-lg shadow">予約を確定する</button>
            </div>
        </div>

        <div id="view-success" class="p-8 hidden flex flex-col items-center justify-center min-h-[70vh]">
            <div class="w-20 h-20 bg-brand text-white rounded-full flex items-center justify-center mb-6 shadow-lg"><i class="fas fa-check text-4xl"></i></div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">予約完了</h2>
            <p class="text-gray-600 text-center mb-8 font-bold">公式アカウントからの通知を確認してください。<br><br>このままLINEのトーク画面へ戻ってください。</p>
        </div>

        <div id="view-cancel" class="p-8 hidden flex flex-col items-center justify-center min-h-[70vh]">
            <div class="w-20 h-20 bg-red-100 text-red-500 rounded-full flex items-center justify-center mb-6 shadow-lg"><i class="fas fa-exclamation-triangle text-4xl"></i></div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">予約をキャンセルしますか？</h2>
            <p class="text-gray-600 text-center mb-8">この操作は取り消せません。</p>
            <div class="w-full flex space-x-3">
                <button onclick="closeApp()" class="w-1/2 bg-gray-200 text-gray-800 font-bold py-3 rounded-lg">やめる</button>
                <button id="btn-cancel-submit" onclick="submitCancel()" class="w-1/2 bg-red-500 text-white font-bold py-3 rounded-lg shadow">キャンセルする</button>
            </div>
        </div>

        <div id="view-cancel-success" class="p-8 hidden flex flex-col items-center justify-center min-h-[70vh]">
            <div class="w-20 h-20 bg-gray-200 text-gray-600 rounded-full flex items-center justify-center mb-6 shadow-lg"><i class="fas fa-trash-alt text-4xl"></i></div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2 text-center">キャンセル完了</h2>
            <p class="text-gray-600 text-center mb-8">予約のキャンセルを受け付けました。</p>
        </div>
    </div>

    <script>
        // ★新しくLINE Developersで作った「すざか用」のLIFF IDを貼り付けてください
        const LIFF_ID = "2009652448-3y5lLswa";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCUmZT4HSaGpqmAUYV2zLTtIUwjQVHlbR_1aYNrh1tAQ9LDSi-Rzad17Y-Bt73iCSmGQ/exec";
        
        const STORAGE_KEY = "suzaka_jishu_user_v1";

        let schedules = [];
        let lineUserId = "";
        let cancelReservationId = "";

        window.onload = function() {
            initForm();
            if (LIFF_ID) {
                liff.init({ liffId: LIFF_ID })
                    .then(() => {
                        if (liff.isLoggedIn()) { lineUserId = liff.getContext().userId; }
                        else { liff.login(); }
                        routePage();
                    }).catch(routePage);
            } else {
                routePage();
            }
        };

        function initForm() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    document.getElementById('participant-last').value = data.pLast || "";
                    document.getElementById('participant-first').value = data.pFirst || "";
                    document.getElementById('parent-last').value = data.prLast || "";
                    document.getElementById('parent-first').value = data.prFirst || "";
                    document.getElementById('phone').value = data.phone || "";
                } catch (e) {}
            }
        }

        function saveToStorage() {
            const data = {
                pLast: document.getElementById('participant-last').value,
                pFirst: document.getElementById('participant-first').value,
                prLast: document.getElementById('parent-last').value,
                prFirst: document.getElementById('parent-first').value,
                phone: document.getElementById('phone').value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function toggleAccordion() {
            document.getElementById('accordion-container').classList.toggle('accordion-open');
        }

        function routePage() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('action') === 'cancel' && urlParams.get('id')) {
                cancelReservationId = urlParams.get('id');
                document.getElementById('view-input').classList.add('hidden');
                document.getElementById('view-cancel').classList.remove('hidden');
            } else {
                loadSchedulesFromGAS();
            }
        }

        function loadSchedulesFromGAS() {
            // すざかの会場のみを取得
            fetch(GAS_URL + "?action=getSchedules&venue=suzaka")
                .then(res => res.json())
                .then(data => {
                    schedules = data;
                    renderSchedules();
                });
        }

        function renderSchedules() {
            const listContainer = document.getElementById('schedule-list');
            listContainer.innerHTML = ''; 
            if (schedules.length === 0) {
                listContainer.innerHTML = '<div class="text-center py-4 text-gray-500">案内中の日程はありません。</div>';
                return;
            }
            schedules.forEach(s => {
                const isDisabled = s.isDisabled;
                const html = `
                    <label class="block border border-gray-200 rounded-lg p-4 cursor-pointer bg-white hover:bg-gray-50 transition flex items-start space-x-3 schedule-card ${isDisabled ? 'schedule-disabled' : ''}" onclick="${isDisabled ? '' : `selectCard(this, '${s.id}')`}">
                        <div class="pt-1"><input type="radio" name="schedule_id" value="${s.id}" ${isDisabled ? 'disabled' : ''} class="w-5 h-5 accent-brand"></div>
                        <div class="flex-1 text-sm text-gray-500">
                            <div><span class="font-bold w-12 inline-block text-gray-400">場所</span>${s.location} ${isDisabled ? '<span class="text-red-500 ml-2 font-bold">【休み】</span>' : ''}</div>
                            <div><span class="font-bold w-12 inline-block text-gray-400">日程</span>${s.date}</div>
                            <div><span class="font-bold w-12 inline-block text-gray-400">時間</span>${s.time}</div>
                        </div>
                    </label>
                `;
                listContainer.insertAdjacentHTML('beforeend', html);
            });
        }

        function selectCard(el, id) {
            document.querySelectorAll('.schedule-card').forEach(c => c.classList.remove('border-brand', 'bg-indigo-50'));
            el.classList.add('border-brand', 'bg-indigo-50');
            el.querySelector('input').checked = true;
            const s = schedules.find(x => x.id === id);
            document.getElementById('selected-schedule-label').innerHTML = `<div class="text-gray-800 font-bold text-brand text-sm">${s.location}</div><div class="mt-1"><span class="text-lg font-bold text-gray-800">${s.date}</span> <span class="text-xs text-gray-600 ml-2">${s.time}</span></div>`;
            setTimeout(() => document.getElementById('accordion-container').classList.remove('accordion-open'), 200);
        }

        function goToConfirm() {
            const selected = document.querySelector('input[name="schedule_id"]:checked');
            if (!selected) { alert("日程を選択してください"); return; }
            if (!document.getElementById('participant-last').value || !document.getElementById('phone').value) { alert("必須項目を入力してください"); return; }

            saveToStorage();

            const s = schedules.find(x => x.id === selected.value);
            const pName = document.getElementById('participant-last').value + " " + document.getElementById('participant-first').value;
            const prName = document.getElementById('parent-last').value + " " + document.getElementById('parent-first').value;
            const phone = document.getElementById('phone').value;
            const isOne = document.getElementById('one-hour-only').checked;

            document.getElementById('confirm-location').innerText = s.location;
            document.getElementById('confirm-date').innerText = s.date;
            document.getElementById('confirm-time').innerText = s.time;
            document.getElementById('confirm-participant').innerText = pName;
            document.getElementById('confirm-parent').innerText = prName;
            document.getElementById('confirm-phone').innerText = phone;
            document.getElementById('confirm-plan').innerText = isOne ? "1時間のみ利用" : "2時間利用";

            document.getElementById('view-input').classList.add('hidden');
            document.getElementById('view-confirm').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function goBackToInput() {
            document.getElementById('view-confirm').classList.add('hidden');
            document.getElementById('view-input').classList.remove('hidden');
        }

        function submitReservation() {
            const selected = document.querySelector('input[name="schedule_id"]:checked');
            const s = schedules.find(x => x.id === selected.value);
            const isOne = document.getElementById('one-hour-only').checked;
            const btn = document.getElementById('btn-submit');
            
            btn.innerHTML = "送信中...";
            btn.disabled = true;

            const payload = {
                action: 'saveReservation',
                data: {
                    scheduleId: s.id, scheduleDate: s.date, scheduleTime: s.time, scheduleLocation: s.location,
                    participantName: document.getElementById('participant-last').value + " " + document.getElementById('participant-first').value,
                    parentName: document.getElementById('parent-last').value + " " + document.getElementById('parent-first').value,
                    phone: document.getElementById('phone').value,
                    plan: isOne ? "1時間のみ" : "2時間利用", lineUserId: lineUserId,
                    liffId: LIFF_ID
                }
            };

            fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(res => res.json())
                .then(res => {
                    if(res.status === "success") {
                        document.getElementById('view-confirm').classList.add('hidden');
                        document.getElementById('view-success').classList.remove('hidden');
                    }
                }).catch(() => {
                    alert("送信に失敗しました");
                    btn.innerHTML = "予約を確定する";
                    btn.disabled = false;
                });
        }

        function submitCancel() {
            const btn = document.getElementById('btn-cancel-submit');
            btn.disabled = true;
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'cancelReservation', cancelId: cancelReservationId }) })
                .then(() => {
                    document.getElementById('view-cancel').classList.add('hidden');
                    document.getElementById('view-cancel-success').classList.remove('hidden');
                });
        }

        function closeApp() { if (typeof liff !== 'undefined' && liff.isInClient()) { liff.closeWindow(); } }
    </script>
</body>
</html>
