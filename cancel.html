<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約キャンセル</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --primary: #1E3A8A; --secondary: #3B82F6; }
    .detail-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.5rem; margin: 1.5rem 0; text-align: left; }
    .detail-item { display: flex; margin-bottom: 0.8rem; font-size: 1rem; line-height: 1.6; }
    .detail-label { color: #64748b; width: 5rem; flex-shrink: 0; }
    .detail-value { color: #1e293b; font-weight: bold; flex: 1; }
    .btn-cancel { background-color: var(--primary); color: white; border: none; padding: 1rem; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 style="color: var(--primary);">予約の変更・キャンセル</h1>
    </header>
    <div class="card" id="mainCard">
      <div id="loader" style="text-align:center; padding: 2rem;">情報を読み込み中...</div>
      <div id="content" style="display:none;">
        <div class="detail-card">
          <div class="detail-item"><div class="detail-label">生徒名</div><div class="detail-value" id="resStudent"></div></div>
          <div class="detail-item"><div class="detail-label">会場</div><div class="detail-value" id="resVenue"></div></div>
          <div class="detail-item"><div class="detail-label">日付</div><div class="detail-value" id="resDate"></div></div>
          <div class="detail-item"><div class="detail-label">時間</div><div class="detail-value" id="resTime"></div></div>
          <div class="detail-item"><div class="detail-label">プラン</div><div class="detail-value" id="resDuration"></div></div>
        </div>

        <div id="changePlanSection" style="margin-bottom: 1.5rem;">
          <h3 style="font-size: 1rem; color: var(--primary); margin-bottom: 0.8rem;">プラン(利用時間)の変更</h3>
          <div class="radio-group" style="margin-bottom: 1.5rem;">
            <div class="radio-card"><input type="radio" id="new_d2" name="newDuration" value="2時間利用"><label for="new_d2">2時間<br>利用</label></div>
            <div class="radio-card"><input type="radio" id="new_d1_5" name="newDuration" value="1時間30分利用"><label for="new_d1_5">1時間30分<br>利用</label></div>
            <div class="radio-card"><input type="radio" id="new_d1" name="newDuration" value="1時間利用"><label for="new_d1">1時間<br>利用</label></div>
          </div>
          <button id="changeBtn" class="btn-cancel" style="background-color: var(--secondary); margin-bottom: 1rem;">プランを変更する</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 1.5rem 0;">
        <h3 style="font-size: 1rem; color: var(--secondary); margin-bottom: 0.8rem;">予約のキャンセル</h3>
        <button id="cancelBtn" class="btn-cancel" style="background-color: var(--secondary);">この予約をキャンセルする</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
  <script>
    const LIFF_ID = "2003593452-9b257Myn";
    const params = new URLSearchParams(window.location.search);
    const cancelId = params.get('id');

    window.onload = async () => {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        if (!cancelId) {
          document.getElementById('loader').innerText = '予約IDが指定されていません。';
          return;
        }

        const res = await apiFetch('getReservationDetail', { cancelId: cancelId });
        
        if (res.status === 'success') {
          document.getElementById('resStudent').innerText = res.data.studentName + " さん";
          document.getElementById('resVenue').innerText = `${res.data.area} ${res.data.venue}`;
          
          // 曜日付き日付の整形処理
          const dateObj = new Date(res.data.date);
          if (!isNaN(dateObj.getTime())) {
            const days = ["日","月","火","水","木","金","土"];
            const y = dateObj.getFullYear();
            const m = ('0'+(dateObj.getMonth()+1)).slice(-2);
            const d = ('0'+dateObj.getDate()).slice(-2);
            const day = days[dateObj.getDay()];
            document.getElementById('resDate').innerText = `${y}/${m}/${d}(${day})`;
          } else {
            document.getElementById('resDate').innerText = res.data.date;
          }
          
          document.getElementById('resTime').innerText = res.data.time;
          document.getElementById('resDuration').innerText = res.data.duration;
          
          // ラジオボタンの初期選択を設定
          const radios = document.getElementsByName('newDuration');
          for (const radio of radios) {
            if (radio.value === res.data.duration) {
              radio.checked = true;
            }
          }
          
          document.getElementById('loader').style.display = 'none';
          document.getElementById('content').style.display = 'block';
        } else {
          // APIからエラーが返ってきた場合
          document.getElementById('loader').innerHTML = `<span style="color: red;">エラー: ${res.message}</span>`;
        }
      } catch (err) {
        // LIFFの初期化エラーなど、予期せぬエラーが発生した場合
        document.getElementById('loader').innerHTML = `<span style="color: red;">システムエラーが発生しました。LIFF IDやURLの設定を確認してください。<br><br>${err.message}</span>`;
        console.error("Initialization Error:", err);
      }
    };

    document.getElementById('cancelBtn').onclick = async () => {
  const btn = document.getElementById('cancelBtn');
  
  // 1. ローディング状態にする
  btn.innerText = 'キャンセル処理中...';
  btn.disabled = true; // 二度押し防止
  btn.style.backgroundColor = '#94a3b8'; // 色をグレーにして押せない感じにする

  const res = await apiFetch('cancel', { cancelId: cancelId });
  
  if (res.status === 'success') {
    if (liff.isInClient()) {
      liff.sendMessages([{ type: "text", text: "❌ 予約キャンセル" }])
        .then(() => liff.closeWindow())
        .catch(e => {
          console.error(e);
          document.body.innerHTML = '<div class="container" style="text-align:center; padding-top:2rem;"><h2>キャンセルが完了しました</h2><p>右上の×ボタンで画面を閉じてください。</p></div>';
        });
    } else {
      document.body.innerHTML = '<div class="container" style="text-align:center; padding-top:2rem;"><h2>キャンセルが完了しました</h2><p>ご利用ありがとうございました。</p></div>';
    }
  } else {
    // エラー時の処理
    alert('エラーが発生しました: ' + res.message);
    btn.innerText = 'この予約をキャンセルする';
    btn.disabled = false;
    btn.style.backgroundColor = 'var(--secondary)'; // 元の色に戻す
  }
};

    document.getElementById('changeBtn').onclick = async () => {
      const btn = document.getElementById('changeBtn');
      const selectedDuration = document.querySelector('input[name="newDuration"]:checked');
      
      if (!selectedDuration) {
        alert('変更するプランを選択してください。');
        return;
      }
      
      const newDuration = selectedDuration.value;
      if (newDuration === document.getElementById('resDuration').innerText) {
        alert('現在のプランと同じです。');
        return;
      }

      btn.innerText = '変更処理中...';
      btn.disabled = true;
      btn.style.backgroundColor = '#94a3b8';

      const res = await apiFetch('updateDuration', { cancelId: cancelId, duration: newDuration });
      
      if (res.status === 'success') {
        if (liff.isInClient()) {
          liff.sendMessages([{ type: "text", text: "🔧 プラン変更" }])
            .then(() => liff.closeWindow())
            .catch(e => {
              console.error(e);
              document.body.innerHTML = '<div class="container" style="text-align:center; padding-top:2rem;"><h2>プランの変更が完了しました</h2><p>右上の×ボタンで画面を閉じてください。</p></div>';
            });
        } else {
          document.body.innerHTML = '<div class="container" style="text-align:center; padding-top:2rem;"><h2>プランの変更が完了しました</h2><p>ご利用ありがとうございます。</p></div>';
        }
      } else {
        alert('エラーが発生しました: ' + res.message);
        btn.innerText = 'プランを変更する';
        btn.disabled = false;
        btn.style.backgroundColor = 'var(--secondary)';
      }
    };
  </script>
</body>
</html>
