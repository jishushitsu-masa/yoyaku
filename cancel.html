<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約キャンセル</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --primary: #1E3A8A; --secondary: #3B82F6; }
    .detail-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1.5rem; margin: 1.5rem 0; text-align: left; }
    .detail-item { display: flex; margin-bottom: 0.8rem; font-size: 1rem; line-height: 1.6; }
    .detail-label { color: #64748b; width: 5rem; flex-shrink: 0; }
    .detail-value { color: #1e293b; font-weight: bold; flex: 1; }
    .btn-cancel { background-color: var(--primary); color: white; border: none; padding: 1rem; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 style="color: var(--primary);">予約のキャンセル</h1>
    </header>
    <div class="card" id="mainCard">
      <div id="loader" style="text-align:center; padding: 2rem;">情報を読み込み中...</div>
      <div id="content" style="display:none;">
        <div class="detail-card">
          <div class="detail-item"><div class="detail-label">生徒名</div><div class="detail-value" id="resStudent"></div></div>
          <div class="detail-item"><div class="detail-label">会場</div><div class="detail-value" id="resVenue"></div></div>
          <div class="detail-item"><div class="detail-label">日付</div><div class="detail-value" id="resDate"></div></div>
          <div class="detail-item"><div class="detail-label">時間</div><div class="detail-value" id="resTime"></div></div>
        </div>
        <button id="cancelBtn" class="btn-cancel">この予約をキャンセルする</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
  <script>
    const LIFF_ID = "2009652448-DTbJgRRj";
    const params = new URLSearchParams(window.location.search);
    const cancelId = params.get('id');

    window.onload = async () => {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        if (!cancelId) {
          document.getElementById('loader').innerText = '予約IDが指定されていません。';
          return;
        }

        const res = await apiFetch('getReservationDetail', { cancelId: cancelId });
        
        if (res.status === 'success') {
          document.getElementById('resStudent').innerText = res.data.studentName + " さん";
          document.getElementById('resVenue').innerText = `${res.data.area} ${res.data.venue}`;
          
          // 曜日付き日付の整形処理
          const dateObj = new Date(res.data.date);
          if (!isNaN(dateObj.getTime())) {
            const days = ["日","月","火","水","木","金","土"];
            const y = dateObj.getFullYear();
            const m = ('0'+(dateObj.getMonth()+1)).slice(-2);
            const d = ('0'+dateObj.getDate()).slice(-2);
            const day = days[dateObj.getDay()];
            document.getElementById('resDate').innerText = `${y}/${m}/${d}(${day})`;
          } else {
            document.getElementById('resDate').innerText = res.data.date;
          }
          
          document.getElementById('resTime').innerText = res.data.time;
          document.getElementById('loader').style.display = 'none';
          document.getElementById('content').style.display = 'block';
        } else {
          // APIからエラーが返ってきた場合
          document.getElementById('loader').innerHTML = `<span style="color: red;">エラー: ${res.message}</span>`;
        }
      } catch (err) {
        // LIFFの初期化エラーなど、予期せぬエラーが発生した場合
        document.getElementById('loader').innerHTML = `<span style="color: red;">システムエラーが発生しました。LIFF IDやURLの設定を確認してください。<br><br>${err.message}</span>`;
        console.error("Initialization Error:", err);
      }
    };

    document.getElementById('cancelBtn').onclick = async () => {
  const btn = document.getElementById('cancelBtn');
  
  // 1. ローディング状態にする
  btn.innerText = 'キャンセル処理中...';
  btn.disabled = true; // 二度押し防止
  btn.style.backgroundColor = '#94a3b8'; // 色をグレーにして押せない感じにする

  const res = await apiFetch('cancel', { cancelId: cancelId });
  
  if (res.status === 'success') {
    if (liff.isInClient()) {
      liff.sendMessages([{ type: "text", text: "❌ 予約キャンセル" }])
        .then(() => liff.closeWindow())
        .catch(e => {
          console.error(e);
          document.body.innerHTML = '<div class="container" style="text-align:center; padding-top:2rem;"><h2>キャンセルが完了しました</h2><p>右上の×ボタンで画面を閉じてください。</p></div>';
        });
    } else {
      document.body.innerHTML = '<div class="container" style="text-align:center; padding-top:2rem;"><h2>キャンセルが完了しました</h2><p>ご利用ありがとうございました。</p></div>';
    }
  } else {
    // エラー時の処理
    alert('エラーが発生しました: ' + res.message);
    btn.innerText = 'この予約をキャンセルする';
    btn.disabled = false;
    btn.style.backgroundColor = 'var(--primary)'; // 元の色に戻す
  }
};
  </script>
</body>
</html>
