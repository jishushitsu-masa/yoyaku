<script>
    // ... URLパラメータ取得等は変更なし ...

    window.onload = async () => {
      if (!cancelId) {
        document.getElementById('mainCard').innerHTML = '<p>無効なアクセスです。</p>';
        return;
      }
      const res = await apiFetch('getReservationDetail', { cancelId: cancelId });
      if (res.status === 'success') {
        document.getElementById('resStudent').innerText = res.data.studentName + " さん";
        // エリアと会場名を結合して表示[cite: 4]
        document.getElementById('resVenue').innerText = `${res.data.area} ${res.data.venue}`;
        document.getElementById('resDate').innerText = res.data.date;
        document.getElementById('resTime').innerText = res.data.time;
        document.getElementById('loader').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } else {
        document.getElementById('mainCard').innerHTML = '<p style="padding:2rem;">予約が見つからないか、既にキャンセルされています。</p>';
      }
    };
    
    // ... キャンセル実行処理は変更なし ...
</script>
